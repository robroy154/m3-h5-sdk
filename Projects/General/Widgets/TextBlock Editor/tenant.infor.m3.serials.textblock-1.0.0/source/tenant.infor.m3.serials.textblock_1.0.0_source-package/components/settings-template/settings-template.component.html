@if (instanceId) {
	<ids-layout-flex direction="column" column-gap="20" class="ids-full-height">
		<ids-layout-flex direction="row" column-gap="20">
			<ids-layout-flex
				direction="column"
				align-items="baseline"
				style="width: 350px"
				class="ids-full-height lm-input">
				<infor-sample-setting-title-field
					[widgetSettingsContext]="widgetSettingsContext"
					label="Title">
				</infor-sample-setting-title-field>

				<ids-dropdown
					[id]="'textBlockLanguage' + instanceId"
					[allowBlank]="true"
					label="Text Block Language"
					disabled="false"
					class="">
					<ids-list-box>
						<ids-list-box-option
							value=""
							[id]="instanceId + 'blank'"></ids-list-box-option>
					</ids-list-box>
				</ids-dropdown>
			</ids-layout-flex>

			<ids-layout-flex direction="column" justify-content="center">
				<!-- <div class="checkboc-container"> -->
				<!-- 				<ids-checkbox
					[id]="'autoMode' + instanceId"
					label="Auto mode"
					title=""
					hitbox="true"></ids-checkbox> -->
				<ids-checkbox
					[id]="'editEnabled' + instanceId"
					label="Edit enabled"
					title=""
					hitbox="true"></ids-checkbox>
				<ids-checkbox
					[id]="'deleteEnabled' + instanceId"
					label="Delete enabled"
					title=""
					hitbox="true"></ids-checkbox>
				<ids-checkbox
					[id]="'compactMode' + instanceId"
					label="Compact mode"
					title=""
					hitbox="true"></ids-checkbox>
				<!-- </div> -->
			</ids-layout-flex>
		</ids-layout-flex>
		<ids-separator></ids-separator>
		<ids-layout-flex direction="row">
			<app-config-form
				(formValueChange)="configFormChanged($event)"></app-config-form>
		</ids-layout-flex>
	</ids-layout-flex>
}

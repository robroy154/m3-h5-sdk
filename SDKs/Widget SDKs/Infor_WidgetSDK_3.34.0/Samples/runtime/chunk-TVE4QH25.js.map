﻿<div
	[attr.data-lm-cat-itm]="itemId"
	[attr.name]="'lm-cat-item' + automationIdIdentifier"
	data-lm-id="cat-item"
	class="list-item lm-item-bg lm-brd"
	[class.reduced-height]="isWidget"
	[class.lm-margin-xl-b]="addMargins">
	<div
		class="item-header-container lm-brd"
		(click)="onClickDetails.emit(item)"
		[style.background-color]="headerColor"
		tabindex="0"
		(keyup.enter)="onClickDetails.emit(item)"
		role="button"
		[attr.aria-label]="title"
		[attr.data-lm-details-btn]="itemId"
		[attr.name]="'lm-cat-item-header' + automationIdIdentifier"
		data-lm-id="cat-item-header"
		soho-tooltip
		[title]="tooltip"
		[showOnKeyboardFocus]="false">
		<div
			*ngIf="contextMenuId"
			class="context-menu-area"
			soho-context-menu
			[menu]="contextMenuId"
			(beforeopen)="contextMenuOpen.emit(item)"></div>
		<div
			*ngIf="item.displayIcon"
			class="item-icon lm-margin-md-dir-r"
			(click)="onClickDetails.emit(item)">
			<img
				broken-image-fallback
				[alt]="title"
				[src]="item.displayIcon"
				[attr.name]="'lm-cat-item-header-img' + automationIdIdentifier"
				data-lm-id="cat-item-header-image" />
		</div>
		<div class="item-title">
			<h2
				[attr.data-lm-cat-itm-hdr]="itemId"
				[attr.name]="'lm-cat-item-title' + automationIdIdentifier"
				data-lm-id="cat-item-title">
				{{ title | lmEllipsis: 25 }}
			</h2>
		</div>
		<div class="buttons">
			<button
				soho-button="icon"
				*ngIf="canPreview"
				icon="search-list"
				(click)="$event.stopPropagation(); onClickPreview.emit(item)"
				soho-tooltip
				[title]="lang.previewPage"
				name="lm-cat-item-preview">
				<span class="audible">{{ lang.previewPage }}</span>
			</button>
			<button
				soho-button="icon"
				*ngIf="canAdd"
				icon="add"
				soho-tooltip
				[title]="isWidget ? lang.addWidget : lang.addPage"
				[attr.data-lm-add]="itemId"
				[name]="'lm-cat-item-add-button' + automationIdIdentifier"
				data-lm-id="cat-item-add"
				(click)="$event.stopPropagation(); onClickAdd.emit({ item: item })">
				<span class="audible">{{
					isWidget ? lang.addWidget : lang.addPage
				}}</span>
			</button>
			<ng-content select="[card-header-action]"></ng-content>
		</div>
	</div>

	<div class="item-content">
		<div class="item-description">
			<p
				[attr.data-lm-cat-itm-desc]="itemId"
				[attr.name]="'lm-cat-item-description' + automationIdIdentifier"
				data-lm-id="cat-item-description">
				{{ description }}
			</p>
		</div>

		<div *ngIf="item.tags" class="tags-container" #tagsContainer>
			<lm-tags
				[tagString]="item.tags"
				[id]="itemId"
				tagClass="tag is-linkable hide-focus lm-cursor-pointer"
				(onTagClickUpdate)="onClickAddTag.emit($event)"
				(onTagsRendered)="setShowMoreTags()"
				hideSymbol="true"></lm-tags>
			<a
				*ngIf="showMoreTags"
				name="lm-cat-item-tags-showmore"
				[attributes]="[{ name: 'name', value: 'lm-cat-item-tags' }]"
				class="tag is-linkable hide-focus tag-more lm-cursor-pointer"
				soho-tooltip
				[popover]="true"
				[closebutton]="true"
				[title]="lang.tags"
				[content]="'#lm-tags-pop-' + itemId"
				trigger="click"
				extraClass="lm-text-align-c lm-popover-align-fix lm-tags-popover">
				...
			</a>
			<lm-tags
				[id]="'pop-' + itemId"
				name="lm-cat-item-tags-pop"
				class="hidden no-init"
				[tagString]="item.tags"
				tagClass="badge is-linkable hide-focus lm-cursor-pointer lm-margin-md-b lm-margin-md-r"
				(onTagClickUpdate)="onClickAddTag.emit($event)"
				hideSymbol="true"></lm-tags>
		</div>
		<div class="item-type" *ngIf="typeName">
			<small
				[attr.name]="'lm-cat-item-typeName' + automationIdIdentifier"
				data-lm-id="cat-item-typeName"
				class="lm-margin-zero-b"
				>{{ typeName }}</small
			>
			<ng-content select="[card-content-icon]"></ng-content>
		</div>
	</div>
	<div class="item-footer lm-bg" *ngIf="!isWidget">
		<small
			[attr.name]="'lm-cat-item-editedby' + automationIdIdentifier"
			data-lm-id="cat-item-editedby"
			>{{ editedByText }}</small
		>
		<small
			[attr.name]="'lm-cat-item-edited' + automationIdIdentifier"
			data-lm-id="cat-item-edited"
			>{{ item.data.changeDate | lmLocaleDate }}</small
		>
	</div>
</div>

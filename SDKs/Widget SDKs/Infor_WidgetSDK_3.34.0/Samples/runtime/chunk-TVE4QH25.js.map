﻿<div>
	<p>{{ lang.selectPageAddWidget }}</p>
	<div class="field lm-margin-md-t">
		<label class="label" for="selectPage">{{ lang.privatePages }}</label>
		<select
			name="lm-select-page-pages"
			[attributes]="{ name: 'id', value: 'lm-select-page-pages' }"
			[(ngModel)]="selectedPage"
			class="dropdown"
			[disabled]="createNew"
			soho-dropdown>
			<option value="">&nbsp;</option>
			<option *ngFor="let page of pages" [value]="page.data.id">
				{{ page.title || page.data.title }}
			</option>
		</select>
	</div>
	<div class="field">
		<input
			type="checkbox"
			class="checkbox"
			id="newPageCheckbox"
			[(ngModel)]="createNew"
			[disabled]="
				!isNewPageAllowed || (selectedPage != null && selectedPage !== '')
			" />
		<label for="newPageCheckbox" class="checkbox-label">{{
			lang.createNewPage
		}}</label>
	</div>
	<div class="modal-buttonset">
		<button
			type="button"
			class="btn-modal"
			id="lm-select-page-dialog-cancel"
			(click)="close()">
			{{ lang.cancel }}
		</button>
		<button
			type="button"
			class="btn-modal-primary"
			id="lm-select-page-dialog-ok"
			(click)="select()"
			[disabled]="!(selectedPage || createNew)">
			{{ lang.select }}
		</button>
	</div>
</div>

﻿<div id="lm-uset-div" class="lm-margin-sm-b user-settings">
	<div class="field lm-margin-lg-b">
		<small id="lm-uset-maxPages">{{ maxUserPages }}</small>
	</div>
	<div class="field">
		<small id="lm-uset-maxWidgets">{{ maxWidgetsOnPage }}</small>
	</div>
	<div class="field" *ngFor="let setting of orderedSettings">
		<input
			id="{{ setting.info }}"
			soho-checkbox
			type="checkbox"
			[(ngModel)]="setting.value"
			disabled
			[attr.data-e2e]="setting.label + '-setting'" />
		<label
			id="{{ setting.info }}-label"
			soho-label
			[forCheckBox]="true"
			class="lm-fg"
			>{{ setting.label }}</label
		>
	</div>
	<div class="modal-buttonset">
		<button
			id="lm-usersettings-close"
			type="button"
			class="btn-modal-primary"
			(click)="close()">
			{{ lang.close }}
		</button>
	</div>
</div>

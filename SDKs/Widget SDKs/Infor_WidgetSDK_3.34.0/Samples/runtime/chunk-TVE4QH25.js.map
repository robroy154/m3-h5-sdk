﻿<div
	id="lm-p-set-div"
	soho-busyindicator
	[blockUI]="true"
	[activated]="isBusy"
	[displayDelay]="0">
	<div class="field e2e-pageSettingsNameField">
		<label id="lm-p-set-ttl-lbl" for="name" class="required">{{
			lang.title
		}}</label>
		<input
			id="name"
			type="text"
			name="title"
			[(ngModel)]="data.title"
			[ngClass]="{ 'lm-margin-sm-b': isPublic }"
			[maxlength]="pageTitleLength"
			aria-required="true"
			data-validate="required"
			required />
	</div>

	<div class="field e2e-pageSettingsDescriptionField">
		<label id="lm-p-set-desc-lbl" for="description" class="required">{{
			lang.description
		}}</label>
		<textarea
			id="description"
			name="description"
			#textAreaRef
			class="resizable required"
			[maxlength]="pageDescriptionLength"
			soho-textarea
			[(ngModel)]="data.description"
			aria-required="true"
			data-validate="required"
			required></textarea>
	</div>

	<div class="field colorpicker-min-width">
		<label id="lm-pset-color-lbl" for="lm-pset-color">{{
			lang.pageColor
		}}</label>
		<input
			id="lm-pset-color"
			soho-colorpicker
			class="colorpicker-input-md"
			name="color"
			[(ngModel)]="pageColor"
			[editable]="colorpickerOptions.editable"
			[showLabel]="colorpickerOptions.showLabel"
			[colors]="colorpickerOptions.colors"
			[clearable]="false"
			[attributes]="{ name: 'id', value: 'lm-pset-page-color' }" />
	</div>

	<div class="field e2e-pageSettingsLastEdited">
		<small id="lm-pset-edt-lbl" class="micro-text">{{ lang.lastEdited }}</small>
		<small id="lm-pset-edt" class="micro-text lm-display-block">{{
			data.changeDate | lmLocaleDate
		}}</small>
	</div>

	<div class="modal-buttonset">
		<button
			id="lm-page-settings-close"
			type="button"
			class="btn-modal"
			(click)="close()"
			[disabled]="isBusy">
			{{ lang.cancel }}
		</button>
		<button
			id="lm-page-settings-save"
			type="button"
			class="btn-modal-primary"
			[disabled]="isBusy"
			(click)="save()">
			{{ lang.save }}
		</button>
	</div>
</div>

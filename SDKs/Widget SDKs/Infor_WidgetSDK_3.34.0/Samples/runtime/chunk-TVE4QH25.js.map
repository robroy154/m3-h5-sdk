﻿<div
	id="lm-wp-div"
	class="widget-publish-dialog"
	soho-busyindicator
	[blockUI]="true"
	[activated]="isBusy"
	[displayDelay]="0">
	<span id="lm-wp-info-txt" *ngIf="isPublished" class="lm-info-text">{{
		lang.widgetChangeAffectAll
	}}</span>
	<div
		soho-tabs
		class="tab-container lm-margin-zero-b lm-max-height-xl"
		[ngClass]="{ 'lm-margin-sm-t': isPublished }">
		<ul class="tab-list" soho-tab-list>
			<li id="lm-wp-tab-item-bas" soho-tab>
				<a soho-tab-title tabId="tabBasic" (click)="onClickTab('basic')">{{
					lang.basic
				}}</a>
			</li>
			<li id="lm-wp-tab-item-set" soho-tab>
				<a
					soho-tab-title
					tabId="tabSettings"
					(click)="onClickTab('settings')"
					>{{ lang.settings }}</a
				>
			</li>
			<li id="lm-wp-tab-item-trn" soho-tab *ngIf="translationEnabled">
				<a
					soho-tab-title
					tabId="tabTranslations"
					(click)="onClickTab('translations')"
					>{{ lang.translations }}</a
				>
			</li>
			<li
				id="lm-wp-tab-item-acc"
				soho-tab
				class="e2e-ppc-tabAccessLevel"
				*ngIf="enableAccess">
				<a
					soho-tab-title
					tabId="tabAccessLevel"
					(click)="onClickTab('accessLevel')"
					>{{ lang.permissions }}</a
				>
			</li>
		</ul>

		<div tabId="tabBasic" soho-tab-panel>
			<div class="field">
				<label id="lm-wp-ttl-lbl" for="title" class="label required">{{
					lang.title
				}}</label>
				<input
					id="title"
					name="title"
					type="text"
					[maxlength]="widgetTitleLength"
					[(ngModel)]="customized.title"
					aria-required="true"
					data-validate="required"
					required />
			</div>

			<div class="field">
				<input
					id="switchTitleCatalog"
					name="switchTitleCatalog"
					soho-checkbox
					type="checkbox"
					[(ngModel)]="customized.isCatalogTitle"
					[disabled]="isTitleEditDisabled" />
				<label
					id="lm-wp-cat-chk-lbl"
					soho-label
					for="switchTitleCatalog"
					[forCheckBox]="true"
					>{{ lang.isCatalogWidgetLabel }}</label
				>
			</div>

			<div class="field lm-margin-xl-b lm-margin-md-t">
				<label
					id="lm-wp-desc-lbl"
					for="widgetDescription"
					class="label required"
					>{{ lang.description }}</label
				>
				<textarea
					id="widgetDescription"
					name="widgetDescription"
					soho-textarea
					class="resizable"
					[maxlength]="widgetDescriptionLength"
					[(ngModel)]="customized.description"
					data-validate="required"
					aria-required="true"
					required></textarea>
			</div>
			<!-- TODO issue with plus on a new line, after adding mobile div below -->
			<lm-tags-customize-component
				[tags]="tags"
				[maxNr]="5"></lm-tags-customize-component>

			<div
				class="field"
				lm-widget-size-display
				[size]="defaultSize"
				[maxSize]="maxSize"
				[includeSizeSelector]="true"
				[selectionLabel]="lang.standardSize"
				(sizeChanged)="setDefaultSize($event)"></div>

			<ng-container *ngIf="showTargetOptions">
				<div class="field field-checkbox">
					<label class="required">{{ lang.selectTargetInfo }}</label>
				</div>

				<div class="field field-checkbox" *ngIf="showDefault">
					<input
						id="switchDefaultCatalog"
						name="switchDefaultCatalog"
						soho-checkbox
						type="checkbox"
						[(ngModel)]="widgetTarget.isDefault"
						(change)="onTargetChange()" />
					<label
						id="lm-wp-dcat-chk-lbl"
						soho-label
						for="switchDefaultCatalog"
						soho-tooltip
						[title]="lang.publishNormalDescription"
						[forCheckBox]="true"
						>{{ lang.publishNormalLabel }}</label
					>
				</div>

				<div class="field field-checkbox" *ngIf="showBanner">
					<input
						id="switchBannerCatalog"
						name="switchBannerCatalog"
						soho-checkbox
						type="checkbox"
						[(ngModel)]="widgetTarget.isBanner"
						(change)="onTargetChange()" />
					<label
						id="lm-wp-bcat-chk-lbl"
						soho-label
						for="switchBannerCatalog"
						soho-tooltip
						[title]="lang.publishBannerDescription"
						[forCheckBox]="true"
						>{{ lang.publishBannerLabel }}</label
					>
				</div>

				<div class="field field-checkbox" *ngIf="showMobile">
					<input
						id="switchMobileCatalog"
						name="switchMobileCatalog"
						soho-checkbox
						type="checkbox"
						[(ngModel)]="widgetTarget.isMobile"
						(change)="onTargetChange()" />
					<label
						id="lm-wp-mcat-chk-lbl"
						soho-label
						for="switchMobileCatalog"
						soho-tooltip
						[title]="lang.publishMobileDescription"
						[forCheckBox]="true"
						>{{ lang.publishMobileLabel }}</label
					>
				</div>
				<div class="error-message" *ngIf="isTargetMissing">
					<svg soho-icon icon="error" [alert]="true"></svg>
					<p class="message-text">{{ lang.targetMissingMessage }}</p>
				</div>
			</ng-container>
		</div>

		<div tabId="tabSettings" soho-tab-panel class="lm-scroll-no-y">
			<div class="lm-padding-sm-l">
				<div class="lm-margin-xl-b">
					<div class="field">
						<input
							id="switchEnableSettings"
							name="switchEnableSettings"
							soho-checkbox
							type="checkbox"
							[(ngModel)]="customized.enableSettings"
							[disabled]="!enableSettings" />
						<label
							id="lm-wp-set-chk-lbl"
							soho-label
							for="switchEnableSettings"
							[forCheckBox]="true"
							>{{ lang.enableSettings }}</label
						>
					</div>
				</div>

				<div *ngIf="enableUserSettings">
					<ng-container *ngFor="let settingItem of settingsItems">
						<div
							*ngIf="settingItem.setting.isEnabledWhenPublished !== false"
							class="six columns lm-margin-zero-l lm-margin-md-t">
							<span class="checkbox-group-label">{{ settingItem.label }}</span>

							<div
								class="field"
								*ngIf="settingItem.setting.name !== 'lmWidgetTitle'">
								<input
									soho-checkbox
									type="checkbox"
									id="visible{{ settingItem.setting.name }}"
									name="visible{{ settingItem.setting.name }}"
									[(ngModel)]="settingItem.setting.isVisible"
									[disabled]="
										!customized.enableSettings || settingItem.isHidden
									" />
								<label
									soho-label
									[attr.for]="'visible' + settingItem.setting.name"
									[forCheckBox]="true"
									>{{ lang.visible }}</label
								>
							</div>

							<div class="field">
								<input
									soho-checkbox
									type="checkbox"
									[attr.id]="'editable' + settingItem.setting.name"
									name="editable{{ settingItem.setting.name }}"
									[(ngModel)]="settingItem.setting.isEnabled"
									[disabled]="isSettingItemDisabled(settingItem)" />
								<label
									soho-label
									[attr.for]="'editable' + settingItem.setting.name"
									[forCheckBox]="true"
									>{{ lang.enabled }}</label
								>
							</div>
						</div>
					</ng-container>
				</div>
			</div>
		</div>

		<div tabId="tabTranslations" soho-tab-panel *ngIf="translationEnabled">
			<lm-translations-component
				[parameter]="localization"
				[category]="category"></lm-translations-component>
		</div>

		<div tabId="tabAccessLevel" soho-tab-panel *ngIf="enableAccess">
			<lm-entity-access-component
				[options]="accessOptions"></lm-entity-access-component>
		</div>
	</div>

	<div class="modal-buttonset">
		<button
			id="lm-wp-cancel"
			class="btn-modal"
			(click)="close()"
			[disabled]="isBusy">
			{{ lang.cancel }}
		</button>
		<button
			id="lm-wp-apply"
			class="btn-modal-primary no-validation"
			(click)="apply()"
			[disabled]="applyDisabled">
			{{ lang.apply }}
		</button>
	</div>
</div>

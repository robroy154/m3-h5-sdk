<div class="thumbnail-container">
	<div
		*ngFor="let image of images; index as i"
		(click)="open(i)"
		class="thumbnail"
		[style.backgroundImage]="'url(' + image + ')'"></div>
</div>
<div *ngIf="isOpen" class="gallery-modal" (click)="close()">
	<img [src]="images[viewerIndex]" />
</div>

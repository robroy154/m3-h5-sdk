﻿<div class="field">
	<label for="user-filter-name" class="required">{{ lang.name }}</label>
	<input
		id="user-filter-name"
		[(ngModel)]="userFilterName"
		data-validate="required"
		[maxlength]="viewNameLength" />
	<div id="lm-add-page-buttons" class="modal-buttonset">
		<button
			id="lm-add-page-cancel-btn"
			type="button"
			class="btn-modal e2e-addPageCancel"
			(click)="cancel()">
			{{ lang.cancel }}
		</button>
		<button
			id="lm-add-page-save-btn"
			type="button"
			class="btn-modal-primary no-validation"
			(click)="save()">
			{{ lang.save }}
		</button>
	</div>
</div>

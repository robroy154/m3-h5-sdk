<div
	class="accordion-header-container"
	[hidden]="filter.category === -3"
	id="lm-cat-ftr-tags-div">
	<a
		class="badge is-dismissible"
		*ngIf="filter.type !== 0 && isOpened"
		id="lm-cat-ftr-tags-type">
		{{ filter.type === 1 ? lang.publishedOnly : lang.standardOnly }}
		<span
			class="btn-dismissible"
			tabindex="0"
			(click)="stopEventPropagation($event); filter.type = 0; onFilterChange()"
			lm-enter-to-click
			id="lm-cat-ftr-tags-type-dismiss">
			<svg
				class="icon"
				focusable="false"
				aria-hidden="true"
				role="presentation">
				<use xlink:href="#icon-close"></use>
			</svg>
		</span>
	</a>

	<a
		class="badge is-dismissible"
		*ngIf="isWidget && filter.application && isOpened"
		id="lm-cat-ftr-tags-app">
		{{ filter.application?.name }}
		<span
			class="btn-dismissible"
			tabindex="0"
			(click)="
				stopEventPropagation($event);
				filter.application = null;
				onFilterChange()
			"
			lm-enter-to-click
			id="lm-cat-ftr-tags-app-dismiss">
			<svg
				class="icon"
				focusable="false"
				aria-hidden="true"
				role="presentation">
				<use xlink:href="#icon-close"></use>
			</svg>
		</span>
	</a>

	<a
		class="badge is-dismissible"
		*ngIf="isWidget && filter.cloudSuite && isOpened"
		id="lm-cat-ftr-tags-cld">
		{{ filter.cloudSuite?.value }}
		<span
			class="btn-dismissible"
			tabindex="0"
			(click)="
				stopEventPropagation($event); filter.cloudSuite = null; onFilterChange()
			"
			lm-enter-to-click
			id="lm-cat-ftr-tags-cld-dismiss">
			<svg
				class="icon"
				focusable="false"
				aria-hidden="true"
				role="presentation">
				<use xlink:href="#icon-close"></use>
			</svg>
		</span>
	</a>

	<a
		class="badge is-dismissible"
		*ngIf="filter.owner && isOpened"
		id="lm-cat-ftr-tags-own">
		{{
			isMe ? lang.ownedByMe : lang.format(lang.ownedByName, ownerDisplayName)
		}}
		<span
			class="btn-dismissible"
			tabindex="0"
			(click)="
				stopEventPropagation($event); filter.owner = null; onFilterChange()
			"
			lm-enter-to-click
			id="lm-cat-ftr-tags-own-dismiss">
			<svg
				class="icon"
				focusable="false"
				aria-hidden="true"
				role="presentation">
				<use xlink:href="#icon-close"></use>
			</svg>
		</span>
	</a>

	<ng-container *ngFor="let tag of filter.tags">
		<a
			class="badge is-dismissible"
			*ngIf="isOpened"
			[attr.data-lm-cat-ftr-tags-act]="tag"
			[name]="tag | lmAutoId: 'lm-cat-filter-tag'">
			{{ tag }}
			<span
				class="btn-dismissible"
				tabindex="0"
				(click)="stopEventPropagation($event); removeTag(tag)"
				lm-enter-to-click
				[attr.name]="tag | lmAutoId: 'lm-cat-filter-tag-dismiss'">
				<svg
					class="icon"
					focusable="false"
					aria-hidden="true"
					role="presentation">
					<use xlink:href="#icon-close"></use>
				</svg>
			</span>
		</a>
	</ng-container>

	<a
		class="badge is-dismissible"
		*ngIf="filter.query && isOpened"
		id="lm-cat-ftr-tags-qry">
		{{ filter.query }}
		<span
			class="btn-dismissible"
			tabindex="0"
			(click)="clearSearch.emit($event)"
			lm-enter-to-click
			id="lm-cat-ftr-tags-qry-dismiss">
			<svg
				class="icon"
				focusable="false"
				aria-hidden="true"
				role="presentation">
				<use xlink:href="#icon-close"></use>
			</svg>
		</span>
	</a>

	<button
		class="btn tag-filters-btn"
		tabindex="0"
		*ngIf="isFilterActive"
		(click)="onClickClearAll($event)"
		id="lm-cat-ftr-tags-clr">
		<span>{{ lang.clearAll }}</span>
	</button>

	<button
		class="btn tag-filters-btn related-tags-toggle lm-pull-right"
		id="lm-cat-ftr-tags-tgl"
		[disabled]="!relatedTags.length"
		(click)="
			relatedTags.length
				? (isRelatedTagsExpanded = !isRelatedTagsExpanded)
				: null
		">
		<span>{{ lang.relatedTags }}</span>
		<svg
			*ngIf="!isRelatedTagsExpanded"
			class="chevron icon"
			focusable="false"
			aria-hidden="true"
			role="presentation">
			<use xlink:href="#icon-caret-down"></use>
		</svg>
		<svg
			*ngIf="isRelatedTagsExpanded"
			class="chevron icon"
			focusable="false"
			aria-hidden="true"
			role="presentation">
			<use xlink:href="#icon-caret-up"></use>
		</svg>
	</button>
</div>

<div
	class="related-tags-container"
	*ngIf="isRelatedTagsExpanded && filter.category !== -3"
	id="lm-cat-ftr-tags-rel-div">
	<!-- TODO orderBy: 'toString()' -->
	<a
		class="badge is-dismissible"
		*ngFor="let tag of relatedTags"
		(click)="onAddTag(tag)"
		tabindex="0"
		lm-enter-to-click
		[attr.data-lm-cat-ftr-tags-rel]="tag"
		[name]="tag | lmAutoId: 'lm-cat-related-tag'">
		{{ tag }}
		<span
			class="btn-dismissible"
			[attr.name]="tag | lmAutoId: 'lm-cat-related-tag-add'">
			<svg
				class="icon"
				focusable="false"
				aria-hidden="true"
				role="presentation">
				<use xlink:href="#icon-add"></use>
			</svg>
		</span>
	</a>
</div>

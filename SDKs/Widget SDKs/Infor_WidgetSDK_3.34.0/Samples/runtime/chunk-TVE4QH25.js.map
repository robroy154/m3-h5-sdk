﻿<div id="lm-pcpy-div">
	<div class="field">
		<label id="lm-pcpy-ttl-lbl" for="pageTitle" class="required">{{
			lang.title
		}}</label>
		<input
			id="pageTitle"
			name="pageTitle"
			type="text"
			maxlength="{{ pageTitleLength }}"
			[(ngModel)]="newPage.title"
			aria-required="true"
			data-validate="required" />
	</div>

	<div class="modal-buttonset">
		<button
			id="lm-page-copy-cancel"
			type="button"
			class="btn-modal e2e-copyPageCancel"
			(click)="close()">
			{{ lang.cancel }}
		</button>
		<button
			id="lm-page-copy-ok"
			type="button"
			class="btn-modal-primary e2e-copyPageConfirm"
			(click)="copy()">
			{{ lang.ok }}
		</button>
	</div>
</div>

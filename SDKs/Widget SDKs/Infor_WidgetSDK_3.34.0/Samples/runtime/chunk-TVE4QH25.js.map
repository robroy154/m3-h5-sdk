﻿<div
	id="lm-pedt-div"
	class="page-container scrollable e2e-pageEditBar page-edit"
	[class.lm-display-none]="isHidden"
	soho-busyindicator
	[transparentOverlay]="false"
	[blockUI]="true"
	[activated]="isBusy">
	<lm-edit-command-bar></lm-edit-command-bar>

	<div class="container scrollable" #dialogPlaceholder>
		<div
			class="banner-empty"
			[ngStyle]="bannerContainerStyle"
			*ngIf="showBannerAdd()">
			<div
				class="no-banner"
				xi-draggable
				[isPlaceholder]="true"
				[hoverColor]="bannerColor"
				[lang]="lang"
				(onDropped)="onWidgetDropped({ isBannerPlaceholder: true })">
				<button
					id="lmAddHeroCat"
					soho-button="tertiary"
					icon="add"
					(click)="addBannerFromCatalog()">
					{{ lang.addHeroWidget }}
				</button>
				<button
					id="lmPasteBannerCat"
					soho-button="tertiary"
					icon="paste"
					(click)="pasteBannerWidget()"
					*ngIf="showPasteBanner">
					{{ lang.pasteBannerWidget }}
				</button>
			</div>
		</div>

		<!-- Banner widgets container not editable -->
		<div
			id="lmBannerNotEditable"
			[ngStyle]="bannerContainerStyle"
			class="banner-container"
			*ngIf="showBannerNotEditable()">
			<div class="banner-edit-disabled">
				<p>{{ lang.bannerEditUnauthorized }}</p>
			</div>
		</div>

		<div
			id="lmSmallView"
			class="banner-container"
			[ngStyle]="bannerContainerStyle"
			style="display: none">
			<!-- Used in smaller viewports! NOTE: hidden/shown using prev().show/hide -->
			<div class="banner-edit-disabled">
				<p>{{ lang.bannerEditDisabled1 }}</p>
				<p>{{ lang.bannerEditDisabled2 }}</p>
			</div>
		</div>

		<!-- Banner widgets container -->
		<lm-banner-container
			[isEdit]="true"
			[(currentColumns)]="currentColumns"
			[ngStyle]="bannerContainerStyle"
			class="homepage"
			[class.lm-display-none]="!(pageEditActive && isBannerEditable)"
			[hasBanner]="hasBanners()">
			<div
				class="widget lm-banner"
				[style.background-color]="bannerColor"
				*ngFor="let widget of bannerWidgets; let i = index"
				[ngClass]="getBannerLayoutClasses(widget)"
				xi-draggable
				[widget]="widget"
				[(editData)]="widgetEditData"
				(onDropped)="onWidgetDropped($event)"
				(onResized)="onWidgetResized($event)"
				[attr.draggable]="true"
				[attr.banner-id]="widget.elementId">
				<button
					[attr.data-lm-pedt-banner-del]="i"
					[name]="widget.title | lmAutoId: 'lm-pedt-delete-banner-button'"
					class="page-remove"
					(click)="deleteBannerWidget(widget)"
					*ngIf="isBannerEditable">
					<span class="audible">{{ lang.deleteWidget }}</span>
					<svg soho-icon icon="close" [style.color]="bannerColor"></svg>
				</button>
				<lm-unavailable-entity
					*ngIf="widget.isBroken"
					[isPermissionError]="showAsRestricted(widget)"
					[isBanner]="true"></lm-unavailable-entity>
				<div
					*ngIf="!widget.isRestricted && !widget.isBroken"
					class="widget-header">
					<h2 class="widget-title lm-truncate-text">{{ widget.title }}</h2>
				</div>
				<lm-page-edit-details [widget]="widget"></lm-page-edit-details>
			</div>
			<div
				class="banner-placeholder placeholder"
				xi-draggable
				[lang]="lang"
				[isPlaceholder]="true"
				(onDropped)="onWidgetDropped({ isBannerPlaceholder: true })"
				*ngIf="showBannerPlaceholder()"
				(click)="addBannerFromCatalog()">
				<div>
					<svg soho-icon icon="add" class="lm-white"></svg>
				</div>
				<!-- Fix for LIME-1546 -->
				<div style="height: 250px; width: 10px; top: 550px"></div>
			</div>
		</lm-banner-container>

		<div id="lm-pedt-w-div" class="homepage e2e-homepage-edit" data-columns="4">
			<div
				class="content"
				*ngIf="showEditDiv()"
				[class.lm-margin-md-t]="!isBannerOn">
				<div
					class="lm-item-bg widget e2e-widget-edit"
					*ngFor="let widget of widgets; let i = index"
					[attr.data-lm-pedt-w]="i"
					[attr.data-lm-pedt-w-id]="widget.id"
					[attr.name]="widget.title | lmAutoId: 'lm-pedt-widget'"
					[attr.draggable]="true"
					[ngClass]="getLayoutClasses(widget)"
					xi-draggable
					[widget]="widget"
					[(editData)]="widgetEditData"
					(onDropped)="onWidgetDropped($event)"
					(onResized)="onWidgetResized($event)">
					<button
						[attr.data-lm-pedt-w-del]="i"
						[name]="widget.title | lmAutoId: 'lm-pedt-delete-button'"
						class="page-remove"
						(click)="deleteWidget(widget)">
						<span class="audible">{{ lang.deleteWidget }}</span>
						<svg soho-icon icon="close"></svg>
					</button>
					<lm-unavailable-entity
						*ngIf="widget.isBroken"
						[isPermissionError]="
							showAsRestricted(widget)
						"></lm-unavailable-entity>
					<div
						*ngIf="!widget.isRestricted && !widget.isBroken"
						class="widget-header">
						<h2 class="widget-title lm-truncate-text">{{ widget.title }}</h2>
					</div>
					<lm-page-edit-details [widget]="widget"></lm-page-edit-details>
				</div>
				<div
					id="lm-pedt-add-div"
					xi-draggable
					[lang]="lang"
					[isPlaceholder]="true"
					(onDropped)="onWidgetDropped({ isBannerPlaceholder: false })"
					class="lm-bg widget placeholder"
					*ngIf="showWidgetPlaceholder()"
					(click)="addWidgetFromCatalog()">
					<div>
						<svg soho-icon icon="add" class="lm-icon"></svg>
					</div>
				</div>
			</div>
		</div>

		<div id="lm-pedt-empty-div" class="page-container-empty" *ngIf="isEmpty()">
			<h2>{{ lang.emptyPageTitle }}</h2>
			<p>{{ lang.emptyPageDescription }}</p>
			<button
				id="lm-add-widget-btn"
				class="btn-primary e2e-addWidget-btn"
				(click)="addWidgetFromCatalog()">
				{{ lang.addWidget }}
			</button>
		</div>
	</div>
</div>

<fieldset class="radio-group lm-margin-zero">
	<input
		class="radio"
		type="radio"
		id="created-by-all"
		name="lm-cat-radio-owner"
		[(ngModel)]="filter.owner"
		[value]="null"
		(change)="emitFilterChange()" />
	<label
		id="lm-created-by-all-lbl"
		soho-label
		for="created-by-all"
		[forRadioButton]="true"
		>{{ lang.anyone }}</label
	>
	<br />
	<input
		class="radio"
		type="radio"
		id="created-by-me"
		name="lm-cat-radio-owner"
		[(ngModel)]="filter.owner"
		[value]="currentUser.id"
		(change)="emitFilterChange()" />
	<label
		id="lm-created-by-me-lbl"
		soho-label
		for="created-by-me"
		[forRadioButton]="true"
		>{{ myItemsLabel }}</label
	>

	<ng-container *ngIf="isOwnedByFilterEnabled">
		<br />
		<label
			id="lm-catalog-created-by-autoc-lbl"
			for="lm-catalog-created-by-autocomplete"
			class="radio-label lm-margin-md-t"
			>{{ lang.ownedBy }}</label
		>
		<div class="searchfield-wrapper lm-margin-md-b lm-width-full">
			<input
				soho-autocomplete
				maxlength="64"
				class="lm-autocomplete-searchfield lm-width-auto"
				id="lm-catalog-created-by-autocomplete"
				[attributes]="{ name: 'name', value: 'lm-catalog-owner-search' }"
				[(ngModel)]="ownerSearchModel.inputText"
				[source]="ownerSearchSource"
				[template]="ownerSearchTemplate"
				(selected)="
					!$event[1].hasClass('no-results')
						? onClickSelectOwnedBy($event[2])
						: null
				"
				(lm-submit)="
					!ownerSearchModel.inputText?.length ? clearOwnedByUser() : null
				" />
			<svg soho-icon icon="search"></svg>
		</div>
	</ng-container>
</fieldset>

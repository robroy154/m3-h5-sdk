﻿<div id="lm-wab-div">
	<div *ngIf="isBroken">
		<div class="field lm-margin-xl-b">
			<label>{{ lang.widgetId }}</label>
			<p>{{ widgetId }}</p>
		</div>
		<div
			*ngIf="widget.definition?.standardWidgetId"
			class="field lm-margin-xl-b">
			<label>{{ lang.basedOn }}</label>
			<p>{{ widget.definition.standardWidgetId }}</p>
		</div>
		<div *ngIf="brokenMessage" class="field lm-margin-xl-b">
			<label>{{ lang.details }}</label>
			<p>{{ brokenMessage }}</p>
		</div>
	</div>

	<div
		soho-context-menu
		menu="lm-wab-cm"
		trigger="rightClick"
		*ngIf="!isBroken">
		<div class="field lm-margin-xl-b">
			<label>{{ lang.widgetId }}</label>
			<p>{{ widgetId }}</p>
		</div>
		<div class="field lm-margin-xl-b">
			<label>{{ lang.title }}</label>
			<p>{{ title }}</p>
		</div>
		<div class="field lm-margin-xl-b">
			<label>{{ lang.name }}</label>
			<p>{{ name }}</p>
		</div>
		<div class="field lm-margin-xl-b" *ngIf="titleBasedOn">
			<label>{{ lang.basedOn }}</label>
			<p>{{ titleBasedOn }} ({{ widget.definition.standardWidgetId }})</p>
		</div>
		<div class="field lm-margin-xl-b" *ngIf="version">
			<label>{{ lang.version }}</label>
			<p>{{ displayVersion }}</p>
		</div>
		<div class="field lm-margin-xl-b" *ngIf="ownerName">
			<label>{{ lang.owner }}</label>
			<p>{{ ownerName }}</p>
		</div>
		<div class="field lm-margin-xl-b" *ngIf="deprecationInfo">
			<p id="lm-web-deprecated" class="lm-color-red">{{ deprecationInfo }}</p>
		</div>
		<div class="field lm-margin-xl-b" *ngIf="helpUrl">
			<a
				id="lm-wab-help"
				class="hyperlink"
				href="{{ helpUrl }}"
				target="_blank"
				soho-tooltip
				[title]="helpUrl"
				>{{ lang.help }}</a
			>
		</div>
	</div>

	<ul id="lm-wab-cm" soho-popupmenu *ngIf="!isBroken">
		<li soho-popupmenu-item>
			<a soho-popupmenu-label id="lm-wab-c2c" (click)="copyToClipboard()">{{
				lang.copyToClipboard
			}}</a>
		</li>
	</ul>

	<div class="field lm-margin-xl-b" *ngIf="badges && badges.length">
		<lm-badges-popover [badges]="badges"> </lm-badges-popover>
	</div>

	<div class="modal-buttonset">
		<button
			id="lm-widget-about-close"
			class="btn-modal-primary"
			(click)="close()">
			{{ lang.close }}
		</button>
	</div>
</div>

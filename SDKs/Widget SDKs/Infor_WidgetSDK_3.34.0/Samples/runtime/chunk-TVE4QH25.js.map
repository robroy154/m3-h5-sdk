﻿<div
	id="lm-pp-div"
	class="e2e-pubPageConfig page-publish-dialog"
	soho-busyindicator
	[blockUI]="true"
	[activated]="isBusy"
	[displayDelay]="0">
	<span id="lm-pp-info-txt" class="e2e-pubPageConfig-span lm-info-text">{{
		isPublished ? lang.pageChangeAffectAll : lang.publishPageDescription
	}}</span>
	<div soho-tabs class="tab-container lm-margin-zero-b lm-margin-sm-t">
		<ul class="tab-list" soho-tab-list>
			<li id="lm-pp-tab-item-gen" soho-tab class="tab e2e-ppc-tabGeneral">
				<a soho-tab-title tabId="tabGeneral" (click)="onClickTab('general')">{{
					lang.settings
				}}</a>
			</li>
			<li
				id="lm-pp-tab-item-trn"
				soho-tab
				class="tab e2e-ppc-tabTranslations"
				*ngIf="translationEnabled">
				<a
					soho-tab-title
					tabId="tabTranslations"
					(click)="onClickTab('translations')"
					>{{ lang.translations }}</a
				>
			</li>
			<li id="lm-pp-tab-item-acc" soho-tab class="tab e2e-ppc-tabAccessLevel">
				<a
					soho-tab-title
					tabId="tabAccessLevel"
					(click)="onClickTab('accessLevel')"
					>{{ lang.permissions }}</a
				>
			</li>
		</ul>

		<div soho-tab-panel tabId="tabGeneral" class="tab-panel">
			<div class="field">
				<label
					id="lm-pp-name-lbl"
					for="name"
					class="required e2e-pubPageConfig-name"
					>{{ lang.title }}</label
				>
				<input
					id="name"
					name="name"
					type="text"
					class="e2e-ppc-name-input"
					[(ngModel)]="pageData.title"
					[maxlength]="pageTitleLength"
					data-validate="required"
					aria-required="true"
					required />
			</div>

			<div class="field lm-margin-md-t">
				<label
					id="lm-pp-desc-lbl"
					for="description"
					class="required e2e-pubPageConfig-descr"
					>{{ lang.description }}</label
				>
				<textarea
					id="description"
					name="description"
					soho-textarea
					class="resizable e2e-ppc-descr-textarea lm-max-height-l"
					[maxlength]="pageDescriptionLength"
					[(ngModel)]="pageData.description"
					data-validate="required"
					aria-required="true"
					required></textarea>
			</div>

			<lm-tags-customize-component
				[tags]="tags"
				[maxNr]="5"></lm-tags-customize-component>

			<div class="field lm-margin-md-t colorpicker-min-width">
				<label for="lm-pp-color">{{ lang.pageColor }}</label>
				<input
					id="lm-pp-color"
					name="lm-pp-color"
					soho-colorpicker
					class="colorpicker-input-md"
					[(ngModel)]="pageColor"
					[editable]="colorpickerOptions.editable"
					[showLabel]="colorpickerOptions.showLabel"
					[colors]="colorpickerOptions.colors"
					[clearable]="false"
					[attributes]="{ name: 'id', value: 'lm-pp-page-color' }" />
			</div>
			<div class="field switch lm-margin-md-t" *ngIf="mobilePagesFeature">
				<input
					id="lm-pp-mob-switch"
					name="lm-pp-mob-switch"
					type="checkbox"
					class="switch"
					[(ngModel)]="enableForMobile" />
				<label id="lm-pp-link-mob-lbl" for="lm-pp-mob-switch">{{
					lang.publishMobileLabel
				}}</label>
			</div>
			<div class="field switch lm-margin-md-t">
				<input
					id="lm-pp-link-switch"
					name="lm-pp-link-switch"
					type="checkbox"
					class="switch"
					[(ngModel)]="link.enabled" />
				<label id="lm-pp-link-switch-lbl" for="lm-pp-link-switch">{{
					lang.showPageLink
				}}</label>
			</div>
			<div class="field lm-margin-md-t" *ngIf="link.enabled">
				<label
					id="lm-pp-link-title-lbl"
					for="lm-pp-link-title"
					class="required"
					>{{ lang.pageLinkTitle }}</label
				>
				<input
					id="lm-pp-link-title"
					name="lm-pp-link-title"
					type="text"
					[(ngModel)]="link.title"
					data-validate="required"
					aria-required="true"
					[maxlength]="pageTitleLength"
					required />
			</div>
			<div class="field lm-margin-md-t" *ngIf="link.enabled">
				<label id="lm-pp-link-url-lbl" for="lm-pp-link-url" class="required">{{
					lang.pageLinkUrl
				}}</label>
				<input
					id="lm-pp-link-url"
					name="lm-pp-link-url"
					type="text"
					[(ngModel)]="link.url"
					data-validate="required"
					aria-required="true"
					maxlength="2048"
					required />
			</div>
			<div class="field switch lm-margin-md-t">
				<input
					id="lm-pp-memo-switch"
					name="lm-pp-memo-switch"
					type="checkbox"
					class="switch"
					[checked]="config.enableMemo === 1"
					#enableMemoCheckbox
					(change)="updateEnableMemo(enableMemoCheckbox.checked)" />
				<label id="lm-pp-memo-switch-lbl" for="lm-pp-memo-switch">{{
					lang.showAnnouncements
				}}</label>
			</div>
			<div class="field switch lm-margin-md-t" *ngIf="config.enableMemo">
				<input
					id="lm-pp-memo-animate"
					name="lm-pp-memo-animate"
					type="checkbox"
					class="switch"
					[checked]="config.disableAnimation === 0"
					#disableAnimationCheckbox
					(change)="
						updateDisableAnimation(!disableAnimationCheckbox.checked)
					" />
				<label id="lm-pp-memo-animate-lbl" for="lm-pp-memo-animate">{{
					lang.animateAnnouncements
				}}</label>
			</div>
			<div class="field lm-margin-md-t" *ngIf="config.enableMemo">
				<label id="lm-pp-memo-dur-lbl" for="lm-pp-memo-dur">{{
					lang.slideDuration
				}}</label>
				<select
					soho-dropdown
					class="input-sm"
					[(ngModel)]="config.memoDuration"
					name="lm-pp-memo-dur"
					[attributes]="{ name: 'id', value: 'lm-pp-memo-duration' }"
					[noSearch]="true">
					<option
						[ngValue]="value"
						id="lm-pp-memo-dur-option-{{ value }}"
						*ngFor="let value of allowedMemoDuration">
						{{ formatMemoDuration(value) }}
					</option>
				</select>
			</div>
		</div>

		<div
			tabId="tabTranslations"
			soho-tab-panel
			*ngIf="translationEnabled"
			class="tab-panel">
			<lm-translations-component
				[parameter]="localization"
				[category]="category"></lm-translations-component>
		</div>

		<div tabId="tabAccessLevel" soho-tab-panel class="tab-panel">
			<lm-entity-access-component
				[options]="accessOptions"></lm-entity-access-component>
		</div>
	</div>

	<div class="modal-buttonset">
		<button
			id="lm-page-publish-cancel"
			type="button"
			class="btn-modal e2e-pagePublishCancel"
			(click)="dialog?.close()"
			[disabled]="isBusy">
			{{ lang.cancel }}
		</button>
		<button
			id="lm-page-publish-apply"
			type="button"
			class="btn-modal-primary no-validation e2e-pagePublishConfirm"
			[disabled]="!canSave()"
			(click)="apply()">
			{{ lang.apply }}
		</button>
	</div>
</div>

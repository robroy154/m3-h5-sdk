﻿<button
	soho-button="icon"
	icon="info-linear"
	soho-tooltip
	placement="right"
	trigger="click"
	class="lm-margin-zero-r"
	[class.is-banner]="inBannerContainer()"
	[popover]="true"
	[content]="'#popover-content-' + widget.elementId"
	[attr.name]="widget.title | lmAutoId: 'lm-pedt-info-icon'"
	[attributes]="{ name: 'id', value: autoId + '-info-icon' }"></button>
<div
	[id]="'popover-content-' + widget.elementId"
	class="hidden edit-layout-details"
	[class.is-banner]="inBannerContainer()">
	<fieldset>
		<div class="summary-form">
			<div class="field" *ngIf="widget.isRestricted || widget.isBroken">
				<span class="label">{{ lang.details }}</span>
				<span class="data">{{ widget.brokenMessage }}</span>
			</div>
			<div class="field">
				<span class="label">{{ lang.bannedEnabled }}</span>
				<span class="data banner-info">
					<svg
						soho-icon
						[icon]="bannerInfoIcon"
						[class.banner-enabled]="widget.isBannerEnabled"></svg>
					<span>{{ bannerInfoText }}</span>
				</span>
			</div>
			<ng-container *ngIf="!inBannerContainer()">
				<div
					class="field"
					lm-widget-size-display
					[size]="{
						cols: widget.standardSize.columnSpan,
						rows: widget.standardSize.rowSpan
					}"
					[indicatorLabel]="lang.standardSize"></div>
				<div
					class="field"
					lm-widget-size-display
					[size]="{
						cols: widget.maxSize.columnSpan,
						rows: widget.maxSize.rowSpan
					}"
					[indicatorLabel]="lang.maxSize"></div>
			</ng-container>
		</div>
	</fieldset>
</div>

﻿﻿
<div
	id="lm-pnew-div"
	class="e2e-newPageDialog"
	soho-busyindicator
	[blockUI]="true"
	[activated]="isBusy"
	[displayDelay]="0">
	<div class="field">
		<label id="lm-pnew-ttl-lbl" for="pageTitle" class="required">{{
			lang.title
		}}</label>
		<input
			id="pageTitle"
			class="e2e-addPageTitle"
			type="text"
			maxlength="{{ pageTitleLength }}"
			[(ngModel)]="newPage.title"
			data-validate="required" />
	</div>

	<div class="field">
		<label id="lm-pnew-desc-lbl" for="pageDescription" class="required">{{
			lang.description
		}}</label>
		<textarea
			soho-textarea
			maxlength="{{ pageDescriptionLength }}"
			id="pageDescription"
			class="e2e-addPageDescr"
			[(ngModel)]="newPage.description"
			data-validate="required"></textarea>
	</div>

	<div class="field colorpicker-min-width">
		<label id="lm-pnew-color-lbl" for="lm-pnew-color">{{
			lang.pageColor
		}}</label>
		<input
			id="lm-pnew-color"
			soho-colorpicker
			class="colorpicker-input-md"
			name="color"
			[(ngModel)]="pageColor"
			[editable]="colorpickerOptions.editable"
			[showLabel]="colorpickerOptions.showLabel"
			[colors]="colorpickerOptions.colors"
			[clearable]="false"
			[attributes]="{ name: 'id', value: 'lm-pnew-page-color' }" />
	</div>

	<div class="modal-buttonset">
		<button
			id="lm-pnew-cancel"
			type="button"
			class="btn-modal e2e-addPageCancel"
			[disabled]="isBusy"
			(click)="cancel()">
			{{ lang.cancel }}
		</button>
		<button
			id="lm-pnew-crt"
			type="button"
			class="btn-modal-primary"
			[disabled]="isBusy"
			(click)="create()">
			{{ lang.create }}
		</button>
	</div>
</div>

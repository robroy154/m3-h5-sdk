﻿<div
	id="lm-cat-f-div"
	class="featured-container"
	[ngClass]="visibleFeatured?.featuredClass">
	<div class="featured-header">
		<p id="lm-cat-f-hdr">{{ headerTitle }}</p>
		<div class="buttonset">
			<button
				id="lm-cat-f-details"
				soho-button="tertiary"
				icon="info-linear"
				[ripple]="false"
				class="lm-button-light"
				(click)="onClickDetails.emit(visibleFeatured)">
				{{ lang.viewDetails }}
			</button>
			<button
				id="lm-cat-f-add"
				soho-button="tertiary"
				icon="add"
				[ripple]="false"
				class="lm-button-light"
				*ngIf="canAdd"
				(click)="onClickAdd.emit({ item: visibleFeatured })">
				{{ addLabel }}
			</button>
		</div>
	</div>

	<div class="featured-slider">
		<ul>
			<li
				*ngFor="let featured of featuredItems; let i = index"
				[class.active-featured]="featured === visibleFeatured"
				[style.margin-left]="i === 0 ? -100 * selectedIndex + '%' : ''">
				<div *ngIf="i < limit">
					<div
						[attr.data-lm-cat-f-item-div]="i"
						[attr.name]="
							featured.title | lmAutoId: 'lm-cat-featured-item-header'
						"
						(click)="onClickDetails.emit(visibleFeatured)">
						<h1>{{ getTitle(featured) }}</h1>
					</div>
					<h3
						[attr.name]="
							featured.title | lmAutoId: 'lm-cat-featured-item-desc'
						">
						{{ getDescription(featured) | lmEllipsis: 200 }}
					</h3>
				</div>
			</li>
		</ul>
	</div>

	<div class="lm-navigator">
		<ng-container *ngIf="featuredItems?.length > 1">
			<button
				[attr.data-lm-cat-f-nav-btn]="i"
				[name]="featured.title | lmAutoId: 'lm-cat-select-featured-button'"
				*ngFor="let featured of featuredItems; let i = index"
				class="lm-switch-btn"
				[class.active]="visibleFeatured === featured"
				(click)="setFeatured(i)"
				soho-tooltip
				[title]="getTitle(featured)">
				<span *ngIf="i < limit" class="audible">{{ getTitle(featured) }}</span>
			</button>
		</ng-container>
	</div>
</div>

﻿<div id="lm-wset-div">
	<div class="lm-min-width-xl">
		<ng-container *ngFor="let setting of settings">
			<ng-container [ngSwitch]="setting.type">
				<ng-container *ngSwitchCase="'selector'">
					<div *ngIf="setting.isVisible" class="field">
						<label
							for="{{ setting.id }}"
							[ngClass]="{ required: setting.definition.isMandatory }"
							>{{ setting.label }}</label
						>
						<select
							soho-dropdown
							*ngIf="isEditMode || setting.definition.isEnabled !== false"
							[id]="setting.id"
							[(ngModel)]="setting.value"
							[attr.name]="getAutoId(setting)"
							[attributes]="{ name: 'id', value: getAutoId(setting) }"
							class="dropdown"
							[attr.data-lm-wsetting]="getPendoId(setting)"
							[data-validate]="getAttributeValue(setting)"
							[attr.aria-required]="getAttributeValue(setting)">
							<option *ngFor="let item of setting.values" [ngValue]="item">
								{{ item.text }}
							</option>
						</select>
						<input
							*ngIf="!isEditMode && setting.definition.isEnabled === false"
							[id]="setting.id"
							type="text"
							[(ngModel)]="setting.value.text"
							[readOnly]="setting.definition.isEnabled === false" />
					</div>
				</ng-container>
				<ng-container *ngSwitchCase="'boolean'">
					<div
						*ngIf="setting.isVisible"
						[ngClass]="{
							'switch lm-position-s': true,
							'lm-margin-sm-t': setting.isFirst
						}">
						<input
							[id]="setting.id"
							type="checkbox"
							class="switch"
							[attr.name]="getAutoId(setting)"
							[(ngModel)]="setting.value"
							[disabled]="!isEditMode && setting.definition.isEnabled === false"
							[attr.data-lm-wsetting]="getPendoId(setting)" />
						<label
							for="{{ setting.id }}"
							[attr.name]="getAutoId(setting) + 'lbl'"
							>{{ setting.label }}</label
						>
					</div>
				</ng-container>
				<ng-container *ngSwitchCase="'radio'">
					<div *ngIf="setting.isVisible" class="field">
						<label>{{ setting.label }}</label>
						<ng-container *ngFor="let item of setting.values; let i = index">
							<input
								type="radio"
								class="radio"
								[attr.id]="setting.id + i"
								[(ngModel)]="setting.value"
								[attr.name]="getAutoId(setting) + item.text"
								[value]="item"
								[disabled]="
									!isEditMode && setting.definition.isEnabled === false
								" />
							<label
								[attr.for]="setting.id + i"
								class="radio-label"
								[attr.name]="getAutoId(setting) + item.text + 'lbl'"
								>{{ item.text }}</label
							>
						</ng-container>
					</div>
				</ng-container>
				<ng-container *ngSwitchCase="'object'">
					<!-- Object settings are not supported in the metadata UI -->
				</ng-container>
				<ng-container *ngSwitchDefault>
					<ng-container *ngIf="setting.isVisible">
						<div
							class="field"
							[ngClass]="{ 'has-message': isWebWidgetUrlSetting(setting) }">
							<label
								for="{{ setting.id }}"
								[ngClass]="{ required: setting.definition.isMandatory }"
								>{{ setting.label }}</label
							>
							<input
								soho-input
								*ngIf="setting.name === 'lmWidgetTitle'"
								[id]="setting.id"
								[attr.name]="getAutoId(setting)"
								type="text"
								[(ngModel)]="setting.value"
								[maxlength]="widgetTitleMaxLength"
								[readOnly]="isTitleLocked || setting.isReadOnly" />
							<button
								class="btn-icon"
								*ngIf="setting.name === 'lmWidgetTitle'"
								(click)="onClickIsLocked()"
								[disabled]="isCatalogTitle"
								id="lm-wsetting-title-padlock">
								<svg
									*ngIf="isTitleLocked"
									class="icon"
									focusable="false"
									aria-hidden="true"
									role="presentation">
									<use xlink:href="#icon-locked"></use>
								</svg>
								<svg
									*ngIf="!isTitleLocked"
									class="icon"
									focusable="false"
									aria-hidden="true"
									role="presentation">
									<use xlink:href="#icon-unlocked"></use>
								</svg>
							</button>
							<input
								soho-input
								*ngIf="
									setting.type !== 'number' && setting.name !== 'lmWidgetTitle'
								"
								[id]="setting.id"
								type="text"
								[attr.name]="getAutoId(setting)"
								[(ngModel)]="setting.value"
								[maxlength]="setting.definition.maxLength || null"
								[readOnly]="setting.isReadOnly"
								[attr.data-lm-wsetting]="getPendoId(setting)"
								[data-validate]="getAttributeValue(setting)"
								[attr.aria-required]="getAttributeValue(setting)" />
							<input
								soho-input
								*ngIf="
									setting.type === 'number' && setting.name !== 'lmWidgetTitle'
								"
								[id]="setting.id"
								type="text"
								soho-mask
								process="number"
								[attr.name]="getAutoId(setting)"
								[allowThousandsSeparator]="false"
								[allowDecimal]="true"
								[allowNegative]="true"
								[decimalLimit]="10"
								[(ngModel)]="setting.value"
								[maxlength]="setting.definition.maxLength || null"
								[readOnly]="setting.isReadOnly"
								[attr.data-lm-wsetting]="getPendoId(setting)"
								[data-validate]="getAttributeValue(setting)"
								[attr.aria-required]="getAttributeValue(setting)" />
						</div>
						<i
							class="textarea-wordcount lm-max-width-xl lm-margin-xl-b"
							*ngIf="isWebWidgetUrlSetting(setting)"
							>{{ lang.httpUrlWarning }}</i
						>
					</ng-container>
				</ng-container>
			</ng-container>
		</ng-container>
	</div>
	<div id="lm-widget-settings-buttons" class="modal-buttonset">
		<button
			id="lm-widget-settings-cancel"
			class="btn-modal"
			(click)="onCancel()">
			{{ lang.cancel }}
		</button>
		<button
			id="lm-widget-settings-save"
			class="btn-modal-primary"
			[disabled]="!isSaveEnabled"
			(click)="onSave()">
			{{ isEditMode ? lang.apply : lang.save }}
		</button>
	</div>
</div>

<div style="width: 550px">
	<lm-dynamic-permissions
		[listLabel]="listLabel"
		[selectedExpressions]="selectedExpressions"
		[showRecent]="showRecent"
		[showOperator]="showOperator"
		[operator]="operator"
		(selectedChange)="onSelected($event)"></lm-dynamic-permissions>

	<div class="modal-buttonset">
		<button
			type="button"
			id="lm-a-ssp-cancel-btn"
			class="btn-modal"
			(click)="modalDialog?.close()">
			Cancel
		</button>
		<button
			type="button"
			id="lm-a-ssp-save-btn"
			class="btn-modal-primary"
			(click)="save()"
			[disabled]="!selected && (isRequired || !selectedExpressions)">
			{{ isEditable ? "Save" : "OK" }}
		</button>
	</div>
</div>

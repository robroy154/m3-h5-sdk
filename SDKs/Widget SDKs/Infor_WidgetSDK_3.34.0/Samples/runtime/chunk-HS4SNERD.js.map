﻿<div>
	<div class="field">
		<label for="from" class="label">Available from</label>
		<input
			style="width: 300px"
			soho-datepicker
			[attributes]="{ name: 'name', value: 'lm-a-daterange-from' }"
			showTime="true"
			mode="standard"
			minuteInterval="1"
			[(ngModel)]="from" />
	</div>

	<div class="field">
		<label for="to" class="label">Available to</label>
		<input
			style="width: 300px"
			soho-datepicker
			[attributes]="{ name: 'name', value: 'lm-a-daterange-to' }"
			showTime="true"
			mode="standard"
			minuteInterval="1"
			[(ngModel)]="to" />
	</div>

	<div class="field">
		<label for="timezone" class="label">Time zone</label>
		<select
			style="width: 300px"
			soho-dropdown
			name="lm-a-daterange-dialog-timezone"
			[attributes]="{ name: 'id', value: 'lm-a-daterange-dialog-timezone' }"
			[(ngModel)]="timeZone">
			<option *ngFor="let zone of timeZones" [ngValue]="zone.id">
				{{ zone.name }}
			</option>
		</select>
	</div>

	<div class="modal-buttonset">
		<button
			type="button"
			class="btn-modal"
			(click)="cancel()"
			id="lm-a-daterange-dialog-cancel">
			Cancel
		</button>
		<button
			type="button"
			class="btn-modal-primary"
			(click)="save()"
			id="lm-a-daterange-dialog-save">
			Save
		</button>
	</div>
</div>

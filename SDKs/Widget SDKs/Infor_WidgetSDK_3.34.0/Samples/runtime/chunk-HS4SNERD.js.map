<div class="field">
	<label soho-label>Recurrence</label>
	<ng-container *ngFor="let option of recurrenceOptions">
		<input
			type="radio"
			soho-radiobutton
			(change)="recurrenceChanged(option.value)"
			[(ngModel)]="recurrence"
			[id]="option.id"
			[name]="option.id"
			[value]="option.value" />
		<label soho-label [for]="option.id" [forRadioButton]="true">{{
			option.label
		}}</label>
		<br />
	</ng-container>
</div>
<ng-container *ngIf="showRecurrencePatterns">
	<label soho-label>Recurrence pattern</label>
	<div *ngIf="showWeekRecurrence" class="recurrence-container">
		<lm-admin-memo-date-weekly
			[iteration]="memo.iteration"></lm-admin-memo-date-weekly>
	</div>
	<div *ngIf="showMonthRecurrence" class="recurrence-container">
		<lm-admin-memo-date-monthly
			[iteration]="memo.iteration"></lm-admin-memo-date-monthly>
	</div>
	<div *ngIf="showYearRecurrence" class="recurrence-container">
		<lm-admin-memo-date-yearly
			[iteration]="memo.iteration"></lm-admin-memo-date-yearly>
	</div>
</ng-container>

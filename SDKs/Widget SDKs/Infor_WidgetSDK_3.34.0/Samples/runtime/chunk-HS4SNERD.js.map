<p class="permission-label">{{ listLabel }}</p>

<div class="permissions-toolbar">
	<input
		soho-toolbar-searchfield
		id="lm-a-ssp-search-inp"
		[(ngModel)]="query"
		(ngModelChange)="onSearch($event)"
		[clearable]="true"
		(cleared)="clearSearch()"
		placeholder="Search for policies..." />
	<ng-container *ngIf="showOperator">
		<label class="label">Match selected</label>
		<select
			name="lm-a-ssp-match"
			style="margin-top: 8px"
			soho-dropdown
			[attributes]="{ name: 'id', value: 'lm-a-ssp-match' }"
			class="dropdown-xs"
			[(ngModel)]="operator"
			(change)="onOperatorChange()">
			<option value="||">Any</option>
			<option value="&&">All</option>
		</select>
	</ng-container>
</div>

<soho-swaplist
	availableCardTitle="Security Policies"
	selectedCardTitle="Selected"
	(beforeswap)="onBeforeSwap()"
	(updated)="onSwapUpdate()"
	soho-busyindicator
	[blockUI]="true"
	[displayDelay]="0"
	[activated]="isBusy"
	[attributes]="idAttr">
</soho-swaplist>
<div class="footer-container">
	<div
		class="warning-container"
		*ngIf="brokenPoliciesMessage$ | async as brokenPoliciesMessage">
		<svg
			soho-icon
			id="lm-a-ssp-tooltip"
			icon="alert"
			[alert]="true"
			soho-tooltip
			placement="right"
			[popover]="true"
			content="#lm-a-ssp-invalid"></svg>
		<div id="lm-a-ssp-invalid" class="hidden">
			<fieldset>
				<legend>
					<svg soho-icon icon="alert" style="top: 0" [alert]="true"></svg>
					{{ brokenPoliciesMessage.header }}
				</legend>
				<div class="summary-form">
					<small>{{ brokenPoliciesMessage.message }}</small>
					<div class="field lm-margin-xl-t lm-margin-sm-b">
						<span
							*ngFor="
								let invalidTitle of brokenPoliciesMessage.invalidTitles;
								let last = last
							"
							class="data lm-display-inline"
							>{{ invalidTitle + (last ? "" : ", ") }}</span
						>
					</div>
				</div>
			</fieldset>
		</div>
	</div>
	<div class="actions-container">
		<ng-container *ngIf="isAdministrator$ | async; else viewButton">
			<button
				soho-button="tertiary"
				id="lm-a-ssp-edit-btn"
				icon="edit"
				[disabled]="!editInfo"
				(click)="onEdit()">
				Edit Policy
			</button>
			<button
				soho-button="tertiary"
				id="lm-a-ssp-add-btn"
				icon="add"
				(click)="onAdd()">
				Add New Policy
			</button>
		</ng-container>
		<ng-template #viewButton>
			<button
				soho-button="tertiary"
				id="lm-a-ssp-view-btn"
				[disabled]="!editInfo"
				(click)="onView()">
				View Policy
			</button>
		</ng-template>
	</div>
</div>

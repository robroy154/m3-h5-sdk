<div
	soho-busyindicator
	[activated]="isBusy"
	[blockUI]="true"
	[displayDelay]="0">
	<soho-toolbar-flex (selected)="onSelectedToolbar($event)">
		<soho-toolbar-flex-section
			[isTitle]="true"
			class="lm-info-text-md"
			id="lm-a-arc-maxtitle">
			<svg
				soho-icon
				icon="alert"
				[alert]="true"
				soho-tooltip
				[title]="quotaTitle"
				*ngIf="isCloseToMaxQuota"
				id="lm-a-arc-maxicon"></svg>
			{{ toolbarTitle }}
		</soho-toolbar-flex-section>
		<soho-toolbar-flex-section [isSearch]="true">
			<input
				soho-toolbar-flex-searchfield
				[clearable]="true"
				[collapsible]="true"
				maxlength="64"
				[(ngModel)]="query"
				[disabled]="toolbarDisabled"
				(cleared)="clearSearch()"
				(lm-submit)="search()"
				(keydown.esc)="clearSearch()"
				id="lm-a-arc-search"
				(focus)="onSearchfieldFocus()"
				(blur)="onSearchfieldFocusLost()" />
		</soho-toolbar-flex-section>
		<soho-toolbar-flex-section [isButtonSet]="true">
			<button
				soho-menu-button
				menu="lm-a-arc-sort"
				[disabled]="toolbarDisabled"
				type="button"
				icon="sort-down">
				{{ orderBy.name }}
			</button>
			<ul soho-popupmenu id="lm-a-arc-sort">
				<li soho-popupmenu-item *ngFor="let item of orderByItems">
					<a
						soho-popupmenu-label
						[name]="item.name | lmAutoId: 'lm-a-arc-sortorder'"
						(click)="setOrderBy(item)"
						>{{ item.name }}</a
					>
				</li>
			</ul>
			<button
				soho-menu-button
				menu="lm-a-arc-flt"
				[disabled]="toolbarDisabled"
				class="btn-menu"
				type="button"
				icon="filter"
				soho-tooltip
				[title]="filterTooltip">
				<svg soho-icon *ngIf="isFiltered" icon="info" [alert]="true"></svg>
				Filter
			</button>
			<ul soho-popupmenu id="lm-a-arc-flt" class="is-selectable">
				<li
					soho-popupmenu-item
					*ngFor="let item of filterItems"
					[isChecked]="item.selected">
					<a
						soho-popupmenu-label
						[name]="item.name | lmAutoId: 'lm-a-arc-filteroption'"
						(click)="onFilter(item, viewRef, $event)"
						>{{ item.name }}</a
					>
				</li>
			</ul>
			<button
				soho-button="icon"
				id="lm-a-arc-rfr"
				icon="refresh"
				data-action="refresh"
				style="border: 0; margin-bottom: 0"
				soho-tooltip
				title="Refresh">
				<span class="audible">Refresh</span>
			</button>
		</soho-toolbar-flex-section>

		<soho-toolbar-flex-more-button> </soho-toolbar-flex-more-button>
	</soho-toolbar-flex>

	<div class="contextual-toolbar toolbar is-hidden">
		<div class="title">Actions</div>
		<div class="buttonset">
			<ng-container *ngIf="!isReadOnly">
				<button
					soho-button="tertiary"
					id="lm-a-arc-dlt"
					icon="delete"
					(click)="onClickDelete(selected)">
					Delete
				</button>
				<div class="separator"></div>
				<button
					soho-button="tertiary"
					id="lm-a-arc-rst"
					icon="reset"
					(click)="onClickRestore(selected)">
					Restore
				</button>
			</ng-container>
		</div>
	</div>
	<div
		soho-datagrid
		#archiveDatagrid
		id="lm-a-arc-grid"
		[gridOptions]="datagridOptions"
		[data]="datagridOptions.dataset"
		(selected)="updateSelection($event.rows)"></div>

	<div class="lm-admin-quota-message">
		<p *ngIf="!toolbarDisabled" id="lm-a-arc-showcounttext">
			{{ getItemCountText() }}
			<span *ngIf="isSearchActive || filter.type"
				>There are active filters.
				<a
					soho-hyperlink
					id="lm-a-arc-clear-filters"
					(click)="clearAllFilters()"
					>Clear all</a
				>
			</span>
		</p>
	</div>
	<button
		id="lm-a-more-btn"
		soho-button="secondary"
		(click)="more()"
		[disabled]="isBusy || !hasMore">
		More
	</button>
</div>

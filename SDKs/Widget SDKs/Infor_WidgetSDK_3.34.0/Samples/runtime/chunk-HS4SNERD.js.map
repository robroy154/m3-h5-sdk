<div style="max-width: 450px">
	<div soho-tab-list-container>
		<div soho-tabs>
			<ul soho-tab-list>
				<li soho-tab>
					<a soho-tab-title id="lm-a-dp-cs-basictab" tabId="tab-basic">Basic</a>
				</li>
				<li soho-tab>
					<a soho-tab-title id="lm-a-dp-cs-trantab" tabId="tab-translations"
						>Translations</a
					>
				</li>
			</ul>
			<div soho-tab-panel-container>
				<div soho-tab-panel tabId="tab-basic">
					<div class="field">
						<label soho-label>Title</label>
						<input
							[(ngModel)]="container.t"
							id="lm-a-dp-cs-ttl-inp"
							maxlength="128"
							class="input-lg"
							(ngModelChange)="onTitleChange($event)" />
					</div>

					<lm-icon-selector
						[icon]="container.i"
						[color]="container.icl"
						[colorType]="container.clt"
						[hasParent]="false"
						(iconChanged)="onIconChanged($event)"
						(colorChanged)="onColorChanged($event)"
						(colorTypeChanged)="onColorTypeChanged($event)"></lm-icon-selector>

					<div class="field lm-margin-md-t" *ngIf="isLinkList">
						<label class="lm-margin-md-b">Collapsible links</label>
						<input
							soho-radiobutton
							id="lm-dp-cs-expnone-chk"
							type="radio"
							[value]="expandStrategies.None"
							[(ngModel)]="container.ex" />
						<label
							soho-label
							id="lm-dp-cs-clinks-no-label"
							for="lm-dp-cs-expnone-chk"
							[forRadioButton]="true"
							>No</label
						>
						<br />
						<input
							soho-radiobutton
							id="lm-dp-cs-expexp-chk"
							type="radio"
							[value]="expandStrategies.Expanded"
							[(ngModel)]="container.ex" />
						<label
							soho-label
							id="lm-dp-cs-clinks-yes-expanded-label"
							for="lm-dp-cs-expexp-chk"
							[forRadioButton]="true"
							>Yes (expanded by default)</label
						>
						<br />
						<input
							soho-radiobutton
							id="lm-dp-cs-expcoll-chk"
							type="radio"
							[value]="expandStrategies.Collapsed"
							[(ngModel)]="container.ex" />
						<label
							soho-label
							id="lm-dp-cs-clinks-yes-collapsed-label"
							for="lm-dp-cs-expcoll-chk"
							[forRadioButton]="true"
							>Yes (collapsed by default)</label
						>
					</div>

					<div
						class="field"
						*ngIf="isMainAreaContainer"
						lm-widget-size-display
						[size]="size"
						[includeSizeSelector]="true"
						selectionLabel="Sizing"
						(sizeChanged)="setSize($event)"></div>

					<div class="modal-buttonset">
						<button
							type="button"
							id="lm-a-dp-cs-cncl-btn"
							class="btn-modal"
							(click)="modalDialog?.close()">
							Cancel
						</button>
						<button
							type="button"
							id="lm-a-dp-cs-save-btn"
							class="btn-modal-primary"
							(click)="save()">
							{{ isEditable ? "Save" : "OK" }}
						</button>
					</div>
				</div>
				<div soho-tab-panel tabId="tab-translations">
					<lm-dynamic-page-translations
						[localizations]="container?.lzn"
						[optionsItems]="optionsItems"
						[isAddDisabled]="!isTranslateable"
						(localizationChange)="onLocalizationChange($event)">
					</lm-dynamic-page-translations>
				</div>
			</div>
		</div>
	</div>
</div>

<div style="width: 550px">
	<div soho-tabs>
		<div soho-tab-list-container>
			<ul soho-tab-list>
				<li soho-tab>
					<a soho-tab-title id="lm-a-dp-aeweb-basictab" tabId="Basic">Basic</a>
				</li>
				<li soho-tab [selected]="isPermissionTabOnInit">
					<a soho-tab-title id="lm-a-dp-aeweb-pmtab" tabId="Permissions"
						>Permissions</a
					>
				</li>
			</ul>
		</div>
	</div>
	<div soho-tab-panel-container>
		<div soho-tab-panel tabId="Basic">
			<form [formGroup]="form">
				<div class="field">
					<label class="required">URL</label>
					<input
						formControlName="url"
						id="lm-a-dp-aeweb-url-inp"
						[maxlength]="urlMaxLength"
						data-validate="required" />
				</div>
				<div class="field">
					<label soho-label>Action</label>

					<input
						soho-radiobutton
						type="radio"
						id="lm-a-dp-aeweb-actionnone-chk"
						value="none"
						formControlName="action" />
					<label
						soho-label
						[forRadioButton]="true"
						for="lm-a-dp-aeweb-actionnone-chk"
						>None</label
					>
					<br />
					<input
						soho-radiobutton
						type="radio"
						id="lm-a-dp-aeweb-actionrefresh-chk"
						value="refresh"
						formControlName="action" />
					<label
						soho-label
						[forRadioButton]="true"
						for="lm-a-dp-aeweb-actionrefresh-chk"
						>Refresh</label
					>
					<br />
					<input
						soho-radiobutton
						type="radio"
						id="lm-a-dp-aeweb-actionlaunch-chk"
						value="launch"
						formControlName="action" />
					<label
						soho-label
						[forRadioButton]="true"
						for="lm-a-dp-aeweb-actionlaunch-chk"
						>Launch</label
					>
				</div>
				<div class="field" *ngIf="showLaunchUrl">
					<label class="required">Launch URL</label>
					<input
						formControlName="launchUrl"
						id="lm-a-dp-aeweb-launchurl-inp"
						[maxlength]="urlMaxLength"
						data-validate="required" />
				</div>
			</form>
		</div>
		<div soho-tab-panel tabId="Permissions">
			<lm-dynamic-permissions
				[listLabel]="listLabel"
				[selectedExpressions]="selectedExpressions"
				[(selected)]="expressions"
				[operator]="web.op"
				[showOperator]="true"></lm-dynamic-permissions>
		</div>
	</div>
	<div class="modal-buttonset">
		<button
			type="button"
			id="lm-a-dp-aeweb-cncl-btn"
			class="btn-modal"
			(click)="close()">
			Cancel
		</button>
		<button
			type="button"
			id="lm-a-dp-aeweb-save-btn"
			class="btn-modal-primary"
			(click)="save()"
			[disabled]="!form.valid">
			{{ isEditable ? "Save" : "OK" }}
		</button>
	</div>
</div>

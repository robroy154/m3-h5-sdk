﻿<div
	soho-busyindicator
	[activated]="isBusy"
	[blockUI]="true"
	[displayDelay]="0">
	<div class="field">
		<label for="autocomplete-private-pages">Search</label>
		<div class="searchfield-wrapper">
			<input
				soho-searchfield
				class="lm-autocomplete-searchfield input-lg"
				id="autocomplete-private-pages"
				[placeholder]="placeholder"
				maxlength="254"
				[options]="searchfieldOptions"
				[(ngModel)]="searchQuery"
				[class.lm-clearable]="searchQuery"
				[source]="autocompleteSource"
				[template]="autocompleteTemplate"
				(selected)="onSelected($event)"
				(lm-submit)="onSearch()"
				(cleared)="clearSearch()"
				(keydown.esc)="clearSearch()" />
		</div>
	</div>

	<soho-toolbar-flex *ngIf="showToolbar" (selected)="onSelectedToolbar($event)">
		<soho-toolbar-flex-section
			[isTitle]="true"
			class="lm-info-text-md"
			id="lm-a-prp-user"
			>{{ flexToolbarTitle }}</soho-toolbar-flex-section
		>
		<soho-toolbar-flex-section [isButtonSet]="true">
			<ng-container *ngIf="selectedUser">
				<button
					soho-button="tertiary"
					icon="export"
					[disabled]="!items.length"
					data-action="exportAll"
					id="lm-a-prp-exportall">
					Export All
				</button>
				<button
					soho-button="tertiary"
					icon="import"
					data-action="importPages"
					id="lm-a-prp-import">
					Import
				</button>
				<div class="separator"></div>
			</ng-container>
			<button
				soho-button="icon"
				icon="refresh"
				data-action="refresh"
				style="border: 0; margin-bottom: 0"
				soho-tooltip
				title="Refresh"
				id="lm-a-prp-refresh">
				<span class="audible">Refresh</span>
			</button>
		</soho-toolbar-flex-section>

		<soho-toolbar-flex-more-button> </soho-toolbar-flex-more-button>
	</soho-toolbar-flex>

	<div *ngIf="selectionCount > 0" class="contextual-toolbar toolbar">
		<div class="title">Actions</div>
		<div class="buttonset">
			<button
				soho-button="tertiary"
				icon="delete"
				(click)="deletePages()"
				id="lm-a-prp-delete">
				Delete ({{ selectionCount }})
			</button>
			<button
				*ngIf="isUserCategorySelected"
				soho-button="tertiary"
				icon="export"
				(click)="exportPages()"
				id="lm-a-prp-export">
				Export ({{ selectionCount }})
			</button>
		</div>
	</div>
	<div
		*ngIf="showGrid"
		id="adminPrivatePagesGrid"
		soho-datagrid
		[gridOptions]="datagridOptions"
		[data]="datagridOptions.dataset"
		(selected)="updateSelection($event.rows)"></div>
</div>

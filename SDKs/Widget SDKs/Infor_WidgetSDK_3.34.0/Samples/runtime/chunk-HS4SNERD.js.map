<div>
	<label id="lm-a-mm-pv-sa-lbl">Show as</label>

	<fieldset class="radio-group">
		<input
			type="radio"
			class="radio"
			name="options"
			id="lm-a-mm-pv-tw"
			[(ngModel)]="mode"
			value="top"
			checked />
		<label id="lm-a-mm-pv-tw-lbl" for="lm-a-mm-pv-tw" class="radio-label"
			>Top bar widget</label
		>
		<br />

		<ng-container *ngIf="isBannerFeature">
			<input
				type="radio"
				class="radio"
				name="options"
				id="lm-a-mm-pv-bw"
				[(ngModel)]="mode"
				value="banner" />
			<label id="lm-a-mm-pv-bw-lbl" for="lm-a-mm-pv-bw" class="radio-label"
				>Banner widget</label
			>
			<br />
		</ng-container>

		<input
			type="radio"
			class="radio"
			name="options"
			id="lm-a-mm-pv-rw"
			[(ngModel)]="mode"
			value="regular" />
		<label id="lm-a-mm-pv-rw" for="lm-a-mm-pv-rw" class="radio-label"
			>Regular widget</label
		>
	</fieldset>

	<div
		id="lm-a-mm-pv-sz"
		class="field"
		[hidden]="!showSize"
		lm-widget-size-display
		[size]="size"
		[maxSize]="maxSize"
		[includeSizeSelector]="true"
		selectionLabel="Sizing"
		(sizeChanged)="setSize($event)"></div>

	<div class="field">
		<label id="lm-a-mm-pv-color-lbl" for="lm-a-mm-pv-color">Page Color</label>
		<input
			id="lm-a-mm-pv-color"
			soho-colorpicker
			name="color"
			[(ngModel)]="color"
			[attributes]="{ name: 'id', value: 'lm-a-mm-preview-color' }"
			[editable]="colorpickerOptions.editable"
			[showLabel]="colorpickerOptions.showLabel"
			[colors]="colorpickerOptions.colors"
			[clearable]="false" />
	</div>
</div>

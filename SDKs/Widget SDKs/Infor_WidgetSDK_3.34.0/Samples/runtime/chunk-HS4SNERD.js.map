﻿<div
	soho-busyindicator
	[blockUI]="true"
	[displayDelay]="0"
	[activated]="isBusy">
	<div class="field">
		<label
			for="propertyName"
			class="label required"
			id="lm-a-prop-edit-name-label"
			>Name</label
		>
		<input
			*ngIf="isEdit === true"
			name="propertyName"
			[(ngModel)]="property.propertyId"
			readonly="true"
			id="lm-a-prop-edit-name" />
		<input
			*ngIf="isEdit === false"
			name="propertyName"
			[(ngModel)]="property.propertyId"
			maxlength="64"
			data-validate="required"
			soho-input
			soho-mask
			[options]="maskOptions"
			required
			id="lm-a-prop-edit-name" />
	</div>

	<div class="field">
		<label for="propertyArea" class="label">Area</label>
		<input
			id="propertyArea"
			name="propertyArea"
			[(ngModel)]="property.area"
			maxlength="64" />
	</div>

	<div class="field">
		<label for="propertyDescription" class="label">Description</label>
		<textarea
			soho-textarea
			type="text"
			maxlength="256"
			name="propertyDescription"
			id="propertyDescription"
			[(ngModel)]="property.description"></textarea>
	</div>

	<div class="field">
		<label for="propertyValue" class="label required">Value</label>
		<textarea
			soho-textarea
			type="text"
			maxlength="256"
			name="propertyValue"
			id="propertyValue"
			[(ngModel)]="property.propertyValue"
			data-validate="required"
			required></textarea>
	</div>
	<div class="modal-buttonset">
		<button
			class="btn-modal"
			(click)="close()"
			[disabled]="isBusy"
			id="lm-a-prop-edit-dialog-cancel">
			Cancel
		</button>
		<button
			class="btn-modal-primary"
			(click)="onOk()"
			[disabled]="isBusy"
			id="lm-a-prop-edit-dialog-ok">
			{{ addEditBtnLabel }}
		</button>
	</div>
</div>

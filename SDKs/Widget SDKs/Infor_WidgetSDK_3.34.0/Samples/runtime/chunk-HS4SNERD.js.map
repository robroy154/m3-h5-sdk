﻿<div
	#defaultPagesView
	soho-busyindicator
	[activated]="isBusy"
	[blockUI]="true"
	[displayDelay]="0">
	<soho-toolbar-flex (selected)="onSelectedToolbar($event)">
		<soho-toolbar-flex-section [isTitle]="true" class="lm-info-text-md">
			<span soho-toolbar-section-title id="lm-a-set-es-h">Default pages</span>
		</soho-toolbar-flex-section>
		<soho-toolbar-flex-section [isButtonSet]="true">
			<button
				soho-button="tertiary"
				id="lm-a-set-es-ap"
				icon="add"
				data-action="openPageSelector">
				Add Pages
			</button>
		</soho-toolbar-flex-section>

		<soho-toolbar-flex-more-button> </soho-toolbar-flex-more-button>
	</soho-toolbar-flex>

	<div class="contextual-toolbar toolbar is-hidden">
		<div class="title" id="lm-a-set-es-tb-h">Actions</div>
		<div class="buttonset">
			<button
				soho-button="tertiary"
				id="lm-a-set-es-tb-d"
				icon="delete"
				(click)="deletePages()">
				Delete ({{ selectionCount }})
			</button>
		</div>
	</div>
	<div
		#defaultPagesGrid
		soho-datagrid
		(selected)="updateSelection($event.rows)"
		[gridOptions]="datagridOptions"
		[data]="datagridOptions.dataset"
		(cellchange)="updateValue()"
		(rowReordered)="onRowReordered($event)"
		(expandrow)="onExpandRow($event)"></div>
</div>

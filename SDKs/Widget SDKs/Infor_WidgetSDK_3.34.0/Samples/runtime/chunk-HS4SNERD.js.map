﻿<div
	soho-busyindicator
	[activated]="isBusy"
	[blockUI]="true"
	[displayDelay]="0">
	<!-- Show info if banner widgets arent enabled -->
	<div
		class="lm-admin-quota-message lm-margin-xl-b lm-pull-none"
		*ngIf="entityType === 3 && featureBannerOn === false">
		<svg soho-icon icon="alert" [alert]="true"></svg>
		<p class="lm-pull-left" id="lm-a-fbw-dmessage">
			Banner widgets are disabled. Enable the Banner Widget feature in the
			<a id="lm-a-fbw-dlink" href="" (click)="goToFeaturesPage($event)"
				>Features page</a
			>.
		</p>
	</div>
	<soho-toolbar-flex>
		<soho-toolbar-flex-section [isTitle]="true"></soho-toolbar-flex-section>
		<soho-toolbar-flex-section [isButtonSet]="true">
			<button
				soho-button="icon"
				icon="refresh"
				(click)="refresh()"
				style="border: 0; margin-bottom: 0"
				soho-tooltip
				title="Refresh">
				<span class="audible">Refresh</span>
			</button>
		</soho-toolbar-flex-section>
	</soho-toolbar-flex>

	<div class="contextual-toolbar toolbar is-hidden">
		<div class="title">Actions</div>
		<div class="buttonset">
			<button
				soho-button="tertiary"
				icon="delete"
				(click)="onClickRemoveAsFeatured()"
				*ngIf="!isReadOnly">
				Remove as Featured ({{ selectionCount }})
			</button>
			<button
				soho-button="tertiary"
				(click)="editAccess()"
				[disabled]="!canEdit()"
				*ngIf="!isReadOnly">
				Edit Permissions
			</button>
		</div>
	</div>

	<div
		soho-datagrid
		id="gridFeatured"
		[gridOptions]="datagridOptions"
		[data]="datagridOptions.dataset"
		(expandrow)="onExpandRow($event)"
		(selected)="updateSelection($event.rows)"
		(rowReordered)="onRowReordered($event)"></div>
</div>

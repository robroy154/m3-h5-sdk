<div class="row lm-margin-xl-t">
	<div class="twelve columns">
		<soho-toolbar-flex (selected)="onSelectedToolbar($event)">
			<soho-toolbar-flex-section [isTitle]="true" class="lm-info-text-md">
			</soho-toolbar-flex-section>

			<soho-toolbar-flex-section [isSearch]="true">
				<input
					soho-toolbar-flex-searchfield
					[clearable]="true"
					[collapsible]="true"
					maxlength="64"
					[(ngModel)]="query"
					[disabled]="toolbarDisabled"
					(cleared)="clearSearch()"
					(lm-submit)="search()"
					(keydown.esc)="clearSearch()"
					id="lm-a-arc-sel-search"
					(focus)="onSearchfieldFocus()"
					(blur)="onSearchfieldFocusLost()" />
			</soho-toolbar-flex-section>

			<soho-toolbar-flex-section [isButtonSet]="true">
				<!-- Sort -->
				<button
					soho-menu-button
					menu="lm-a-arc-sel-sort"
					[disabled]="toolbarDisabled"
					type="button"
					icon="sort-down">
					{{ orderBy.name }}
				</button>
				<ul soho-popupmenu id="lm-a-arc-sel-sort">
					<li soho-popupmenu-item *ngFor="let item of orderByItems">
						<a
							soho-popupmenu-label
							[name]="item.name | lmAutoId: 'lm-a-arc-sel-sortorder'"
							(click)="setOrderBy(item)"
							>{{ item.name }}</a
						>
					</li>
				</ul>
				<button
					soho-menu-button
					menu="lm-a-arc-sel-flt"
					[disabled]="toolbarDisabled"
					class="btn-menu"
					type="button"
					icon="filter"
					soho-tooltip
					[title]="filterTooltip">
					<svg soho-icon *ngIf="isFiltered" icon="info" [alert]="true"></svg>
					Filter
				</button>
				<ul soho-popupmenu id="lm-a-arc-sel-flt" class="is-selectable">
					<li
						soho-popupmenu-item
						*ngFor="let item of filterItems"
						[isChecked]="item.selected">
						<a
							soho-popupmenu-label
							[name]="item.name | lmAutoId: 'lm-a-arc-sel-filteroption'"
							(click)="onFilter(item)"
							>{{ item.name }}</a
						>
					</li>
				</ul>
				<button
					id="lm-a-arc-sel-ref"
					soho-button="icon"
					icon="refresh"
					data-action="refresh"
					style="border: 0; margin-bottom: 0"
					soho-tooltip
					title="Refresh">
					<span class="audible">Refresh</span>
				</button>
			</soho-toolbar-flex-section>

			<soho-toolbar-flex-more-button> </soho-toolbar-flex-more-button>
		</soho-toolbar-flex>

		<div class="contextual-toolbar toolbar is-hidden">
			<div class="title">{{ getTitle() }}</div>
			<div class="buttonset">
				<button
					id="lm-a-arc-sel-cho"
					soho-button="tertiary"
					icon="download"
					(click)="checkOutPage(selected)"
					*ngIf="archiveType === 1 && selected?.lock !== 1">
					Check out
				</button>
			</div>
		</div>
		<div
			soho-datagrid
			#entityDatagrid
			id="lm-a-arc-sel-grid"
			[gridOptions]="datagridOptions"
			[data]="datagridOptions.dataset"
			(selected)="updateSelection($event.rows)"></div>
		<div class="lm-pull-left lm-margin-md-t">
			<p *ngIf="!toolbarDisabled">
				{{ getItemCountText() }}
				<span *ngIf="isSearchActive || filter.type"
					>There are active filters.
					<a id="lm-a-arc-sel-clr" soho-hyperlink (click)="clearAllFilters()"
						>Clear all</a
					>
				</span>
			</p>
		</div>
		<button
			id="lm-a-more-btn"
			soho-button="secondary"
			(click)="more()"
			[disabled]="!hasMore">
			More
		</button>
	</div>
</div>
<div class="modal-buttonset">
	<button id="lm-a-arc-sel-cncl" class="btn-modal" (click)="dialog?.close()">
		Cancel
	</button>
	<button
		id="lm-a-arc-sel-ok"
		class="btn-modal-primary"
		[disabled]="!selected || !selected?.lockedByUser"
		(click)="closeWithSelected(selected)">
		OK
	</button>
</div>

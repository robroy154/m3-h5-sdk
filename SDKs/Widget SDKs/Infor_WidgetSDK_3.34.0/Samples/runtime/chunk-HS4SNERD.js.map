<lm-operation-messages
	[statusMessageList]="statusMessageList"
	[errorMessageList]="errorMessageList"
	[isCompleted]="isOperationComplete"></lm-operation-messages>
<div class="modal-buttonset">
	<button
		type="button"
		class="btn-modal"
		(click)="close()"
		[disabled]="!isOperationComplete"
		id="lm-a-op-message-dialog-close">
		Close
	</button>
</div>

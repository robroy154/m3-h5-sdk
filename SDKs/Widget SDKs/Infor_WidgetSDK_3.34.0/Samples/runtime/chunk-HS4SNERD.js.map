﻿<div
	soho-busyindicator
	[activated]="isBusy"
	[blockUI]="true"
	[displayDelay]="0">
	<soho-toolbar-flex (selected)="onSelectedToolbar($event)">
		<soho-toolbar-flex-section [isTitle]="true"></soho-toolbar-flex-section>
		<soho-toolbar-flex-section [isSearch]="true">
			<label class="audible" for="admin-tags-searchfield">Search</label>
			<input
				soho-toolbar-flex-searchfield
				[clearable]="true"
				[collapsible]="true"
				maxlength="32"
				[(ngModel)]="query"
				[disabled]="toolbarDisabled"
				(cleared)="clearSearch()"
				(lm-submit)="search()"
				(keydown.esc)="clearSearch()"
				id="admin-tags-searchfield"
				(focus)="onSearchfieldFocus()"
				(blur)="onSearchfieldFocusLost()" />
		</soho-toolbar-flex-section>
		<soho-toolbar-flex-section [isButtonSet]="true">
			<button
				soho-menu-button
				menu="lmAdminTagsSort"
				[disabled]="toolbarDisabled"
				type="button"
				icon="sort-down">
				{{ orderBy.name }}
			</button>
			<ul soho-popupmenu id="lmAdminTagsSort">
				<li
					soho-popupmenu-item
					*ngFor="let item of orderByItems"
					(click)="setOrderBy(item)">
					<a
						soho-popupmenu-label
						[name]="item.name | lmAutoId: 'lm-a-tags-sortorder'"
						>{{ item.name }}</a
					>
				</li>
			</ul>
			<button
				soho-menu-button
				id="lm-a-tags-filter"
				menu="lmAdminTagsFilter"
				[disabled]="toolbarDisabled"
				type="button"
				icon="filter"
				soho-tooltip
				[content]="filterTooltipFunc">
				<svg soho-icon *ngIf="filter.type > 0" icon="info" [alert]="true"></svg>
				Filter
			</button>
			<ul soho-popumenu id="lmAdminTagsFilter" class="is-selectable">
				<li
					soho-popupmenu-item
					*ngFor="let item of filterItems"
					(click)="onFilter(item, viewRef, $event); setFilterTooltip()"
					[isChecked]="item.selected">
					<a
						soho-popupmenu-label
						[name]="item.name | lmAutoId: 'lm-a-tags-filteroption'"
						>{{ item.name }}</a
					>
				</li>
			</ul>
			<div class="separator" *ngIf="!isReadOnly"></div>
			<button
				soho-button="tertiary"
				id="lm-a-tags-add"
				icon="add"
				data-action="add"
				*ngIf="!isReadOnly">
				Add Tags
			</button>
			<div class="separator"></div>
			<button
				soho-button="icon"
				id="lm-a-tags-refresh"
				icon="refresh"
				data-action="refresh"
				style="border: 0; margin-bottom: 0"
				soho-tooltip
				title="Refresh">
				<span class="audible">Refresh</span>
			</button>
		</soho-toolbar-flex-section>

		<soho-toolbar-flex-more-button> </soho-toolbar-flex-more-button>
	</soho-toolbar-flex>

	<div class="contextual-toolbar toolbar is-hidden">
		<div class="title">Actions</div>
		<div class="buttonset">
			<button
				soho-button="tertiary"
				id="lm-a-tags-delete"
				icon="delete"
				(click)="onClickDelete()"
				*ngIf="!isReadOnly">
				Delete ({{ selectionCount }})
			</button>
		</div>
	</div>
	<div
		#tagsDatagrid
		id="gridTags"
		soho-datagrid
		[gridOptions]="datagridOptions"
		[data]="datagridOptions.dataset"
		(selected)="updateSelection($event.rows)"></div>

	<div class="lm-admin-quota-message lm-margin-md-t">
		<p *ngIf="!toolbarDisabled" id="lm-a-tags-showcounttext">
			{{ getItemCountText() }}
			<span *ngIf="isSearchActive || filter.type"
				>There are active filters.
				<a
					soho-hyperlink
					id="lm-a-tags-clear-filters"
					(click)="clearAllFilters()"
					>Clear all</a
				>
			</span>
		</p>
	</div>

	<button
		id="lm-a-more-btn"
		soho-button
		type="button"
		(click)="more()"
		[disabled]="isBusy || !hasMore">
		More
	</button>
</div>

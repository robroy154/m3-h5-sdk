﻿<div
	soho-busyindicator
	[blockUI]="true"
	[activated]="isBusy"
	[displayDelay]="0">
	<div class="field">
		<label class="label" for="autocomplete-change-owner"
			>Select new owner</label
		>
		<div class="searchfield-wrapper">
			<input
				soho-autocomplete
				maxlength="64"
				type="text"
				[autoSelectFirstItem]="true"
				id="autocomplete-change-owner"
				[attributes]="{ name: 'name', value: 'lm-a-change-owner-search' }"
				class="lm-autocomplete-searchfield"
				placeholder="Search for user..."
				(selected)="
					!$event[1].hasClass('no-results') ? selectUser($event[2]) : null
				"
				[source]="autocompleteSource"
				[template]="autocompleteTemplate" />
			<svg class="icon" focusable="false" role="presentation">
				<use xlink:href="#icon-search"></use>
			</svg>
		</div>
	</div>

	<!-- Modal buttons -->
	<div class="modal-buttonset">
		<button
			class="btn-modal"
			[disabled]="isBusy"
			(click)="close()"
			id="lm-a-changeowner-dialog-cancel">
			Cancel
		</button>
		<button
			class="btn-modal-primary"
			[disabled]="!selectedOwner || isBusy"
			(click)="onOk()"
			id="lm-a-changeowner-dialog-ok">
			OK
		</button>
	</div>
</div>

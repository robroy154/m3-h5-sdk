﻿<div
	soho-busyindicator
	[transparentOverlay]="false"
	[blockUI]="true"
	[displayDelay]="0"
	[activated]="isImporting">
	<div class="field lm-margin-md-t">
		<label [attr.for]="uploadName">Choose File</label>
		<input
			soho-fileupload
			name="{{ uploadName }}"
			(change)="onSelectionChange($event)"
			accept="{{ acceptFileExtension }}" />
	</div>

	<fieldset *ngIf="showStrategySelector" class="radio-group">
		<input
			type="radio"
			class="radio"
			name="options"
			id="adminImportOverwrite"
			[(ngModel)]="selectedImportStrategy"
			value="0"
			checked />
		<label for="adminImportOverwrite" class="radio-label"
			>Overwrite existing</label
		>
		<br />
		<input
			type="radio"
			class="radio"
			name="options"
			id="adminImportPreserve"
			[(ngModel)]="selectedImportStrategy"
			value="1" />
		<label for="adminImportPreserve" class="radio-label"
			>Preserve existing</label
		>
	</fieldset>
	<fieldset *ngIf="disclaimer">
		<div class="lm-info-text-md lm-import-disclaimer">
			<svg soho-icon icon="alert" [alert]="true"></svg>
			<span>{{ disclaimer }}</span>
		</div>
		<div class="field">
			<input
				id="lm-a-im-d"
				class="checkbox"
				type="checkbox"
				[(ngModel)]="acceptedDisclaimer" />
			<label class="checkbox-label" for="lm-a-im-d">{{
				agreeOnDisclaimer
			}}</label>
		</div>
	</fieldset>

	<div class="modal-buttonset">
		<button
			type="button"
			class="btn-modal"
			(click)="close()"
			[disabled]="isImporting"
			name="lm-a-import-dialog-cancel">
			Cancel
		</button>
		<button
			type="button"
			class="btn-modal-primary"
			(click)="importFiles()"
			[disabled]="
				!isValidFile || isImporting || (disclaimer && !acceptedDisclaimer)
			"
			name="lm-a-import-dialog-ok">
			{{ buttonText }}
		</button>
	</div>
</div>

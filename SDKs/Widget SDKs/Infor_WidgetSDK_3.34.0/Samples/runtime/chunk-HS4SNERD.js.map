﻿<div #lmaBulkDeleteView>
	<div class="row">
		<div class="twelve columns">
			<div
				soho-busyindicator
				[transparentOverlay]="false"
				[blockUI]="true"
				[activated]="isBusy"
				class="lm-admin-base-font-size">
				<lm-admin-message-banner
					[options]="warningMessageOptions"></lm-admin-message-banner>
				<div class="field">
					<div class="lm-margin-lg-t lm-margin-lg-b">
						<input
							soho-checkbox
							id="lm-a-bd-cb"
							type="checkbox"
							[(ngModel)]="isAllSelected"
							(ngModelChange)="onSelectDeselectAll($event)" />
						<label soho-label for="lm-a-bd-cb" [forCheckBox]="true"
							>Select / deselect all</label
						>
					</div>
					<div class="switch">
						<input
							type="checkbox"
							name="lm-a-bd-as"
							class="switch"
							id="lm-a-bd-as"
							(ngModelChange)="
								includeOptions['includeSettingsRules'] =
									$event || includeOptions['includeSettingsRules']
							"
							[(ngModel)]="includeOptions['includeSettings']" />
						<label for="lm-a-bd-as" class="radio-label">Settings</label>
						<br />
					</div>

					<div class="switch lm-margin-xl-l">
						<input
							type="checkbox"
							[disabled]="includeOptions['includeSettings']"
							name="lm-a-bd-asr"
							class="switch"
							id="lm-a-bd-asr"
							[(ngModel)]="includeOptions['includeSettingsRules']" />
						<label for="lm-a-bd-asr" class="radio-label">Settings rules</label>
						<br />
					</div>
					<div class="switch">
						<input
							type="checkbox"
							id="lm-a-bd-us"
							name="lm-a-bd-us"
							class="switch"
							[(ngModel)]="includeOptions['includeUserSettings']" />
						<label for="lm-a-bd-us" class="radio-label">User settings</label>
						<br />
					</div>

					<div class="switch">
						<input
							type="checkbox"
							id="lm-a-bd-prvp"
							name="lm-a-bd-prvp"
							class="switch"
							[(ngModel)]="includeOptions['includePrivatePages']" />
						<label for="lm-a-bd-prvp" class="radio-label">Private pages</label>
						<br />
					</div>

					<div class="switch">
						<input
							type="checkbox"
							id="lm-a-bd-pp"
							name="lm-a-bd-pp"
							class="switch"
							[(ngModel)]="includeOptions['includePublishedPages']" />
						<label for="lm-a-bd-pp" class="radio-label">Published pages</label>
						<br />
					</div>

					<div class="switch">
						<input
							type="checkbox"
							id="lm-a-bd-pw"
							name="lm-a-bd-pw"
							class="switch"
							[(ngModel)]="includeOptions['includePublishedWidgets']" />
						<label for="lm-a-bd-pw" class="radio-label"
							>Published widgets</label
						>
						<br />
					</div>

					<div class="switch">
						<input
							type="checkbox"
							id="lm-a-bd-mm"
							name="lm-a-bd-mm"
							class="switch"
							[(ngModel)]="includeOptions['includeMemos']" />
						<label for="lm-a-bd-mm" class="radio-label">Announcements</label>
						<br />
					</div>

					<div class="switch">
						<input
							type="checkbox"
							id="lm-a-bd-sp"
							name="lm-a-bd-sp"
							class="switch"
							[(ngModel)]="includeOptions['includeSecurityPolicies']" />
						<label for="lm-a-bd-sp" class="radio-label"
							>Security policies</label
						>
						<br />
					</div>

					<ng-container *ngIf="showDynamic">
						<div class="switch">
							<input
								type="checkbox"
								id="lm-a-bd-dp"
								name="lm-a-bd-dp"
								class="switch"
								[(ngModel)]="includeOptions['includeDynamicPages']" />
							<label for="lm-a-bd-dp" class="radio-label">Dynamic pages</label>
							<br />
						</div>

						<div class="switch">
							<input
								type="checkbox"
								id="lm-a-bd-dpa"
								name="lm-a-bd-dpa"
								class="switch"
								[(ngModel)]="includeOptions['includeDynamicPageArchives']" />
							<label for="lm-a-bd-dpa" class="radio-label"
								>Dynamic page archives</label
							>
							<br />
						</div>
					</ng-container>
				</div>

				<button
					id="lm-a-bd-del"
					class="btn-primary lm-margin-md-t"
					[disabled]="isBusy"
					(click)="onClickDelete()">
					Delete
				</button>
			</div>
		</div>
	</div>
</div>

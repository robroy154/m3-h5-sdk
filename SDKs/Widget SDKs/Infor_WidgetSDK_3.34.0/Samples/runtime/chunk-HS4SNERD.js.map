﻿<div #lmAdminImport>
	<div class="row">
		<div class="twelve columns">
			<div
				soho-busyindicator
				[transparentOverlay]="false"
				[blockUI]="true"
				[activated]="isBusy"
				class="lm-admin-base-font-size">
				<p class="lm-margin-sm-b">Import the following Homepages data:</p>

				<div class="field">
					<div class="lm-margin-lg-t lm-margin-lg-b">
						<input
							soho-checkbox
							id="lm-a-imp-cb"
							type="checkbox"
							[(ngModel)]="isAllSelected"
							(ngModelChange)="onSelectDeselectAll($event)" />
						<label soho-label for="lm-a-imp-cb" [forCheckBox]="true"
							>Select / deselect all</label
						>
					</div>

					<div class="switch">
						<input
							type="checkbox"
							name="enableImportSettings"
							class="switch"
							id="enableImportSettings"
							(ngModelChange)="handleChange($event, 'includesettings')"
							[(ngModel)]="includeOptions['includesettings']" />
						<label
							for="enableImportSettings"
							class="radio-label e2e-enableImportSettings"
							>Settings</label
						>
						<br />
					</div>

					<div class="switch lm-margin-xl-l">
						<input
							type="checkbox"
							[disabled]="!includeOptions['includesettings']"
							name="enableImportRuleSettings"
							class="switch"
							id="enableImportRuleSettings"
							[(ngModel)]="includeOptions['includesettingsrules']" />
						<label
							for="enableImportRuleSettings"
							class="radio-label e2e-enableImportRuleSettings"
							>Settings rules</label
						>
						<br />
					</div>

					<div class="compound-field">
						<div class="field switch">
							<input
								type="checkbox"
								name="enableImportUserSettings"
								class="switch"
								id="enableImportUserSettings"
								[(ngModel)]="includeOptions['includeusersettings']" />
							<label
								for="enableImportUserSettings"
								class="radio-label e2e-enableImportUserSettings"
								>User settings</label
							>
							<br />
						</div>

						<div class="field lm-margin-lg-l lm-margin-sm-t">
							<input
								id="userSettingsImportFilter"
								placeholder="Filter..."
								type="text"
								[(ngModel)]="includeOptions['usersettingsfilter']"
								[readOnly]="!includeOptions['includeusersettings']" />
						</div>
					</div>

					<div class="switch">
						<input
							type="checkbox"
							name="enableImportProperties"
							class="switch"
							id="enableImportProperties"
							[(ngModel)]="includeOptions['includeproperties']" />
						<label
							for="enableImportProperties"
							class="radio-label e2e-enableImportProperties"
							>Properties</label
						>
						<br />
					</div>

					<div class="compound-field">
						<div class="field switch">
							<input
								type="checkbox"
								name="enableImportPublishedWidgets"
								class="switch"
								id="enableImportPublishedWidgets"
								(ngModelChange)="
									handleChange($event, 'includepublishedwidgets')
								"
								[(ngModel)]="includeOptions['includepublishedwidgets']" />
							<label
								for="enableImportPublishedWidgets"
								class="radio-label e2e-enableImportPublishedWidgets"
								>Published widgets</label
							>
							<br />
						</div>

						<div class="field lm-margin-lg-l lm-margin-sm-t">
							<input
								id="publishedWidgetsImportFilter"
								placeholder="Filter..."
								type="text"
								[(ngModel)]="includeOptions['publishedwidgetsfilter']"
								[readOnly]="!includeOptions['includepublishedwidgets']" />
						</div>

						<div class="switch lm-margin-xl-l lm-margin-zero-t">
							<input
								type="checkbox"
								[disabled]="!includeOptions['includepublishedwidgets']"
								name="enableImportPublishedWidgetAccess"
								class="switch"
								id="enableImportPublishedWidgetAccess"
								[(ngModel)]="includeOptions['includepublishedwidgetaccess']" />
							<label
								for="enableImportPublishedWidgetAccess"
								class="radio-label e2e-enableImportPublishedWidgetAccess"
								>Published widget permissions</label
							>
							<br />
						</div>
					</div>

					<div class="switch lm-margin-md-t">
						<input
							type="checkbox"
							name="enableImportStandardWidgetAccess"
							class="switch"
							id="enableImportStandardWidgetAccess"
							[(ngModel)]="includeOptions['includestandardwidgetaccess']" />
						<label
							for="enableImportStandardWidgetAccess"
							class="radio-label e2e-enableImportStandardWidgetAccess"
							>Standard widget permissions</label
						>
						<br />
					</div>

					<div class="compound-field">
						<div class="field switch">
							<input
								type="checkbox"
								name="enableImportPublishedPages"
								class="switch"
								id="enableImportPublishedPages"
								(ngModelChange)="handleChange($event, 'includepublishedpages')"
								[(ngModel)]="includeOptions['includepublishedpages']" />
							<label
								for="enableImportPublishedPages"
								class="radio-label e2e-enableImportPublishedPages"
								>Published pages</label
							>
							<br />
						</div>

						<div class="field lm-margin-lg-l lm-margin-sm-t">
							<input
								id="publishedPagesImportFilter"
								placeholder="Filter..."
								type="text"
								[(ngModel)]="includeOptions['publishedpagesfilter']"
								[readOnly]="!includeOptions['includepublishedpages']" />
						</div>

						<div class="switch lm-margin-xl-l lm-margin-zero-t">
							<input
								type="checkbox"
								[disabled]="!includeOptions['includepublishedpages']"
								name="enableImportPublishedPageConnections"
								class="switch"
								id="enableImportPublishedPageConnections"
								[(ngModel)]="
									includeOptions['includepublishedpageconnections']
								" />
							<label
								for="enableImportPublishedPageConnections"
								class="radio-label e2e-enableImportPublishedPageConnections"
								>Published page connections</label
							>
							<br />
						</div>

						<div class="switch lm-margin-xl-l">
							<input
								type="checkbox"
								[disabled]="!includeOptions['includepublishedpages']"
								name="enableImportPublishedPageAccess"
								class="switch"
								id="enableImportPublishedPageAccess"
								[(ngModel)]="includeOptions['includepublishedpageaccess']" />
							<label
								for="enableImportPublishedPageAccess"
								class="radio-label e2e-enableImportPublishedPageAccess"
								>Published page permissions</label
							>
							<br />
						</div>
					</div>

					<div class="compound-field">
						<div class="field switch">
							<input
								type="checkbox"
								name="enableImportPrivatePages"
								class="switch"
								id="enableImportPrivatePages"
								[(ngModel)]="includeOptions['includeprivatepages']" />
							<label
								for="enableImportPrivatePages"
								class="radio-label e2e-enableImportPrivatePages"
								>Private pages</label
							>
							<br />
						</div>

						<div class="field lm-margin-lg-l lm-margin-sm-t">
							<input
								id="privatePagesImportFilter"
								placeholder="Filter..."
								type="text"
								[(ngModel)]="includeOptions['privatepagesfilter']"
								[readOnly]="!includeOptions['includeprivatepages']" />
						</div>
					</div>

					<div class="compound-field" *ngIf="isStandardPagesEnabled">
						<div class="field switch">
							<input
								type="checkbox"
								name="enableImportStandardPageAccess"
								class="switch"
								id="enableImportStandardPageAccess"
								[(ngModel)]="includeOptions['includestandardpageaccess']" />
							<label for="enableImportStandardPageAccess" class="radio-label"
								>Standard page permissions</label
							>
							<br />
						</div>
					</div>

					<div class="compound-field">
						<div class="field switch">
							<input
								type="checkbox"
								name="enableImportPolicies"
								class="switch"
								id="enableImportPolicies"
								[(ngModel)]="includeOptions['includepolicies']" />
							<label for="enableImportPolicies" class="radio-label"
								>Security policies</label
							>
						</div>
					</div>

					<div class="compound-field">
						<div class="field switch">
							<input
								type="checkbox"
								name="enableImportMemos"
								class="switch"
								id="enableImportMemos"
								[(ngModel)]="includeOptions['includememos']" />
							<label for="enableImportMemos" class="radio-label"
								>Announcements</label
							>
						</div>
					</div>
				</div>
			</div>

			<button
				class="btn-secondary"
				[disabled]="isBusy"
				(click)="upload()"
				id="lm-a-imp-upload">
				Upload
			</button>
			<button
				class="btn-secondary lm-margin-md-t"
				[disabled]="!isBusy || isCancelled"
				(click)="cancel()"
				id="lm-a-imp-cancel">
				Cancel
			</button>
			<button
				class="btn-primary e2e-import-btn"
				[disabled]="isBusy || !isImportEnabled"
				(click)="onClickImport()"
				id="lm-a-imp-import">
				Import
			</button>

			<div class="row lm-margin-xl-t" *ngIf="statusMessageList.length > 0">
				<hr />
				<ul class="lm-margin-md-t lm-margin-md-l">
					<li
						*ngFor="let item of statusMessageList"
						class="lm-admin-base-font-size"
						[class.lm-fontweight-bold]="isMaxLimitMessage(item.message)">
						{{ item.message }}
					</li>
				</ul>
			</div>
		</div>
	</div>
</div>

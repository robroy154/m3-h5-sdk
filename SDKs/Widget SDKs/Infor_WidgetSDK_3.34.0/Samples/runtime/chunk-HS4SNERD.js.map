<lm-user-search
	#searchComponent
	(selected)="onSelected($event, true)"
	(cleared)="onCleared()"
	[labelText]="searchLabelText"></lm-user-search>
<div *ngIf="recentSearches && recentSearches.length > 0">
	<label *ngIf="recentLabelText" for="recent-user-searches">{{
		recentLabelText
	}}</label>
	<soho-listview
		#listView
		id="recent-user-searches"
		[dataset]="recentSearches"
		selectable="single">
		<li
			soho-listview-item
			*ngFor="let item of recentSearches"
			(click)="onSelected(item, false)">
			<p soho-listview-header>{{ item.displayName }}</p>
			<p soho-listview-subheader>{{ item.email }}</p>
		</li>
	</soho-listview>
</div>
<div class="modal-buttonset">
	<button
		class="btn-modal"
		(click)="close()"
		id="lm-a-usersearch-dialog-cancel">
		Cancel
	</button>
	<button
		class="btn-modal-primary"
		[disabled]="!selectedUser"
		(click)="closeWithSelected()"
		id="lm-a-usersearch-dialog-ok">
		OK
	</button>
</div>

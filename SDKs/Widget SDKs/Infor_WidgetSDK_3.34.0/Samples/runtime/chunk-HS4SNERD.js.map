<div style="width: 550px">
	<div soho-tabs>
		<div soho-tab-list-container>
			<ul soho-tab-list>
				<li soho-tab>
					<a soho-tab-title id="lm-a-dp-aei-basictab" tabId="Basic">Basic</a>
				</li>
				<li soho-tab [selected]="isPermissionTabOnInit">
					<a soho-tab-title id="lm-a-dp-aei-pmtab" tabId="Permissions"
						>Permissions</a
					>
				</li>
			</ul>
		</div>
	</div>
	<div soho-tab-panel-container>
		<div soho-tab-panel tabId="Basic">
			<div class="field">
				<label class="required">URL</label>
				<input
					[(ngModel)]="image.u"
					id="lm-a-dp-aei-url-inp"
					[maxlength]="urlMaxLength"
					data-validate="required"
					(ngModelChange)="setIsSaveDisabled()" />
			</div>
			<div class="field">
				<label soho-label>Alignment</label>
				<select
					soho-dropdown
					name="lm-a-dp-aei-alignment-drpd"
					[attributes]="{ name: 'id', value: 'lm-a-dp-aei-alignment' }"
					[(ngModel)]="image.al">
					<option id="lm-a-dp-aei-alignment-fill" [value]="alignment.Fill">
						Fill
					</option>
					<option id="lm-a-dp-aei-alignment-center" [value]="alignment.Center">
						Center
					</option>
					<option id="lm-a-dp-aei-alignment-fit" [value]="alignment.Fit">
						Fit
					</option>
					<option id="lm-a-dp-aei-alignment-cover" [value]="alignment.Cover">
						Cover
					</option>
				</select>
			</div>
		</div>
		<div soho-tab-panel tabId="Permissions">
			<lm-dynamic-permissions
				[listLabel]="listLabel"
				[selectedExpressions]="selectedExpressions"
				[(selected)]="expressions"
				[operator]="image.op"
				showOperator="true"></lm-dynamic-permissions>
		</div>
	</div>
	<div class="modal-buttonset">
		<button
			type="button"
			id="lm-a-dp-aei-cncl-btn"
			class="btn-modal"
			(click)="close()">
			Cancel
		</button>
		<button
			type="button"
			id="lm-a-dp-aei-save-btn"
			class="btn-modal-primary no-validation"
			(click)="save()"
			[disabled]="isSaveDisabled">
			{{ isEditable ? "Save" : "OK" }}
		</button>
	</div>
</div>

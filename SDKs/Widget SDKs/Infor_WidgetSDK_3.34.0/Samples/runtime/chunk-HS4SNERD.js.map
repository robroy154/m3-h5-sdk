<div class="row lm-margin-xl-t" style="min-width: 500px">
	<div class="twelve columns">
		<label class="label">{{ description }}</label>

		<div
			soho-datagrid
			#languageDatagrid
			id="lm-a-ls-g"
			[gridOptions]="datagridOptions"
			[data]="datagridOptions.dataset"
			(selected)="updateSelection($event.rows)"></div>
	</div>
</div>
<div class="modal-buttonset">
	<button class="btn-modal" (click)="cancel()" id="lm-a-ls-cancel">
		Cancel
	</button>
	<button
		class="btn-modal-primary"
		[disabled]="!selection || selection.length < 1"
		(click)="save()"
		id="lm-a-ls-ok">
		OK
	</button>
</div>

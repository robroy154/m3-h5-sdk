<ul>
	<li>
		<svg soho-icon icon="info" [alert]="true"></svg>
		<span class="lm-fg"> {{ progressMessage }} </span>
	</li>
	<li class="separator"></li>
	<li *ngIf="successful">
		<svg soho-icon icon="success" [alert]="true"></svg>
		<span class="lm-fg"> {{ successfulMessage }} </span>
	</li>
	<li *ngIf="failed">
		<svg soho-icon icon="error" [alert]="true"></svg>
		<span class="lm-fg"> {{ failedMessage }} </span>
	</li>
	<li *ngIf="failedDetails">
		<span class="lm-fg"> {{ failedDetails }} </span>
	</li>
	<li *ngIf="skipped">
		<svg soho-icon icon="alert" [alert]="true"></svg>
		<span class="lm-fg"> {{ skippedMessage }} </span>
	</li>
</ul>
<button
	class="btn-secondary lm-margin-md-t"
	[disabled]="isComplete || isOperationCancelled()"
	(click)="cancelOperation()"
	id="lm-a-mm-op-dialog-cancel">
	Cancel operation
</button>
<div class="modal-buttonset">
	<button
		type="button"
		class="btn-modal"
		(click)="close()"
		[disabled]="!(isComplete || isOperationCancelled())"
		id="lm-a-mm-op-dialog-close">
		Close
	</button>
</div>

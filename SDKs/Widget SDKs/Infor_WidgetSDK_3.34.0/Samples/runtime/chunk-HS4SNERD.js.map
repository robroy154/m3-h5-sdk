<p class="lm-margin-xl-b">
	You are adding an archived version of the page '{{ entityTitle }}'. Add a
	comment to easier identify this version.
</p>
<div class="field">
	<label for="lm-a-arc-crt-cmt" class="required">Comment</label>
	<textarea
		soho-textarea
		id="lm-a-arc-crt-cmt"
		type="text"
		maxlength="256"
		[(ngModel)]="comment"
		data-validate="required"
		required></textarea>
</div>
<div class="modal-buttonset">
	<button
		id="lm-a-arc-crt-cncl"
		type="button"
		class="btn-modal"
		(click)="close()">
		Cancel
	</button>
	<button
		id="lm-a-arc-crt-ok"
		type="button"
		class="btn-modal-primary"
		(click)="createArchive()">
		OK
	</button>
</div>

<div style="width: 550px">
	<div soho-tabs>
		<div soho-tab-list-container>
			<ul soho-tab-list>
				<li soho-tab>
					<a soho-tab-title id="lm-a-dp-ael-basictab" tabId="Basic">Basic</a>
				</li>
				<li soho-tab [selected]="isPermissionTabOnInit">
					<a soho-tab-title id="lm-a-dp-ael-pmtab" tabId="Permissions"
						>Permissions</a
					>
				</li>
				<li soho-tab>
					<a soho-tab-title id="lm-a-dp-ael-trantab" tabId="Translations"
						>Translations</a
					>
				</li>
			</ul>
		</div>
	</div>
	<div soho-tab-panel-container>
		<div soho-tab-panel tabId="Basic">
			<lm-add-link
				[isShortcut]="isShortcut"
				[(link)]="item"
				(titleChanged)="onInputChanged()"></lm-add-link>
		</div>
		<div soho-tab-panel tabId="Permissions">
			<lm-dynamic-permissions
				[listLabel]="listLabel"
				[selectedExpressions]="selectedExpressions"
				[(selected)]="expressions"
				[operator]="item.op"
				showOperator="true"></lm-dynamic-permissions>
		</div>
		<div soho-tab-panel tabId="Translations">
			<lm-dynamic-page-translations
				[localizations]="itemLzn"
				[optionsItems]="optionsItems"
				(localizationChange)="onLocalizationChange($event)">
			</lm-dynamic-page-translations>
		</div>
	</div>

	<div class="modal-buttonset">
		<button
			type="button"
			id="lm-a-dp-ael-cncl-btn"
			class="btn-modal"
			(click)="close()">
			Cancel
		</button>
		<button
			type="button"
			id="lm-a-dp-ael-savebtn"
			class="btn-modal-primary no-validation"
			(click)="save()"
			[disabled]="isSaveDisabled">
			{{ isEditable ? "Save" : "OK" }}
		</button>
	</div>
</div>

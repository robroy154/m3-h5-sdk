﻿<div
	soho-busyindicator
	[activated]="isBusy"
	[blockUI]="true"
	[displayDelay]="0">
	<soho-toolbar-flex (selected)="onSelectedToolbar($event)">
		<soho-toolbar-flex-section
			[isTitle]="true"
			class="lm-info-text-md"
			id="lm-a-sp-maxtitle">
			<svg
				soho-icon
				icon="alert"
				[alert]="true"
				soho-tooltip
				[title]="quotaTitle"
				*ngIf="isCloseToMaxQuota"
				id="lm-a-sp-maxicon"></svg>
			{{ toolbarTitle }}
		</soho-toolbar-flex-section>
		<soho-toolbar-flex-section [isSearch]="true">
			<label class="audible" for="lm-a-sp-search">Search</label>
			<input
				soho-toolbar-flex-searchfield
				[clearable]="true"
				[collapsible]="true"
				maxlength="64"
				[(ngModel)]="query"
				[disabled]="toolbarDisabled"
				(cleared)="clearSearch()"
				(lm-submit)="search()"
				(keydown.esc)="clearSearch()"
				id="lm-a-sp-search"
				(focus)="onSearchfieldFocus()"
				(blur)="onSearchfieldFocusLost()" />
		</soho-toolbar-flex-section>
		<soho-toolbar-flex-section [isButtonSet]="true">
			<button
				soho-menu-button
				menu="lm-a-sp-sort"
				[disabled]="toolbarDisabled"
				type="button"
				icon="sort-down">
				{{ orderBy.name }}
			</button>
			<ul soho-popupmenu id="lm-a-sp-sort">
				<li soho-popupmenu-item *ngFor="let item of orderByItems">
					<a
						soho-popupmenu-label
						[name]="item.name | lmAutoId: 'lm-a-sp-sortorder'"
						(click)="setOrderBy(item)"
						>{{ item.name }}</a
					>
				</li>
			</ul>
			<button
				soho-menu-button
				menu="lm-a-sp-flt"
				[disabled]="toolbarDisabled"
				class="btn-menu"
				type="button"
				icon="filter"
				soho-tooltip
				[title]="filterTooltip">
				<svg soho-icon *ngIf="isFiltered" icon="info" [alert]="true"></svg>
				Filter
			</button>
			<ul soho-popupmenu id="lm-a-sp-flt" class="is-selectable">
				<li
					soho-popupmenu-item
					*ngFor="let item of filterItems"
					[isChecked]="item.selected">
					<a
						soho-popupmenu-label
						[name]="item.name | lmAutoId: 'lm-a-sp-filteroption'"
						(click)="onFilter(item, viewRef, $event)"
						>{{ item.name }}</a
					>
				</li>
			</ul>
			<div class="separator"></div>
			<button
				id="lm-a-sp-expa"
				soho-button="tertiary"
				icon="export"
				[disabled]="!items.length"
				data-action="exportAll">
				Export All
			</button>
			<button
				id="lm-a-sp-imp"
				*ngIf="isAdministrator"
				soho-button="tertiary"
				icon="import"
				data-action="importPolicies">
				Import
			</button>
			<ng-container *ngIf="isAdministrator">
				<div class="separator"></div>
				<button
					id="lm-a-sp-add"
					soho-button="tertiary"
					icon="add"
					data-action="add">
					Add Policy
				</button>
			</ng-container>
			<div class="separator"></div>
			<button
				id="lm-a-sp-ref"
				soho-button="icon"
				icon="refresh"
				data-action="refresh"
				style="border: 0; margin-bottom: 0"
				soho-tooltip
				title="Refresh">
				<span class="audible">Refresh</span>
			</button>
		</soho-toolbar-flex-section>

		<soho-toolbar-flex-more-button> </soho-toolbar-flex-more-button>
	</soho-toolbar-flex>

	<div class="contextual-toolbar toolbar is-hidden">
		<div class="title">Actions</div>
		<div class="buttonset">
			<ng-container *ngIf="isAdministrator; else viewPolicy">
				<button
					id="lm-a-sp-edit"
					soho-button="tertiary"
					icon="edit"
					[disabled]="selectionCount !== 1"
					(click)="edit()">
					Edit
				</button>
				<button
					id="lm-a-sp-dlt"
					soho-button="tertiary"
					icon="delete"
					(click)="confirmDelete()">
					Delete ({{ selectionCount }})
				</button>
			</ng-container>
			<ng-template #viewPolicy>
				<button
					id="lm-a-sp-view"
					soho-button="tertiary"
					[disabled]="selectionCount !== 1"
					(click)="view()">
					View
				</button>
			</ng-template>
			<button
				id="lm-a-sp-exp"
				soho-button="tertiary"
				icon="export"
				(click)="exportSelected()">
				Export ({{ selectionCount }})
			</button>
			<ng-container *ngIf="isAdministrator">
				<div class="separator"></div>
				<button
					id="lm-a-sp-copy"
					soho-button="tertiary"
					icon="copy"
					[disabled]="selectionCount !== 1"
					(click)="copy()">
					Copy
				</button>
			</ng-container>
			<!-- TODO Make a drop down button -->
			<button
				soho-menu-button
				icon="update-preview"
				menu="lm-a-sp-usedby"
				type="button"
				id="lm-admin-p-usedby-menu-btn"
				[disabled]="selectionCount !== 1">
				<span>Used by</span>
			</button>
			<div>
				<ul soho-popupmenu id="lm-a-sp-usedby">
					<li soho-popupmenu-item [isDisabled]="selectionCount !== 1">
						<a
							soho-popupmenu-label
							id="lm-a-sp-usedby-memo"
							(click)="usedByAnnouncements()"
							>Announcements</a
						>
					</li>
					<li
						soho-popupmenu-item
						[hidden]="
							!(
								adminTool?.featureGlobalDynamicPages &&
								adminTool?.featureDynamicPages
							)
						"
						[isDisabled]="selectionCount !== 1">
						<a
							soho-popupmenu-label
							id="lm-a-sp-usedby-dp"
							(click)="usedByPages()"
							>Dynamic Pages</a
						>
					</li>
				</ul>
			</div>
		</div>
	</div>

	<div
		#policiesDatagrid
		soho-datagrid
		id="lm-a-sp-grid"
		[gridOptions]="datagridOptions"
		[data]="datagridOptions.dataset"
		(selected)="updateSelection($event.rows)"></div>

	<div class="lm-admin-quota-message lm-margin-md-t">
		<p *ngIf="!toolbarDisabled" id="lm-a-sp-showcounttext">
			{{ getItemCountText() }}
			<span *ngIf="isSearchActive || filter.type"
				>There are active filters.
				<a id="lm-a-sp-clr" soho-hyperlink (click)="clearAllFilters()"
					>Clear all</a
				>
			</span>
		</p>
	</div>

	<button
		id="lm-a-more-btn"
		soho-button
		type="button"
		(click)="more()"
		[disabled]="isBusy || !hasMore">
		More
	</button>
</div>

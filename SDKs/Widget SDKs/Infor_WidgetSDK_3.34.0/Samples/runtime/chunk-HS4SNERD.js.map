<div style="width: 550px; height: 535px" #dialogViewContRef>
	<div soho-tabs (beforeActivated)="updateOptionsItems()">
		<div soho-tab-list-container>
			<ul soho-tab-list>
				<li soho-tab>
					<a soho-tab-title id="lm-a-dp-aec-basictab" tabId="Basic">Basic</a>
				</li>
				<li soho-tab [selected]="isPermissionTabOnInit">
					<a soho-tab-title id="lm-a-dp-aec-pmtab" tabId="Permissions"
						>Permissions</a
					>
				</li>
				<li soho-tab>
					<a soho-tab-title id="lm-a-dp-aec-trantab" tabId="Translations"
						>Translations</a
					>
				</li>
			</ul>
		</div>
	</div>
	<div soho-tab-panel-container>
		<div soho-tab-panel tabId="Basic">
			<ng-container *ngIf="item.it === contentTypes.Attribute">
				<div class="field">
					<label class="required">User property</label>
					<button
						soho-button="primary"
						id="lm-a-dp-aec-sup-btn"
						*ngIf="!item.t"
						(click)="openUserPropertyDialog()">
						Select user property
					</button>
					<div class="selected-container" *ngIf="item.t">
						<h2 id="lm-a-dp-aec-propttl">{{ item.t | lmTrimCurlyBraces }}</h2>
						<button
							soho-button="tertiary"
							id="lm-a-dp-aec-edit-btn"
							icon="edit"
							(click)="openUserPropertyDialog()">
							Edit
						</button>
					</div>
				</div>
				<div class="field">
					<label soho-label>Label</label>
					<input
						soho-radiobutton
						name="user-property"
						[value]="false"
						[(ngModel)]="isCustomLabel"
						id="lm-a-dp-aec-prop-chk"
						type="radio" />
					<label soho-label for="lm-a-dp-aec-prop-chk" [forRadioButton]="true"
						>Use user property name</label
					>
					<br />
					<input
						soho-radiobutton
						name="user-property"
						[value]="true"
						[(ngModel)]="isCustomLabel"
						id="lm-a-dp-aec-cust-chk"
						type="radio" />
					<label soho-label for="lm-a-dp-aec-cust-chk" [forRadioButton]="true"
						>Custom text</label
					>
					<br />
					<input
						type="text"
						id="lm-a-dp-aec-attrlbl-inp"
						[maxlength]="defaultMaxLength"
						[disabled]="!isCustomLabel"
						[(ngModel)]="attributeLabel"
						(ngModelChange)="updateProperty($event, 'l', false)" />
				</div>
			</ng-container>
			<ng-container *ngIf="item.it === contentTypes.Link">
				<lm-add-link
					[isContentLink]="true"
					(titleChanged)="updateProperty($event, 't', true)"
					[(link)]="item"></lm-add-link>
			</ng-container>
			<ng-container *ngIf="item.it === contentTypes.Text">
				<div class="field">
					<label soho-label>Label</label>
					<input
						type="text"
						id="lm-a-dp-aec-lbl-inp"
						style="width: 100%"
						[ngModel]="item.l"
						(ngModelChange)="updateProperty($event, 'l', false)"
						[maxlength]="defaultMaxLength" />
				</div>
				<div class="field content-type-text">
					<label class="required">Text</label>
					<textarea
						class="soho-textarea resizable required"
						id="lm-a-dp-aec-text-ta"
						style="width: 100%"
						#textItemTextArea
						[maxlength]="textMaxLength"
						[ngModel]="item.t"
						(ngModelChange)="updateProperty($event, 't', true)"
						aria-required="true"
						data-validate="required"
						required></textarea>
					<button
						class="hyperlink"
						id="lm-a-dp-aec-iup-btn"
						(click)="openUserPropertyDialog()">
						Insert user property
					</button>
				</div>
			</ng-container>
		</div>
		<div soho-tab-panel tabId="Permissions">
			<lm-dynamic-permissions
				[listLabel]="listLabel"
				[selectedExpressions]="selectedExpressions"
				[(selected)]="expressions"
				[operator]="item.op"
				showOperator="true"></lm-dynamic-permissions>
		</div>
		<div soho-tab-panel tabId="Translations">
			<p *ngIf="!isTranslateable">There is nothing to translate.</p>
			<lm-dynamic-page-translations
				*ngIf="isTranslateable"
				[localizations]="itemLzn"
				[optionsItems]="optionsItems"
				(localizationChange)="onLocalizationChange($event)">
			</lm-dynamic-page-translations>
		</div>
	</div>
	<div class="modal-buttonset">
		<button
			type="button"
			id="lm-a-dp-aec-cncl-btn"
			class="btn-modal"
			(click)="close()">
			Cancel
		</button>
		<button
			type="button"
			id="lm-a-dp-aec-save-btn"
			class="btn-modal-primary no-validation"
			[disabled]="isSaveDisabled"
			(click)="save()">
			{{ isEditable ? "Save" : "OK" }}
		</button>
	</div>
</div>

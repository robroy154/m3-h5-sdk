﻿<div #lmAdminExport>
	<div class="row">
		<div class="twelve columns">
			<div
				soho-busyindicator
				[transparentOverlay]="false"
				[blockUI]="true"
				[activated]="isBusy"
				class="lm-admin-base-font-size">
				<p class="lm-margin-sm-b">Export the following Homepages data:</p>

				<div class="field">
					<div class="lm-margin-lg-t lm-margin-lg-b">
						<input
							soho-checkbox
							id="lm-a-exp-cb"
							type="checkbox"
							[(ngModel)]="isAllSelected"
							(ngModelChange)="onSelectDeselectAll($event)" />
						<label soho-label for="lm-a-exp-cb" [forCheckBox]="true"
							>Select / deselect all</label
						>
					</div>

					<div class="switch">
						<input
							type="checkbox"
							name="enableExportSettings"
							class="switch"
							id="enableExportSettings"
							(ngModelChange)="handleChange($event, 'includesettings')"
							[(ngModel)]="includeOptions['includesettings']" />
						<label
							for="enableExportSettings"
							class="radio-label e2e-enableExportSettings"
							>Settings</label
						>
						<br />
					</div>

					<div class="switch lm-margin-xl-l">
						<input
							type="checkbox"
							[disabled]="!includeOptions['includesettings']"
							name="enableExportRuleSettings"
							class="switch"
							id="enableExportRuleSettings"
							[(ngModel)]="includeOptions['includesettingsrules']" />
						<label
							for="enableExportRuleSettings"
							class="radio-label e2e-enableExportRuleSettings"
							>Settings rules</label
						>
						<br />
					</div>

					<div class="compound-field">
						<div class="field switch">
							<input
								type="checkbox"
								name="enableExportUserSettings"
								class="switch"
								id="enableExportUserSettings"
								[(ngModel)]="includeOptions['includeusersettings']" />
							<label
								for="enableExportUserSettings"
								class="radio-label e2e-enableExportUserSettings"
								>User settings</label
							>
							<br />
						</div>

						<div class="field lm-margin-lg-l lm-margin-sm-t">
							<input
								id="userSettingsExportFilter"
								placeholder="Filter..."
								type="text"
								[(ngModel)]="includeOptions['usersettingsfilter']"
								[readOnly]="!includeOptions['includeusersettings']" />
						</div>
					</div>

					<div class="switch">
						<input
							type="checkbox"
							name="enableExportProperties"
							class="switch"
							id="enableExportProperties"
							[(ngModel)]="includeOptions['includeproperties']" />
						<label
							for="enableExportProperties"
							class="radio-label e2e-enableExportProperties"
							>Properties</label
						>
						<br />
					</div>

					<div class="compound-field">
						<div class="field switch">
							<input
								type="checkbox"
								name="enableExportPublishedWidgets"
								class="switch"
								id="enableExportPublishedWidgets"
								(ngModelChange)="
									handleChange($event, 'includepublishedwidgets')
								"
								[(ngModel)]="includeOptions['includepublishedwidgets']" />
							<label
								for="enableExportPublishedWidgets"
								class="radio-label e2e-enableExportPublishedWidgets"
								>Published widgets</label
							>
							<br />
						</div>

						<div class="field lm-margin-lg-l lm-margin-sm-t">
							<input
								id="publishedWidgetsExportFilter"
								placeholder="Filter..."
								type="text"
								[(ngModel)]="includeOptions['publishedwidgetsfilter']"
								[readOnly]="!includeOptions['includepublishedwidgets']" />
						</div>

						<div class="switch lm-margin-xl-l lm-margin-zero-t">
							<input
								type="checkbox"
								[disabled]="!includeOptions['includepublishedwidgets']"
								name="enableExportPublishedWidgetAccess"
								class="switch"
								id="enableExportPublishedWidgetAccess"
								[(ngModel)]="includeOptions['includepublishedwidgetaccess']" />
							<label
								for="enableExportPublishedWidgetAccess"
								class="radio-label e2e-enableExportPublishedWidgetAccess"
								>Published widget permissions</label
							>
							<br />
						</div>
					</div>

					<div class="switch lm-margin-md-t">
						<input
							type="checkbox"
							name="enableExportStandardWidgetAccess"
							class="switch"
							id="enableExportStandardWidgetAccess"
							[(ngModel)]="includeOptions['includestandardwidgetaccess']" />
						<label
							for="enableExportStandardWidgetAccess"
							class="radio-label e2e-enableExportStandardWidgetAccess"
							>Standard widget permissions</label
						>
						<br />
					</div>

					<div class="compound-field">
						<div class="field switch">
							<input
								type="checkbox"
								name="enableExportPublishedPages"
								class="switch"
								id="enableExportPublishedPages"
								(ngModelChange)="handleChange($event, 'includepublishedpages')"
								[(ngModel)]="includeOptions['includepublishedpages']" />
							<label
								for="enableExportPublishedPages"
								class="radio-label e2e-enableExportPublishedPages"
								>Published pages</label
							>
							<br />
						</div>

						<div class="field lm-margin-lg-l lm-margin-sm-t">
							<input
								id="publishedPagesExportFilter"
								placeholder="Filter..."
								type="text"
								[(ngModel)]="includeOptions['publishedpagesfilter']"
								[readOnly]="!includeOptions['includepublishedpages']" />
						</div>

						<div class="switch lm-margin-xl-l lm-margin-zero-t">
							<input
								type="checkbox"
								[disabled]="!includeOptions['includepublishedpages']"
								name="enableExportPublishedPageConnections"
								class="switch"
								id="enableExportPublishedPageConnections"
								[(ngModel)]="
									includeOptions['includepublishedpageconnections']
								" />
							<label
								for="enableExportPublishedPageConnections"
								class="radio-label e2e-enableExportPublishedPageConnections"
								>Published page connections</label
							>
							<br />
						</div>

						<div class="switch lm-margin-xl-l">
							<input
								type="checkbox"
								[disabled]="!includeOptions['includepublishedpages']"
								name="enableExportPublishedPageAccess"
								class="switch"
								id="enableExportPublishedPageAccess"
								[(ngModel)]="includeOptions['includepublishedpageaccess']" />
							<label
								for="enableExportPublishedPageAccess"
								class="radio-label e2e-enableExportPublishedPageAccess"
								>Published page permissions</label
							>
							<br />
						</div>
					</div>

					<div class="compound-field">
						<div class="field switch">
							<input
								type="checkbox"
								name="enableExportPrivatePages"
								class="switch"
								id="enableExportPrivatePages"
								[(ngModel)]="includeOptions['includeprivatepages']" />
							<label
								for="enableExportPrivatePages"
								class="radio-label e2e-enableExportPrivatePages"
								>Private pages</label
							>
							<br />
						</div>

						<div class="field lm-margin-lg-l lm-margin-sm-t">
							<input
								id="privatePagesExportFilter"
								placeholder="Filter..."
								type="text"
								[(ngModel)]="includeOptions['privatepagesfilter']"
								[readOnly]="!includeOptions['includeprivatepages']" />
						</div>
					</div>

					<div class="compound-field" *ngIf="isStandardPagesEnabled">
						<div class="field switch">
							<input
								type="checkbox"
								name="enableExportStandardPagesAccess"
								class="switch"
								id="enableExportStandardPagesAccess"
								[(ngModel)]="includeOptions['includestandardpageaccess']" />
							<label for="enableExportStandardPagesAccess" class="radio-label"
								>Standard page permissions</label
							>
							<br />
						</div>
					</div>

					<div class="compound-field">
						<div class="field switch">
							<input
								type="checkbox"
								name="enableExportPolicies"
								class="switch"
								id="enableExportPolicies"
								[(ngModel)]="includeOptions['includepolicies']" />
							<label for="enableExportPolicies" class="radio-label"
								>Security policies</label
							>
						</div>
					</div>

					<div class="compound-field">
						<div class="field switch">
							<input
								type="checkbox"
								name="enableExportMemos"
								class="switch"
								id="enableExportMemos"
								[(ngModel)]="includeOptions['includememos']" />
							<label for="enableExportMemos" class="radio-label"
								>Announcements</label
							>
						</div>
					</div>
				</div>
			</div>

			<div class="row lm-margin-lg-b">{{ fileMessage }}</div>

			<button
				class="btn-secondary"
				[disabled]="isBusy || !fileExists"
				(click)="download()">
				Download
			</button>
			<button
				class="btn-secondary"
				[disabled]="isBusy || !fileExists"
				(click)="confirmDelete()">
				Delete
			</button>
			<button
				class="btn-secondary lm-margin-md-t"
				[disabled]="!isBusy || isCancelled"
				(click)="cancel()">
				Cancel
			</button>
			<button
				class="btn-primary e2e-export-btn"
				[disabled]="isBusy"
				(click)="onClickExport()">
				Export
			</button>

			<div class="row lm-margin-xl-t" *ngIf="statusMessageList.length > 0">
				<hr />
				<ul class="lm-margin-md-t lm-margin-md-l">
					<li
						*ngFor="let item of statusMessageList"
						class="lm-admin-base-font-size">
						{{ item.message }}
					</li>
				</ul>
			</div>
		</div>
	</div>
</div>

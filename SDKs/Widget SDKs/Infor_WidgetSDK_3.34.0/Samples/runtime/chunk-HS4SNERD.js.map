<p>
	First day of week
	<lm-admin-memo-weekday-select
		[(model)]="iteration.firstDayOfWeek"
		(modelChange)="firstDayChanged()"></lm-admin-memo-weekday-select>
</p>
<p>
	Recur every
	<input
		type="number"
		lm-number-mask
		[onlyIntegers]="true"
		min="1"
		max="52"
		maxlength="2"
		class="lm-input-xxs"
		[(ngModel)]="recurEvery"
		[ngModelOptions]="{ updateOn: 'blur' }"
		(focus)="onFocus($event)" />
	week(s) on:
</p>
<div class="compound-field">
	<div
		class="field"
		[style.margin-bottom]="0"
		*ngFor="let checkbox of dayCheckboxes">
		<input
			type="checkbox"
			[name]="checkbox.id"
			[id]="checkbox.id"
			(change)="checkboxChanged(checkbox)"
			[(ngModel)]="checkbox.checked"
			soho-checkbox />
		<label soho-label [attr.for]="checkbox.id" [forCheckBox]="true">{{
			checkbox.label
		}}</label>
	</div>
</div>

<div class="field">
	<input
		type="radio"
		soho-radiobutton
		[(ngModel)]="iteration.frequencyType"
		id="lm-a-mm-dr-rec-monthly-abs"
		name="lm-a-mm-dr-rec-monthly-abs"
		[value]="FrequencyTypes.Absolute" />
	<label soho-label for="lm-a-mm-dr-rec-monthly-abs" [forRadioButton]="true">
		<div class="vertical-adjust">
			Day
			<input
				type="number"
				lm-number-mask
				min="1"
				max="31"
				maxlength="2"
				[onlyIntegers]="true"
				class="lm-input-xxs"
				[(ngModel)]="iteration.dayOfMonth"
				[ngModelOptions]="{ updateOn: 'blur' }"
				(focus)="onFocus($event)" />
			of every
			<input
				type="number"
				lm-number-mask
				[onlyIntegers]="true"
				min="1"
				max="12"
				maxlength="2"
				class="lm-input-xxs"
				[(ngModel)]="iteration.every"
				[ngModelOptions]="{ updateOn: 'blur' }"
				(focus)="onFocus($event)" />
			month(s)
		</div>
	</label>
	<br />
	<input
		type="radio"
		soho-radiobutton
		[(ngModel)]="iteration.frequencyType"
		id="lm-a-mm-dr-rec-monthly-rel"
		name="lm-a-mm-dr-rec-monthly-rel"
		[value]="FrequencyTypes.Relative" />
	<label soho-label for="lm-a-mm-dr-rec-monthly-rel" [forRadioButton]="true">
		<div class="vertical-adjust">
			The
			<select
				soho-dropdown
				class="lm-dropdown-mds"
				name="lm-a-mm-dr-rec-monthly-rel-nth"
				[attributes]="{ name: 'id', value: 'lm-a-mm-dr-rec-monthly-rel-nth' }"
				noSearch
				[(ngModel)]="iteration.weekOrdinal">
				<option [value]="WeekOrdinals.First">First</option>
				<option [value]="WeekOrdinals.Second">Second</option>
				<option [value]="WeekOrdinals.Third">Third</option>
				<option [value]="WeekOrdinals.Fourth">Fourth</option>
				<option [value]="WeekOrdinals.Last">Last</option>
			</select>
			<lm-admin-memo-weekday-select
				[(model)]="iteration.weekDay"></lm-admin-memo-weekday-select>
			of every
			<input
				type="number"
				lm-number-mask
				[onlyIntegers]="true"
				min="1"
				max="12"
				maxlength="2"
				class="lm-input-xxs"
				[(ngModel)]="iteration.every"
				[ngModelOptions]="{ updateOn: 'blur' }"
				(focus)="onFocus($event)" />
			month(s)
		</div>
	</label>
</div>
<div class="field">
	<label soho-label>Duration</label>
	<p>
		Announcement is displayed
		<input
			type="number"
			lm-number-mask
			[onlyIntegers]="true"
			min="0"
			max="99"
			maxlength="2"
			class="lm-input-xxs"
			[(ngModel)]="iteration.daysBefore"
			[ngModelOptions]="{ updateOn: 'blur' }"
			(focus)="onFocus($event)" />
		day(s) before and
		<input
			type="number"
			lm-number-mask
			[onlyIntegers]="true"
			min="0"
			max="99"
			maxlength="2"
			class="lm-input-xxs"
			[(ngModel)]="iteration.daysAfter"
			[ngModelOptions]="{ updateOn: 'blur' }"
			(focus)="onFocus($event)" />
		day(s) after
	</p>
</div>

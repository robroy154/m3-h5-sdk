<div>
	<lm-operation-messages
		[statusMessageList]="statusMessageList"
		[errorMessageList]="errorMessageList"
		[isCompleted]="!isImporting">
	</lm-operation-messages>
	<button
		class="btn-secondary lm-margin-md-t"
		[disabled]="isCancelled || !isImporting"
		(click)="cancel()"
		id="lm-a-dp-op-result-dialog-cancel">
		Cancel {{ this.operation }}
	</button>
	<div class="modal-buttonset">
		<button
			type="button"
			class="btn-modal"
			(click)="close()"
			[disabled]="isImporting"
			id="lm-a-dp-op-result-dialog-close">
			Close
		</button>
	</div>
</div>

﻿<div>
	<div>
		<div class="field lm-margin-xl-b">
			<label>Title</label>
			<p id="lm-a-pw-about-w-title">{{ widget.title }}</p>
		</div>
		<div class="field lm-margin-xl-b">
			<label>Widget ID</label>
			<p id="lm-a-pw-about-w-id">{{ widget.widgetId }}</p>
		</div>
		<div class="field lm-margin-xl-b">
			<label>Owner ID</label>
			<p id="lm-a-pw-about-w-owner">{{ widget.owner }}</p>
		</div>
	</div>

	<div class="modal-buttonset">
		<button
			class="btn-modal-primary"
			(click)="close()"
			id="lm-a-pw-about-close">
			Close
		</button>
	</div>
</div>

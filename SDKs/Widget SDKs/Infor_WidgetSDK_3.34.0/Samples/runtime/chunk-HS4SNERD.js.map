<div
	id="lm-a-mm-dlg"
	soho-busyindicator
	[blockUI]="true"
	[activated]="isBusy"
	[displayDelay]="0">
	<div soho-tab-list-container style="min-width: 630px; min-height: 570px">
		<div soho-tabs>
			<ul soho-tab-list>
				<li soho-tab>
					<a soho-tab-title tabId="lm-a-mm-dlg-tab-bsc">Basic</a>
				</li>
				<li soho-tab>
					<a soho-tab-title tabId="lm-a-mm-dlg-tab-dr">Recurrence</a>
				</li>
				<li soho-tab>
					<a soho-tab-title tabId="lm-a-mm-dlg-tab-tr">Translations</a>
				</li>
				<li soho-tab>
					<a soho-tab-title tabId="lm-a-mm-dlg-tab-per">Permissions</a>
				</li>
			</ul>
			<div soho-tab-panel-container>
				<div soho-tab-panel tabId="lm-a-mm-dlg-tab-bsc">
					<lm-admin-memo-basic [memo]="memo"></lm-admin-memo-basic>
				</div>
				<div soho-tab-panel tabId="lm-a-mm-dlg-tab-dr">
					<lm-admin-memo-date [memo]="memo"></lm-admin-memo-date>
				</div>
				<div soho-tab-panel tabId="lm-a-mm-dlg-tab-tr">
					<lm-translations-component
						[provider]="provider"
						[category]="entityCategory"
						[memoLayout]="memo.layout">
					</lm-translations-component>
				</div>
				<div soho-tab-panel tabId="lm-a-mm-dlg-tab-per">
					<lm-dynamic-permissions
						[listLabel]="permissionLabel"
						[selectedExpressions]="selectedExpressions"
						[showRecent]="false"
						[(selected)]="expressions"></lm-dynamic-permissions>
				</div>
			</div>
		</div>
	</div>

	<div class="modal-buttonset">
		<button
			id="lm-a-mm-dlg-cncl"
			type="button"
			class="btn-modal"
			[disabled]="isBusy"
			(click)="cancel()">
			Cancel
		</button>
		<button
			id="lm-a-mm-dlg-crt"
			type="button"
			class="btn-modal-primary no-validation"
			[disabled]="!canSave()"
			(click)="save()">
			Save
		</button>
	</div>
</div>

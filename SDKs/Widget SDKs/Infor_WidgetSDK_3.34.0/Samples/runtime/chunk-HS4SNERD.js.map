<div style="width: 550px">
	<div soho-tabs>
		<div soho-tab-list-container>
			<ul soho-tab-list>
				<li soho-tab>
					<a soho-tab-title id="lm-a-dp-aetx-basictab" tabId="Basic">Basic</a>
				</li>
				<li soho-tab [selected]="isPermissionTabOnInit">
					<a soho-tab-title id="lm-a-dp-aetx-pmtab" tabId="Permissions"
						>Permissions</a
					>
				</li>
				<li soho-tab>
					<a soho-tab-title id="lm-a-dp-aetx-trantab" tabId="Translations"
						>Translations</a
					>
				</li>
			</ul>
		</div>
	</div>
	<div soho-tab-panel-container>
		<div soho-tab-panel tabId="Basic">
			<label class="required">Text</label>
			<lm-markdown-editor
				[help]="true"
				[(model)]="text.tx"
				[maxLength]="textMaxLength"
				style="min-height: 50vh">
			</lm-markdown-editor>
		</div>
		<div soho-tab-panel tabId="Permissions">
			<lm-dynamic-permissions
				[listLabel]="listLabel"
				[selectedExpressions]="selectedExpressions"
				[(selected)]="expressions"
				[operator]="text.op"
				showOperator="true"></lm-dynamic-permissions>
		</div>
		<div soho-tab-panel tabId="Translations">
			<lm-dynamic-page-translations
				[localizations]="itemLzn"
				[optionsItems]="optionsItems"
				(localizationChange)="onLocalizationChange($event)">
			</lm-dynamic-page-translations>
		</div>
	</div>
	<div class="modal-buttonset">
		<button
			type="button"
			id="lm-a-dp-aetx-cncl-btn"
			class="btn-modal"
			(click)="close()">
			Cancel
		</button>
		<button
			type="button"
			id="lm-a-dp-aetx-save-btn"
			class="btn-modal-primary"
			[disabled]="!canSave()"
			(click)="save()">
			{{ isEditable ? "Save" : "OK" }}
		</button>
	</div>
</div>

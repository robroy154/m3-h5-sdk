﻿<div
	class="lm-admin-dialog-width lm-admin-dialog-height"
	soho-busyindicator
	[activated]="isBusy"
	[blockUI]="true"
	[displayDelay]="0">
	<!-- Rule name -->
	<div class="field">
		<label for="ruleName" class="required">Name</label>
		<input
			id="ruleName"
			class="e2e-ruleName"
			[(ngModel)]="ruleName"
			maxlength="64"
			aria-required="true"
			data-validate="required" />
	</div>

	<hr class="lm-margin-zero lm-margin-lg-b" />
	<!-- Set value(s) -->
	<div #ruleDialogView class="row lm-setting-dialog">
		<div class="column">
			<div *ngIf="setting" [ngSwitch]="setting.type">
				<div *ngSwitchCase="'selector'" class="field">
					<label
						class="label e2e-rule-selector"
						[attr.for]="setting.settingName"
						>{{ setting.setting.label }}</label
					>
					<select
						soho-dropdown
						[name]="'lm-a-rule-edit-' + setting.settingName"
						[attributes]="{
							name: 'id',
							value: 'lm-a-rule-edit-' + setting.settingName
						}"
						[(ngModel)]="value">
						<option
							*ngFor="let value of setting.setting.values"
							[ngValue]="value.value">
							{{ value.label }}
						</option>
					</select>
				</div>

				<div *ngSwitchCase="'boolean'" class="field switch lm-padding-sm-t">
					<input
						[attr.id]="setting.settingName"
						type="checkbox"
						class="switch"
						[(ngModel)]="value" />
					<label class="label" [attr.for]="setting.settingName">{{
						setting.setting.label
					}}</label>
				</div>

				<div *ngSwitchCase="getExternalType()" class="field">
					<button
						class="btn-primary lm-margin-lg-b lm-margin-sm-t"
						(click)="openExternalEditor()">
						Edit value
					</button>
				</div>

				<div *ngSwitchCase="'intSelector'" class="field">
					<label class="label" [attr.for]="setting.settingName">{{
						setting.setting.label
					}}</label>
					<select
						soho-dropdown
						[name]="'lm-a-rule-edit-' + setting.settingName"
						[attributes]="{
							name: 'id',
							value: 'lm-a-rule-edit-' + setting.settingName
						}"
						[(ngModel)]="value"
						data-validate="required"
						required>
						<option *ngFor="let item of maxCountNumbers" [ngValue]="item">
							{{ item }}
						</option>
					</select>
				</div>

				<div *ngSwitchCase="'int'" class="field">
					<label class="label e2e-rule-int" [attr.for]="setting.settingName">{{
						setting.setting.label
					}}</label>
					<input
						class="lm-left-text"
						[attr.id]="setting.settingName"
						[(ngModel)]="value"
						soho-input
						soho-mask
						process="number"
						sohoPattern="####" />
				</div>

				<div *ngSwitchCase="'AdminContactInfo'" class="field">
					<label class="label" [attr.for]="setting.settingName">{{
						setting.setting.label
					}}</label>
					<textarea
						soho-textarea
						maxlength="512"
						[attr.id]="setting.settingName"
						[(ngModel)]="value"
						data-validate="required"
						required></textarea>
				</div>

				<div *ngSwitchDefault class="field">
					<label
						class="label e2e-rule-default"
						[attr.for]="setting.settingName"
						>{{ setting.setting.label }}</label
					>
					<input
						[attr.id]="setting.settingName"
						type="text"
						[(ngModel)]="value"
						data-validate="required"
						required />
				</div>
			</div>
		</div>

		<div class="column">
			<!-- Add User -->
			<div class="field">
				<label class="label" for="autocomplete-rules">Add user</label>
				<div class="searchfield-wrapper">
					<input
						soho-autocomplete
						placeholder="Search for users..."
						id="autocomplete-rules"
						[autoSelectFirstItem]="true"
						[attributes]="{
							name: 'name',
							value: 'lm-a-set-editrule-user-search'
						}"
						class="e2e-userSearch lm-autocomplete-searchfield"
						maxlength="64"
						[(ngModel)]="userInput"
						[source]="autocompleteUserSource"
						[template]="autocompleteUserTemplate"
						(selected)="
							!$event[1].hasClass('no-results')
								? onSelectAutocomplete($event[2])
								: null
						" />
					<svg
						class="icon"
						focusable="false"
						aria-hidden="true"
						role="presentation">
						<use xlink:href="#icon-search"></use>
					</svg>
				</div>
				<span *ngIf="existsMessage" class="label error lm-margin-md-b">{{
					existsMessage
				}}</span>
			</div>

			<!-- Add Role -->
			<div class="compound-field lm-margin-xl-b">
				<div class="field lm-margin-zero-b">
					<label class="label" for="autocomplete-role">Add role</label>
					<div class="searchfield-wrapper">
						<input
							style="width: 155px"
							soho-autocomplete
							placeholder="Search for roles..."
							maxlength="64"
							id="autocomplete-role"
							[autoSelectFirstItem]="true"
							[attributes]="{
								name: 'name',
								value: 'lm-a-set-editrule-role-search'
							}"
							class="lm-autocomplete-searchfield"
							[(ngModel)]="roleInput"
							[source]="autocompleteRoleSource"
							[template]="autocompleteRoleTemplate"
							[filterMode]="autocompleteRoleFilterMode"
							(selected)="
								!$event[1].hasClass('no-results')
									? onSelectAutocomplete($event[2])
									: null
							" />
						<svg
							class="icon"
							focusable="false"
							aria-hidden="true"
							role="presentation">
							<use xlink:href="#icon-search"></use>
						</svg>
					</div>
				</div>
				<button
					class="btn-secondary"
					id="lm-a-sett-ar-ar"
					(click)="addRole()"
					[disabled]="!roleInput">
					Add Role
				</button>
				<span *ngIf="existsRoleMessage" class="label error">{{
					existsRoleMessage
				}}</span>
			</div>

			<label for="affectedUsers" class="label" *ngIf="ruleConnections.length"
				>Added</label
			>
			<div class="listview lm-compact-list lm-max-height-l">
				<ul id="affectedUsers">
					<li
						*ngFor="let connection of ruleConnections"
						class="lm-cursor-default"
						soho-tooltip
						[title]="connection.info">
						<!-- orderBy:'connection.displayName' -->
						<p
							class="listview-heading lm-pull-left"
							[class.is-group]="!connection.isUser"
							name="lm-a-sett-rule-added-name">
							{{ connection.displayName }}
						</p>
						<button
							class="btn-icon"
							(click)="remove(connection)"
							soho-tooltip
							title="Remove"
							name="lm-a-sett-rule-added-remove">
							<svg class="icon icon-close" aria-hidden="true" focusable="false">
								<use xlink:href="#icon-close" />
							</svg>
							<span class="audible">Remove</span>
						</button>
					</li>
				</ul>
			</div>
		</div>
	</div>

	<!-- Modal buttons -->
	<div class="modal-buttonset">
		<button class="btn-modal" id="lm-a-sett-ar-c" (click)="dialog?.close()">
			Cancel
		</button>
		<button class="btn-modal-primary" id="lm-a-sett-ar-s" (click)="onOk()">
			{{ primaryButtonLabel }}
		</button>
	</div>
</div>

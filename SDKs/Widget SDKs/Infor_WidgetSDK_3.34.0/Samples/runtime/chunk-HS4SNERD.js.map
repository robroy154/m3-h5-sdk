﻿<div
	soho-busyindicator
	[blockUI]="true"
	[displayDelay]="0"
	[activated]="isBusy">
	<div class="field">
		<label>Content type</label>
	</div>
	<fieldset class="radio-group">
		<input
			type="radio"
			[disabled]="hasTags()"
			id="tags-add-both"
			class="radio"
			[(ngModel)]="selectedType"
			[value]="0" />
		<label for="tags-add-both" class="radio-label"
			>Both pages and widgets</label
		>
		<br />
		<input
			type="radio"
			[disabled]="hasTags()"
			id="tags-add-pages"
			class="radio"
			[(ngModel)]="selectedType"
			[value]="1" />
		<label for="tags-add-pages" class="radio-label">Only pages</label>
		<br />
		<input
			type="radio"
			[disabled]="hasTags()"
			id="tags-add-widgets"
			class="radio"
			[(ngModel)]="selectedType"
			[value]="2" />
		<label for="tags-add-widgets" class="radio-label">Only widgets</label>
	</fieldset>
	<lm-tags-customize-component
		[tags]="tags"
		[maxNr]="20"
		[isAuto]="false"></lm-tags-customize-component>
	<div class="modal-buttonset">
		<button
			class="btn-modal"
			(click)="onCancel()"
			[disabled]="isBusy"
			id="lm-a-tagsadd-dialog-cancel">
			Cancel
		</button>
		<button
			class="btn-modal-primary"
			(click)="onOk()"
			[disabled]="!hasTags() || isBusy"
			id="lm-a-tagsadd-dialog-cancel">
			OK
		</button>
	</div>
</div>

﻿<div
	#propertiesViewRef
	soho-busyindicator
	[activated]="isBusy"
	[blockUI]="true"
	[displayDelay]="0">
	<soho-toolbar-flex (selected)="onSelectedToolbar($event)">
		<soho-toolbar-flex-section [isTitle]="true" class="lm-info-text-md">
		</soho-toolbar-flex-section>
		<soho-toolbar-flex-section [isButtonSet]="true">
			<button
				soho-button="tertiary"
				icon="export"
				[disabled]="!items.length"
				data-action="exportAll"
				id="lm-a-prop-exportall">
				Export All
			</button>
			<button
				soho-button="tertiary"
				icon="import"
				data-action="importProperties"
				id="lm-a-prop-import">
				Import
			</button>
			<div class="separator"></div>
			<button
				soho-button="tertiary"
				icon="add"
				data-action="addProperty"
				id="lm-a-prop-add">
				Add Property
			</button>
			<div class="separator"></div>
			<button
				soho-button="icon"
				icon="refresh"
				data-action="refresh"
				style="border: 0; margin-bottom: 0"
				soho-tooltip
				title="Refresh"
				id="lm-a-prop-refresh">
				<span class="audible">Refresh</span>
			</button>
		</soho-toolbar-flex-section>

		<soho-toolbar-flex-more-button> </soho-toolbar-flex-more-button>
	</soho-toolbar-flex>

	<div class="contextual-toolbar toolbar is-hidden">
		<div class="title">Actions</div>
		<div class="buttonset">
			<button
				soho-button="tertiary"
				icon="edit"
				[disabled]="selectionCount !== 1"
				(click)="openAddEditPropertyConnection(true)"
				id="lm-a-prop-edit">
				Edit
			</button>
			<button
				soho-button="tertiary"
				icon="delete"
				(click)="showConfirmDelete()"
				id="lm-a-prop-delete">
				Delete ({{ selectionCount }})
			</button>
			<button
				soho-button="tertiary"
				icon="export"
				(click)="exportProperties()"
				id="lm-a-prop-export">
				Export ({{ selectionCount }})
			</button>
		</div>
	</div>
	<div
		soho-datagrid
		id="adminPropertiesGrid"
		[gridOptions]="datagridOptions"
		[data]="datagridOptions.dataset"
		(selected)="updateGridSelection($event.rows)"></div>
</div>

﻿<div
	soho-busyindicator
	[blockUI]="true"
	[displayDelay]="0"
	[activated]="isBusy">
	<lm-entity-access-component
		[options]="accessOptions"
		[isAdmin]="true"></lm-entity-access-component>

	<div class="modal-buttonset">
		<button
			type="button"
			class="btn-modal"
			[disabled]="isBusy"
			(click)="close()"
			name="lm-a-eacc-permissions-cancel">
			Cancel
		</button>
		<button
			type="button"
			class="btn-modal-primary"
			[disabled]="isBusy"
			(click)="save()"
			name="lm-a-eacc-permissions-save">
			Save
		</button>
	</div>
</div>

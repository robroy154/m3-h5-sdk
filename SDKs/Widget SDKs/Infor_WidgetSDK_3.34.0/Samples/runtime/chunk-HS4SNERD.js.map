<div
	#archiveSEViewRef
	soho-busyindicator
	[activated]="isBusy"
	[blockUI]="true"
	[displayDelay]="0">
	<div class="row lm-margin-xl-t">
		<div class="twelve columns">
			<soho-toolbar-flex (selected)="onSelectedToolbar($event)">
				<soho-toolbar-flex-section [isTitle]="true" class="lm-info-text-md">
				</soho-toolbar-flex-section>

				<soho-toolbar-flex-section [isSearch]="true">
					<input
						soho-toolbar-flex-searchfield
						[clearable]="true"
						[collapsible]="true"
						maxlength="64"
						[(ngModel)]="query"
						[disabled]="toolbarDisabled"
						(cleared)="clearSearch()"
						(lm-submit)="search()"
						(keydown.esc)="clearSearch()"
						id="lm-a-arc-se-search"
						(focus)="onSearchfieldFocus()"
						(blur)="onSearchfieldFocusLost()" />
				</soho-toolbar-flex-section>

				<soho-toolbar-flex-section [isButtonSet]="true">
					<button
						soho-menu-button
						menu="lm-a-arc-se-sort"
						[disabled]="toolbarDisabled"
						type="button"
						icon="sort-down">
						{{ orderBy.name }}
					</button>
					<ul soho-popupmenu id="lm-a-arc-se-sort">
						<li soho-popupmenu-item *ngFor="let item of orderByItems">
							<a
								soho-popupmenu-label
								[name]="item.name | lmAutoId: 'lm-a-arc-se-sortorder'"
								(click)="setOrderBy(item)"
								>{{ item.name }}</a
							>
						</li>
					</ul>
					<button
						soho-menu-button
						menu="lm-a-arc-se-flt"
						[disabled]="toolbarDisabled"
						class="btn-menu"
						type="button"
						icon="filter"
						soho-tooltip
						[title]="filterTooltip">
						<svg soho-icon *ngIf="isFiltered" icon="info" [alert]="true"></svg>
						Filter
					</button>
					<ul soho-popupmenu id="lm-a-arc-se-flt" class="is-selectable">
						<li
							soho-popupmenu-item
							*ngFor="let item of filterItems"
							[isChecked]="item.selected">
							<a
								soho-popupmenu-label
								[name]="item.name | lmAutoId: 'lm-a-arc-se-filteroption'"
								(click)="onFilter(item)"
								>{{ item.name }}</a
							>
						</li>
					</ul>
					<button
						id="lm-a-arc-se-rfr"
						soho-button="icon"
						icon="refresh"
						data-action="refresh"
						style="border: 0; margin-bottom: 0"
						soho-tooltip
						title="Refresh">
						<span class="audible">Refresh</span>
					</button>
				</soho-toolbar-flex-section>

				<soho-toolbar-flex-more-button> </soho-toolbar-flex-more-button>
			</soho-toolbar-flex>

			<div class="contextual-toolbar toolbar is-hidden">
				<div class="title">Actions</div>
				<div class="buttonset">
					<button
						id="lm-a-arc-se-dlt"
						soho-button="tertiary"
						icon="delete"
						(click)="onClickDelete(selected)">
						Delete
					</button>
				</div>
			</div>
			<div
				soho-datagrid
				#archiveSEDatagrid
				id="lm-a-arc-se-grid"
				[gridOptions]="datagridOptions"
				[data]="datagridOptions.dataset"
				(selected)="updateSelection($event.rows)"></div>

			<div class="lm-pull-left lm-padding-md-t">
				<p *ngIf="!toolbarDisabled">
					{{ getItemCountText() }}
					<span *ngIf="isSearchActive || filter.type"
						>There are active filters.
						<a id="lm-a-arc-se-clr" soho-hyperlink (click)="clearAllFilters()"
							>Clear all</a
						>
					</span>
				</p>
			</div>
			<button
				id="lm-a-more-btn"
				soho-button="secondary"
				(click)="more()"
				[disabled]="isBusy || !hasMore">
				More
			</button>
		</div>
	</div>
</div>
<div class="modal-buttonset">
	<button id="lm-a-arc-se-cncl" class="btn-modal" (click)="dialog?.close()">
		Cancel
	</button>
	<button
		id="lm-a-arc-se-res"
		class="btn-modal-primary"
		[disabled]="!selected"
		(click)="onClickRestore(selected)">
		Restore
	</button>
</div>

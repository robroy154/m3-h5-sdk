﻿<div
	soho-busyindicator
	[activated]="isBusy"
	[blockUI]="true"
	[displayDelay]="0">
	<soho-toolbar-flex *ngIf="showToolbar">
		<soho-toolbar-flex-section [isTitle]="true" class="lm-info-text-md">
			{{ title }}
		</soho-toolbar-flex-section>

		<soho-toolbar-flex-section [isSearch]="true">
			<input
				soho-toolbar-flex-searchfield
				[clearable]="true"
				[collapsible]="true"
				maxlength="64"
				[(ngModel)]="query"
				(cleared)="clearSearch()"
				(lm-submit)="search()"
				(keydown.esc)="clearSearch()"
				id="a-ps-searchfield"
				(focus)="onSearchfieldFocus()"
				(blur)="onSearchfieldFocusLost()" />
		</soho-toolbar-flex-section>

		<soho-toolbar-flex-section [isButtonSet]="true">
			<button soho-menu-button menu="lmAdminPageSelectorFilter">
				<span>{{ orderBy.name }}</span>
			</button>
			<ul soho-popupmenu id="lmAdminPageSelectorFilter" class="is-selectable">
				<li soho-popupmenu-item *ngFor="let item of orderByItems">
					<a
						soho-popupmenu-label
						[name]="item.name | lmAutoId: 'lm-a-ps-sortorder'"
						(click)="setOrderBy(item)"
						>{{ item.name }}</a
					>
				</li>
			</ul>
		</soho-toolbar-flex-section>

		<soho-toolbar-flex-more-button> </soho-toolbar-flex-more-button>
	</soho-toolbar-flex>

	<div
		#pageSelectorDatagrid
		id="gridPageSelector"
		soho-datagrid
		[gridOptions]="datagridOptions"
		[data]="datagridOptions.dataset"
		(selected)="updateSelection($event.rows)"
		(expandrow)="onExpandRow($event)"></div>

	<div class="lm-admin-quota-message lm-margin-md-t">
		<p id="lm-a-ps-showcounttext">{{ getItemCountText() }}</p>
		<p
			class="lm-margin-sm-t"
			*ngIf="isMultiSelect"
			id="lm-a-ps-selectedpages-text">
			Number of selected pages: {{ selectionCount }}
		</p>
		<p
			class="lm-margin-sm-t"
			*ngIf="!isMultiSelect && selected"
			id="lm-a-ps-selectedpage-text">
			Selected page: {{ selected?.data?.title }}
		</p>
	</div>

	<button
		id="lm-a-more-btn"
		soho-button
		*ngIf="items.length"
		type="button"
		(click)="more()"
		[disabled]="!hasMore">
		More
	</button>

	<div class="modal-buttonset">
		<button
			type="button"
			class="btn-modal"
			[disabled]="isBusy"
			(click)="close()"
			id="lm-a-pageselect-dialog-cancel">
			Cancel
		</button>
		<button
			type="button"
			class="btn-modal-primary"
			[disabled]="!hasSelection() || isBusy"
			(click)="add()"
			id="lm-a-pageselect-dialog-add">
			{{ defaultButtonText }}
		</button>
	</div>
</div>

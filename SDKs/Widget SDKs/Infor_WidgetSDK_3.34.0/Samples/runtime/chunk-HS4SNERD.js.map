<div style="min-width: 550px">
	<div soho-tabs>
		<div soho-tab-list-container>
			<ul soho-tab-list>
				<li soho-tab>
					<a soho-tab-title id="lm-a-dp-aewid-basictab" tabId="Basic">Basic</a>
				</li>
				<li soho-tab [selected]="isPermissionTabOnInit">
					<a soho-tab-title id="lm-a-dp-aewid-pmtab" tabId="Permissions"
						>Permissions</a
					>
				</li>
			</ul>
		</div>
	</div>
	<div soho-tab-panel-container>
		<div soho-tab-panel tabId="Basic">
			<div style="display: flex; flex-direction: column">
				<button
					*ngIf="!widget"
					id="lm-a-dp-aewid-select-btn"
					soho-button="primary"
					icon="search-list"
					(click)="selectWidget()">
					Select widget
				</button>
				<p *ngIf="widget">Selected widget:</p>
				<div
					*ngIf="widget"
					style="display: flex; flex-direction: row; margin-top: 5px">
					<h2
						id="lm-a-dp-aewid-swidget-h2"
						style="
							flex: 1 1 auto;
							font-weight: bold;
							margin-top: 5px;
							vertical-align: middle;
						">
						{{ widget.t }}
					</h2>
					<button
						soho-button="tertiary"
						id="lm-a-dp-aewid-eswidget-btn"
						icon="edit"
						(click)="selectWidget()">
						Edit
					</button>
				</div>
			</div>
		</div>
		<div soho-tab-panel tabId="Permissions">
			<lm-dynamic-permissions
				[listLabel]="listLabel"
				[selectedExpressions]="selectedExpressions"
				[(selected)]="expressions"
				[operator]="widget?.op || '||'"
				showOperator="true"></lm-dynamic-permissions>
		</div>
	</div>
	<div class="modal-buttonset">
		<button
			type="button"
			id="lm-a-dp-aewid-cncl-btn"
			class="btn-modal"
			(click)="close()">
			Cancel
		</button>
		<button
			type="button"
			id="lm-a-dp-aewid-save-btn"
			class="btn-modal-primary"
			[disabled]="!canSave"
			(click)="save()">
			{{ isEditable ? "Save" : "OK" }}
		</button>
	</div>
</div>

<div style="width: 550px" #dialogViewContRef>
	<div soho-tabs (beforeActivated)="onTabChange()">
		<div soho-tab-list-container>
			<ul soho-tab-list>
				<li soho-tab>
					<a soho-tab-title id="lm-a-dp-aeh-basictab" tabId="Basic">Basic</a>
				</li>
				<li soho-tab [selected]="isPermissionTabOnInit">
					<a soho-tab-title id="lm-a-dp-aeh-pmtab" tabId="Permissions"
						>Permissions</a
					>
				</li>
				<li soho-tab>
					<a soho-tab-title id="lm-a-dp-aeh-trantab" tabId="Translations"
						>Translations</a
					>
				</li>
			</ul>
		</div>
	</div>
	<div soho-tab-panel-container>
		<div soho-tab-panel tabId="Basic">
			<div class="field lm-margin-zero-b" id="header-color-bar">
				<label soho-label>Header color bar</label>
				<input
					soho-radiobutton
					name="header-color-bar"
					id="lm-a-dp-aeh-none-chk"
					type="radio"
					[value]="colorTypes.None"
					[(ngModel)]="header.clt" />
				<label soho-label for="lm-a-dp-aeh-none-chk" [forRadioButton]="true"
					>None</label
				>
				<br />
				<input
					soho-radiobutton
					name="header-color-bar"
					id="lm-a-dp-aeh-inhprnt-chk"
					type="radio"
					[value]="colorTypes.InheritParent"
					[(ngModel)]="header.clt" />
				<label soho-label for="lm-a-dp-aeh-inhprnt-chk" [forRadioButton]="true"
					>Use component icon color</label
				>
				<br />
				<input
					soho-radiobutton
					name="header-color-bar"
					id="lm-a-dp-aeh-inhpage-chk"
					type="radio"
					[value]="colorTypes.InheritPage"
					[(ngModel)]="header.clt" />
				<label soho-label for="lm-a-dp-aeh-inhpage-chk" [forRadioButton]="true"
					>Use page color</label
				>
				<br />
				<input
					soho-radiobutton
					name="header-color-bar"
					id="lm-a-dp-aeh-cust-chk"
					type="radio"
					[value]="colorTypes.Custom"
					[(ngModel)]="header.clt" />
				<label soho-label for="lm-a-dp-aeh-cust-chk" [forRadioButton]="true"
					>Select custom color</label
				>
				<br />
			</div>
			<div class="field">
				<input
					[class.disabled-colorpicker]="disabledColorPicker()"
					id="lm-a-dp-aeh-color-inp"
					name="header-color-picker"
					soho-colorpicker
					[disabled]="disabledColorPicker()"
					[editable]="colorpickerOptions.editable"
					[showLabel]="colorpickerOptions.showLabel"
					[colors]="colorpickerOptions.colors"
					[clearable]="false"
					[attributes]="{
						name: 'id',
						value: 'lm-a-dp-information-header-color'
					}"
					[(ngModel)]="selectedColorHex" />
			</div>
			<div class="field">
				<label soho-label>Image URL</label>
				<div class="header-input-area">
					<input
						#imgTextArea
						id="lm-a-dp-aeh-img-inp"
						type="text"
						style="width: 100%"
						[maxlength]="imgMaxLength"
						[(ngModel)]="imgText" />
					<button
						class="user-property hyperlink"
						id="lm-a-dp-aeh-iup-btn"
						(click)="openUserPropertyDialog(propertyField.Image, imgTextArea)">
						Insert user property
					</button>
				</div>
			</div>
			<div class="field" id="heading">
				<label soho-label>Heading</label>
				<input
					soho-radiobutton
					name="heading"
					type="radio"
					id="lm-a-dp-aeh-hnone-chk"
					[value]="headingStrategies.None"
					[(ngModel)]="h1Strategy" />
				<label soho-label [forRadioButton]="true" for="lm-a-dp-aeh-hnone-chk"
					>None</label
				>
				<input
					soho-radiobutton
					name="heading"
					type="radio"
					id="lm-a-dp-aeh-htxt-chk"
					[value]="headingStrategies.Text"
					[(ngModel)]="h1Strategy" />
				<label soho-label [forRadioButton]="true" for="lm-a-dp-aeh-htxt-chk"
					>Text</label
				>
				<input
					soho-radiobutton
					name="heading"
					type="radio"
					id="lm-a-dp-aeh-hup-chk"
					[value]="headingStrategies.Property"
					[(ngModel)]="h1Strategy" />
				<label soho-label [forRadioButton]="true" for="lm-a-dp-aeh-hup-chk"
					>User property</label
				>
				<br />
				<ng-container *ngIf="h1Strategy === headingStrategies.Property">
					<button
						soho-button="primary"
						id="lm-a-dp-aeh-hsup-btn"
						*ngIf="!h1Property"
						(click)="openUserPropertyDialog(propertyField.h1)">
						Select user property
					</button>
					<div class="selected-container" *ngIf="h1Property">
						<h2 id="lm-a-dp-aeh-hup-h2">
							{{ h1Property | lmTrimCurlyBraces }}
						</h2>
						<button
							soho-button="tertiary"
							id="lm-a-dp-aeh-edithup-btn"
							icon="edit"
							(click)="openUserPropertyDialog(propertyField.h1)">
							Edit
						</button>
					</div>
				</ng-container>
				<ng-container *ngIf="h1Strategy === headingStrategies.Text">
					<div class="header-input-area">
						<input
							#h1TextArea
							id="lm-a-dp-aeh-htext-inp"
							type="text"
							class="headers-input"
							[maxlength]="inputMaxLength"
							[(ngModel)]="h1Text" />
						<button
							class="user-property hyperlink"
							id="lm-a-dp-aeh-hiup-btn"
							(click)="openUserPropertyDialog(propertyField.h1, h1TextArea)">
							Insert user property
						</button>
					</div>
				</ng-container>
			</div>
			<div class="field" id="subheading">
				<label soho-label>Subheading</label>
				<input
					soho-radiobutton
					name="subheading"
					type="radio"
					id="lm-a-dp-aeh-shnone-chk"
					[value]="headingStrategies.None"
					[(ngModel)]="h2Strategy" />
				<label soho-label [forRadioButton]="true" for="lm-a-dp-aeh-shnone-chk"
					>None</label
				>
				<input
					soho-radiobutton
					name="subheading"
					type="radio"
					id="lm-a-dp-aeh-shtxt-chk"
					[value]="headingStrategies.Text"
					[(ngModel)]="h2Strategy" />
				<label soho-label [forRadioButton]="true" for="lm-a-dp-aeh-shtxt-chk"
					>Text</label
				>
				<input
					soho-radiobutton
					name="subheading"
					type="radio"
					id="lm-a-dp-aeh-shup-chk"
					[value]="headingStrategies.Property"
					[(ngModel)]="h2Strategy" />
				<label soho-label [forRadioButton]="true" for="lm-a-dp-aeh-shup-chk"
					>User property</label
				>
				<br />
				<ng-container *ngIf="h2Strategy === headingStrategies.Property">
					<button
						soho-button="primary"
						id="lm-a-dp-aeh-shsup-btn"
						*ngIf="!h2Property"
						(click)="openUserPropertyDialog(propertyField.h2)">
						Select user property
					</button>
					<div class="selected-container" *ngIf="h2Property">
						<h2 id="lm-a-dp-aeh-shup-h2">
							{{ h2Property | lmTrimCurlyBraces }}
						</h2>
						<button
							soho-button="tertiary"
							id="lm-a-dp-aeh-editshup-btn"
							icon="edit"
							(click)="openUserPropertyDialog(propertyField.h2)">
							Edit
						</button>
					</div>
				</ng-container>
				<ng-container *ngIf="h2Strategy === headingStrategies.Text">
					<div class="input-translation">
						<div class="header-input-area">
							<input
								#h2TextArea
								id="lm-a-dp-aeh-shtext-inp"
								type="text"
								class="headers-input"
								[maxlength]="inputMaxLength"
								[(ngModel)]="h2Text" />
							<button
								class="user-property hyperlink"
								id="lm-a-dp-aeh-shiup-btn"
								(click)="openUserPropertyDialog(propertyField.h2, h2TextArea)">
								Insert user property
							</button>
						</div>
					</div>
				</ng-container>
			</div>
		</div>
		<div soho-tab-panel tabId="Permissions">
			<lm-dynamic-permissions
				[listLabel]="listLabel"
				[selectedExpressions]="selectedExpressions"
				[(selected)]="expressions"
				[operator]="header.op"
				showOperator="true"></lm-dynamic-permissions>
		</div>
		<div soho-tab-panel tabId="Translations">
			<p *ngIf="!isTranslateable">There is nothing to translate.</p>
			<lm-dynamic-page-translations
				*ngIf="isTranslateable"
				[localizations]="itemLzn"
				[optionsItems]="optionsItems"
				(localizationChange)="onLocalizationChange($event)">
			</lm-dynamic-page-translations>
		</div>
	</div>
	<div class="modal-buttonset">
		<button
			type="button"
			id="lm-a-dp-aeh-cncl-btn"
			class="btn-modal"
			(click)="close()">
			Cancel
		</button>
		<button
			type="button"
			id="lm-a-dp-aeh-save-btn"
			class="btn-modal-primary"
			(click)="save()">
			{{ isEditable ? "Save" : "OK" }}
		</button>
	</div>
</div>

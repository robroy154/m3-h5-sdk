<div class="field">
	<label class="required">Title</label>
	<input
		soho-input
		id="lm-a-dp-ael-ttl-inp"
		[maxlength]="titleMaxLength"
		[(ngModel)]="link.t"
		(ngModelChange)="onTitleChanged($event)"
		data-validate="required" />
</div>
<div class="field" *ngIf="isShortcut">
	<label class="required">Shortcut URL</label>
	<input
		soho-input
		id="lm-a-dp-ael-surl-inp"
		[maxlength]="urlMaxLength"
		[(ngModel)]="link.u"
		(ngModelChange)="onTitleChanged($event)"
		data-validate="required" />
</div>
<div class="field" *ngIf="!isShortcut || isContentLink">
	<label>Link URL</label>
	<input
		soho-input
		id="lm-a-dp-ael-lurl-inp"
		[maxlength]="urlMaxLength"
		[(ngModel)]="link.u" />
</div>
<div class="field" *ngIf="!isShortcut && !isContentLink">
	<label soho-label>Type</label>
	<input
		soho-radiobutton
		id="lm-a-dp-ael-typelink-chk"
		type="radio"
		name="link-type"
		[value]="linkSizes.Heading"
		[(ngModel)]="link.sz"
		checked />
	<label soho-label for="lm-a-dp-ael-typelink-chk" [forRadioButton]="true"
		>Link</label
	>
	<br />
	<input
		soho-radiobutton
		id="lm-a-dp-ael-typesublink-chk"
		type="radio"
		name="link-type"
		[value]="linkSizes.Normal"
		[(ngModel)]="link.sz" />
	<label soho-label for="lm-a-dp-ael-typesublink-chk" [forRadioButton]="true"
		>Sublink</label
	>
</div>
<lm-icon-selector
	[icon]="link.i"
	[color]="link.cl"
	[colorType]="link.clt"
	[isDisabled]="!isLinkHeading() && !isShortcut && !isContentLink"
	[isIconMandatory]="isShortcut"
	(iconChanged)="onIconChanged($event)"
	(colorChanged)="onColorChanged($event)"
	(colorTypeChanged)="onColorTypeChanged($event)">
</lm-icon-selector>

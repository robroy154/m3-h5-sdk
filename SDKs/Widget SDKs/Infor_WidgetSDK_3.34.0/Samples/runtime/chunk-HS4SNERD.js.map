<ng-container [formGroup]="settingsForm">
	<div class="field">
		<label class="required">Title</label>
		<input
			soho-input
			id="lm-a-dps-title-inp"
			[maxlength]="pageTitleMaxLength"
			formControlName="title"
			data-validate="required" />
	</div>
	<div class="field" *ngIf="showDescription">
		<label class="required">Description</label>
		<textarea
			soho-textarea
			id="lm-a-dps-desc-ta"
			[maxlength]="pageDescriptionMaxLength"
			formControlName="description"
			data-validate="required"></textarea>
	</div>
	<div class="field">
		<label>Color</label>
		<input
			soho-colorpicker
			id="lm-a-dps-color-inp"
			formControlName="color"
			[editable]="false"
			[showLabel]="true"
			[colors]="availableColors"
			[clearable]="false"
			[attributes]="{ name: 'id', value: 'lm-a-dps-page-color' }" />
	</div>
	<div class="field switch lm-margin-md-t">
		<input
			id="lm-a-dps-memo-chk"
			formControlName="enableMemo"
			type="checkbox"
			class="switch" />
		<label for="lm-a-dps-memo-chk">Show announcements below page header</label>
	</div>
	<div
		class="field switch lm-margin-md-t"
		*ngIf="settingsForm.value.enableMemo">
		<input
			id="lm-a-dps-animate-chk"
			formControlName="enableAnimation"
			type="checkbox"
			class="switch" />
		<label for="lm-a-dps-animate-chk">Animate announcements</label>
	</div>
	<div class="field lm-margin-md-t" *ngIf="settingsForm.value.enableMemo">
		<label id="lm-a-dps-dur-lbl" for="lm-a-dps-dur-drpd"
			>Slide duration (seconds)</label
		>
		<select
			soho-dropdown
			class="input-sm"
			formControlName="memoDuration"
			name="lm-a-dps-dur-drpd"
			[attributes]="{ name: 'id', value: 'lm-a-dps-duration' }"
			[noSearch]="true">
			<option
				[ngValue]="value"
				id="lm-a-dps-dur-option-{{ value }}"
				*ngFor="let value of allowedMemoDuration">
				{{ formatMemoDuration(value) }}
			</option>
		</select>
	</div>
</ng-container>

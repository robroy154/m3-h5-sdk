<div>
	<p class="lm-margin-sm-b">
		The selected policies will be applied in the preview of the page.
	</p>
	<div>
		<div class="lm-margin-lg-t lm-margin-lg-b">
			<input
				soho-checkbox
				id="lm-a-dp-pv-a"
				type="checkbox"
				[(ngModel)]="isAllSelected"
				(ngModelChange)="onSelectAll($event)" />
			<label soho-label for="lm-a-dp-pv-a" [forCheckBox]="true"
				>Select / deselect all</label
			>
		</div>
		<div class="field" *ngFor="let item of items; let i = index">
			<input
				soho-checkbox
				type="checkbox"
				id="lm-a-dp-pv-{{ i }}"
				[(ngModel)]="item.selected" />
			<label soho-label for="lm-a-dp-pv-{{ i }}" [forCheckBox]="true">{{
				item.access.t
			}}</label>
		</div>
	</div>
</div>

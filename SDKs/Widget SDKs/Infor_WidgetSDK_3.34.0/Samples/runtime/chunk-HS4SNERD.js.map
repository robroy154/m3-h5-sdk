<div *ngIf="statusMessageList?.length > 0">
	<ul>
		<li
			*ngFor="let item of statusMessageList; let first = first; let last = last"
			[class.lm-fg]="isStatusMessage(item)"
			[ngClass]="{ 'separator lm-brd': !first && last && isLastMessage() }">
			<svg
				soho-icon
				*ngIf="hasIcon(item.severity)"
				icon="{{ getIcon(item.severity) }}"
				[alert]="true"></svg>
			<span> {{ item.message }} </span>
		</li>
	</ul>
</div>
<div *ngIf="errorMessageList?.length > 0">
	<ul>
		<li
			*ngFor="let item of errorMessageList; let first = first; let last = last"
			[class.statusMessage]="isStatusMessage(item)"
			[class.separator]="!first && last && isCompleted">
			<svg
				soho-icon
				*ngIf="isStatusMessage(item)"
				icon="{{ getIcon(item.severity) }}"
				[alert]="true"></svg>
			<span> {{ item.message }} </span>
		</li>
	</ul>
</div>

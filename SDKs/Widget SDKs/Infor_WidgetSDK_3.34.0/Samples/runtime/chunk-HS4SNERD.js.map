﻿<div
	soho-busyindicator
	[blockUI]="true"
	[displayDelay]="0"
	[activated]="isBusy"
	style="max-width: 600px">
	<div class="field">
		<input
			soho-checkbox
			id="lm-a-sp-tst-im"
			type="checkbox"
			[(ngModel)]="isImpersonation" />
		<label soho-label for="lm-a-sp-tst-im" [forCheckBox]="true"
			>Impersonate</label
		>
	</div>

	<div class="lm-margin-lg-t">
		<div *ngFor="let item of items; let i = index">
			<div class="field lm-truncate-text" *ngIf="item.type === 'b'">
				<input
					soho-checkbox
					type="checkbox"
					id="lm-a-sp-tst-bval{{ i }}"
					[attr.disabled]="isImpersonation ? null : true"
					[(ngModel)]="item.selected" />
				<label soho-label for="lm-a-sp-tst-bval{{ i }}" [forCheckBox]="true">{{
					item.label
				}}</label>
			</div>
			<div class="field lm-margin-md-t" *ngIf="item.type !== 'b'">
				<label for="lm-a-sp-tst-val{{ i }}" class="label">{{
					item.label
				}}</label>
				<input
					id="lm-a-sp-tst-val{{ i }}"
					*ngIf="item.type === 's' || item.attribute?.hasValues"
					maxlength="256"
					[attr.disabled]="isImpersonation ? null : true"
					[(ngModel)]="item.value" />
				<input
					id="lm-a-sp-tst-nval-{{ i }}"
					[(ngModel)]="item.value"
					class="input-mm"
					soho-input
					maxlength="256"
					[attr.disabled]="isImpersonation ? null : true"
					soho-mask
					process="number"
					[allowThousandsSeparator]="false"
					[allowDecimal]="true"
					*ngIf="item.type === 'n'" />
				<input
					id="lm-a-sp-tst-dval{{ i }}"
					soho-datepicker
					[attributes]="{ name: 'id', value: 'lm-a-sp-tst-dval' + i }"
					class="input-mm"
					[attr.disabled]="isImpersonation ? null : true"
					*ngIf="item.type === 'd'"
					[(ngModel)]="item.value" />
			</div>
		</div>
	</div>

	<button
		id="lm-a-sp-tst-eval"
		class="btn-secondary lm-margin-lg-t"
		[disabled]="isBusy"
		(click)="onEvaluate()">
		Evaluate
	</button>

	<h3 class="lm-margin-lg-t" *ngIf="message">{{ message }}</h3>

	<div class="modal-buttonset">
		<button id="lm-a-sp-tst-close" class="btn-modal" (click)="onClose()">
			Close
		</button>
	</div>
</div>

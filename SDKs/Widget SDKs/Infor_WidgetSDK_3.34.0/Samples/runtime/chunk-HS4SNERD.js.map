<label for="autocomplete-user-search">{{ labelText }}</label>
<div class="searchfield-wrapper">
	<input
		soho-autocomplete
		[autoSelectFirstItem]="true"
		class="lm-autocomplete-searchfield"
		id="autocomplete-user-search"
		[attributes]="{ name: 'name', value: 'lm-a-user-search' }"
		placeholder="Search for a user..."
		maxlength="254"
		[(ngModel)]="searchQuery"
		[class.lm-clearable]="searchQuery"
		(selected)="onUserSelect($event)"
		[source]="autocompleteSource"
		[template]="autocompleteTemplate" />
	<svg soho-icon icon="search"></svg>
	<svg
		soho-icon
		icon="close"
		class="close"
		(click)="clearSearch()"
		*ngIf="searchQuery"></svg>
</div>

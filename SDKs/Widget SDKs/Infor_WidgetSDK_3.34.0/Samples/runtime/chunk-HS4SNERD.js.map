<select
	soho-dropdown
	class="lm-dropdown-mds"
	noSearch
	[ngModel]="model"
	(ngModelChange)="modelChange.emit($event)"
	name="lm-a-mm-dr-weekday"
	[attributes]="{ name: 'id', value: 'lm-a-mm-dr-weekday' }">
	<option *ngFor="let day of weekdays" [value]="day.value">
		{{ day.label }}
	</option>
</select>

<div
	class="dynamic-list-row list-item lm-item-bg"
	[class.is-selected]="isSelected"
	[class.is-cut]="isCut">
	<div class="dl-icon">
		<svg
			soho-icon
			[attr.name]="itemAutoIdentifier + '-select-handle'"
			[attr.data-lm-a-dp-item-select-btn]="uniqueId"
			icon="drag"
			(click)="onSelected($event)"></svg>
	</div>
	<div class="image-wrapper" *ngIf="isImageComponent">
		<img
			broken-image-fallback
			[attr.name]="itemAutoIdentifier + '-img-thumb'"
			[attr.data-lm-a-dp-img-thumb]="uniqueId"
			[default]="imageFallback"
			[src]="imgUrl"
			(click)="editItem.emit()"
			class="image" />
	</div>
	<div class="h1" [class.content-type]="isContent" *ngIf="isHeaderColorBar">
		<ng-container *ngIf="h1">
			<span
				*ngIf="icon"
				[attr.data-lm-a-dp-item-icon]="uniqueId"
				[attr.name]="itemAutoIdentifier + '-iconcont'"
				class="dyn-icon"
				[class.clt-inherit]="isColorTypeInherit"
				[style.background-color]="
					isColorTypeCustom ? (iconColor | lmColorNumberToHexExtended) : '#fff'
				">
				<svg
					class="icon"
					[attr.name]="itemAutoIdentifier + '-h1icon'"
					focusable="false">
					<use [attr.xlink:href]="icon"></use>
				</svg>
			</span>
			<p class="lm-truncate-text" [class.normal-link]="isNormal">
				<span
					[attr.name]="itemAutoIdentifier + '-h1'"
					[attr.data-lm-a-dp-item-h1]="uniqueId"
					(click)="editItem.emit()"
					>{{ h1 }}</span
				>
			</p>
		</ng-container>
		<ng-container *ngIf="isItemContainer">
			<p class="lm-truncate-text" *ngIf="isHeader">
				<span
					[attr.name]="itemAutoIdentifier + '-colortype'"
					(click)="editItem.emit()"
					[attr.data-lm-a-dp-item-clt]="uniqueId"
					[class.empty-input]="isColorTypeNone"
					>{{ clt | lmGetColorTypeName }}</span
				>
			</p>
			<span
				*ngIf="isHeaderWithCustomColor"
				class="custom-color"
				[style.background-color]="
					customColor | lmColorNumberToHexExtended
				"></span>
			<p class="lm-truncate-text" *ngIf="isContent">
				<span
					*ngIf="!isLinebreak"
					[attr.name]="itemAutoIdentifier + '-type'"
					[attr.data-lm-a-dp-item-type]="uniqueId"
					(click)="editItem.emit()"
					>{{ it | lmGetContentTypeName }}</span
				>
				<span style="cursor: default" *ngIf="isLinebreak">Line break</span>
			</p>
		</ng-container>
	</div>
	<div class="h2" [class.content]="isContent">
		<ng-container *ngIf="isHeader">
			<div class="image-wrapper" *ngIf="imgUrl">
				<img
					broken-image-fallback
					[attr.name]="itemAutoIdentifier + '-img-thumb'"
					[attr.data-lm-a-dp-img-thumb]="uniqueId"
					[default]="imageFallback"
					[src]="imgUrl"
					class="image"
					(click)="editItem.emit()" />
			</div>
			<p
				*ngIf="!imgUrl"
				[attr.data-lm-a-dp-img-none]="uniqueId"
				class="lm-truncate-text">
				<span
					[attr.name]="itemAutoIdentifier + '-image-none'"
					class="empty-input"
					(click)="editItem.emit()"
					>None</span
				>
			</p>
		</ng-container>

		<ng-container *ngIf="isContent">
			<span
				*ngIf="icon"
				[attr.name]="itemAutoIdentifier + '-icon'"
				[attr.data-lm-a-dp-item-icon]="uniqueId"
				class="dyn-icon"
				[class.clt-inherit]="isColorTypeInherit"
				[style.background-color]="
					isColorTypeCustom ? (iconColor | lmColorNumberToHexExtended) : '#fff'
				">
				<svg class="icon" focusable="false">
					<use [attr.xlink:href]="icon"></use>
				</svg>
			</span>
			<p *ngIf="isContentEmpty" class="lm-truncate-text">
				<span
					class="empty-input"
					[attr.name]="itemAutoIdentifier + '-icon-none'"
					[attr.data-lm-a-dp-item-icon-none]="uniqueId"
					(click)="editItem.emit()"
					>None</span
				>
			</p>
		</ng-container>
		<p *ngIf="h2" class="lm-truncate-text">
			<span
				[attr.name]="itemAutoIdentifier + '-h2'"
				[attr.data-lm-a-dp-item-h2]="uniqueId"
				(click)="editItem.emit()"
				>{{ h2 }}</span
			>
		</p>
	</div>
	<div class="h3" *ngIf="isItemContainer || h3">
		<p class="lm-truncate-text">
			<span
				*ngIf="h3"
				[attr.name]="itemAutoIdentifier + '-h3'"
				[attr.data-lm-a-dp-item-h3]="uniqueId"
				(click)="editItem.emit()"
				>{{ h3 }}</span
			>
			<span
				*ngIf="isEmptyTextContent || isEmptyHeaderHeading"
				[attr.name]="itemAutoIdentifier + '-h3-none'"
				[attr.data-lm-a-dp-item-h3-none]="uniqueId"
				class="empty-input"
				(click)="editItem.emit()"
				>None</span
			>
		</p>
		<span
			*ngIf="isLinkWithCustomColor"
			class="custom-color"
			[style.background-color]="iconColor | lmColorNumberToHexExtended"></span>
	</div>
	<div class="h4" *ngIf="isHeader">
		<p class="lm-truncate-text">
			<span
				*ngIf="h4"
				[attr.name]="itemAutoIdentifier + '-h4'"
				[attr.data-lm-a-dp-item-h4]="uniqueId"
				(click)="editItem.emit()"
				>{{ h4 }}</span
			>
			<span
				*ngIf="!h4"
				[attr.name]="itemAutoIdentifier + '-h4-none'"
				[attr.data-lm-a-dp-item-h4-none]="uniqueId"
				class="empty-input"
				(click)="editItem.emit()"
				>None</span
			>
		</p>
	</div>
	<div class="policy" *ngIf="!isLinebreak">
		<p>
			<svg
				soho-icon
				[attr.name]="itemAutoIdentifier + '-access-icon'"
				[icon]="ais ? 'locked' : 'url'"
				class="lm-cursor-pointer"
				(click)="editItem.emit(true)"></svg>
			<span
				class="lm-truncate-text"
				[attr.name]="itemAutoIdentifier + '-access-text'"
				[attr.data-lm-a-dp-item-accs]="uniqueId"
				(click)="editItem.emit(true)"
				>{{ accessValueText }}</span
			>
			<svg
				soho-icon
				[attr.name]="itemAutoIdentifier + '-access-error'"
				icon="alert"
				[alert]="true"
				*ngIf="accessErrorText"
				soho-tooltip
				[content]="accessErrorText"></svg>
		</p>
	</div>
	<div class="dl-icon" *ngIf="!isLinebreak">
		<button
			soho-context-menu
			[name]="itemAutoIdentifier + '-menu-button'"
			[attr.data-lm-a-dp-item-embtn]="uniqueId"
			trigger="click"
			[menu]="popupId"
			class="btn-actions lm-margin-sm-r">
			<svg soho-icon icon="more"></svg>
		</button>
		<ul soho-popupmenu [id]="popupId">
			<li soho-popupmenu-item>
				<a
					soho-popupmenu-label
					[name]="itemAutoIdentifier + '-edit'"
					[attr.data-lm-a-dp-item-edit]="uniqueId"
					(click)="editItem.emit()">
					{{ isEditable ? "Edit" : "View" }}
				</a>
			</li>
			<li soho-popupmenu-item *ngIf="isEditable">
				<a
					soho-popupmenu-label
					[name]="itemAutoIdentifier + '-delete'"
					[attr.data-lm-a-dp-item-dlt]="uniqueId"
					(click)="deleteItem.emit()">
					Delete
				</a>
			</li>
			<li soho-popupmenu-item *ngIf="canDuplicate">
				<a
					soho-popupmenu-label
					[name]="itemAutoIdentifier + '-duplicate'"
					[attr.data-lm-a-dp-item-dup]="uniqueId"
					(click)="duplicateItem.emit()">
					Duplicate
				</a>
			</li>
		</ul>
	</div>
	<div class="dl-icon" *ngIf="isLinebreak && isEditable">
		<button
			[name]="itemAutoIdentifier + '-linebreak-delete'"
			[attr.data-lm-a-dp-item-lbdlt]="uniqueId"
			(click)="deleteItem.emit()"
			class="btn-actions">
			<svg soho-icon icon="delete"></svg>
		</button>
	</div>
</div>

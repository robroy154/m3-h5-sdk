﻿<div
	#mandatoryPagesView
	soho-busyindicator
	[activated]="isBusy"
	[blockUI]="true"
	[displayDelay]="0">
	<div class="field">
		<input
			id="lm-a-mp-f"
			class="checkbox"
			type="checkbox"
			[(ngModel)]="isFirst"
			(ngModelChange)="updateValue()" />
		<label class="checkbox-label" for="lm-a-mp-f"
			>Use the first permitted page only</label
		>
	</div>

	<soho-toolbar-flex (selected)="onSelectedToolbar($event)">
		<soho-toolbar-flex-section [isTitle]="true" class="lm-info-text-md">
			Mandatory pages
		</soho-toolbar-flex-section>

		<soho-toolbar-flex-section [isButtonSet]="true">
			<button soho-button="tertiary" icon="add" data-action="openPageSelector">
				Add Pages
			</button>
		</soho-toolbar-flex-section>

		<soho-toolbar-flex-more-button> </soho-toolbar-flex-more-button>
	</soho-toolbar-flex>

	<div class="contextual-toolbar toolbar is-hidden">
		<div class="title">Actions</div>
		<div class="buttonset">
			<button
				soho-button="tertiary"
				[disabled]="selectionCount !== 1"
				(click)="setDateRange(selected)">
				Set Date Range
			</button>
			<button soho-button="tertiary" icon="delete" (click)="deletePages()">
				Delete ({{ selectionCount }})
			</button>
		</div>
	</div>
	<div
		#mandatoryPagesGrid
		soho-datagrid
		(selected)="updateSelection($event.rows)"
		[gridOptions]="datagridOptions"
		[data]="datagridOptions.dataset"
		(cellchange)="updateValue()"
		(rowReordered)="onRowReordered($event)"
		(expandrow)="onExpandRow($event)"></div>
</div>

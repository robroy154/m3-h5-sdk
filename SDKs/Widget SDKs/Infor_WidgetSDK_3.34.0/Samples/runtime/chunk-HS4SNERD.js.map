﻿<div
	#policyViewRef
	soho-busyindicator
	[blockUI]="true"
	[displayDelay]="0"
	[activated]="isBusy"
	style="min-width: 800px">
	<div class="title-row">
		<div class="field">
			<label class="label required">Name</label>
			<input
				id="lm-a-sp-edit-name"
				[(ngModel)]="policy.name"
				data-validate="required"
				maxlength="128"
				class="lm-margin-zero-b"
				[disabled]="isViewMode" />
			<span></span>
		</div>
	</div>

	<soho-toolbar [maxVisibleButtons]="7" [rightAligned]="true">
		<soho-toolbar-button-set>
			<button
				id="lm-a-sp-edit-test-btn"
				soho-button="tertiary"
				*ngIf="isViewMode; else editable"
				(click)="test()">
				Test security policy
			</button>
			<ng-template #editable>
				<button
					id="lm-a-sp-edit-add"
					soho-button="tertiary"
					[disabled]="isViewMode"
					icon="add"
					(click)="addEntry()">
					Add Rule
				</button>
				<button
					id="lm-a-sp-more-btn"
					soho-context-menu
					trigger="click"
					menu="lm-a-sp-edit-menu"
					class="btn-actions">
					<svg soho-icon icon="more"></svg>
				</button>
				<ul soho-popupmenu id="lm-a-sp-edit-menu">
					<li soho-popupmenu-item>
						<a
							soho-popupmenu-label
							id="lm-a-sp-edit-test-menu"
							(click)="test()">
							Test security policy
						</a>
					</li>
				</ul>
			</ng-template>
		</soho-toolbar-button-set>
	</soho-toolbar>

	<div class="lm-hdr-bg entry match default">
		<label class="label">Match</label>
		<select
			name="lm-a-sp-edit-match"
			soho-dropdown
			[attributes]="{ name: 'id', value: 'lm-a-sp-edit-match' }"
			[disabled]="isViewMode"
			class="dropdown-xs"
			[(ngModel)]="policy.match">
			<option value="||">Any</option>
			<option value="&&">All</option>
		</select>
		<label class="label">of the following rules:</label>
	</div>

	<div class="entry-list">
		<ng-container
			*ngTemplateOutlet="
				expEntries;
				context: { entries: this.policy.value, isTopLevel: true }
			">
		</ng-container>
	</div>

	<ng-template #expEntries let-entries="entries" let-isTopLevel="isTopLevel">
		<ng-container
			*ngFor="
				let entry of entries;
				let first = first;
				let i = index;
				let count = count
			">
			<div class="group" *ngIf="entry.children; else expression">
				<div class="entry match" [ngClass]="{ 'top-level lm-bg': isTopLevel }">
					<select
						[attr.data-lm-a-sp-edit-match]="i"
						[name]="'lm-a-sp-edit-match-selector-' + i"
						soho-dropdown
						[attributes]="{
							name: 'id',
							value: 'lm-a-sp-edit-match-selector-' + i
						}"
						[disabled]="isViewMode"
						class="dropdown-xs"
						[(ngModel)]="entry.match">
						<option value="||">Any</option>
						<option value="&&">All</option>
					</select>
					<label class="label">of the following rules:</label>
					<button
						[attr.data-lm-a-sp-edit-more]="i"
						[name]="'lm-a-sp-edit-more-button-' + i"
						soho-context-menu
						[disabled]="isViewMode"
						trigger="click"
						[menu]="'group-menu-' + entry.id"
						class="btn-actions">
						<svg soho-icon icon="more"></svg>
					</button>
					<ul soho-popupmenu [id]="'group-menu-' + entry.id">
						<li soho-popupmenu-item>
							<a
								soho-popupmenu-label
								[attr.data-lm-a-sp-edit-dlt-grp]="i"
								[name]="'lm-a-sp-edit-delete-group-' + i"
								(click)="deleteGroup(entry)">
								Delete group
							</a>
						</li>
					</ul>
				</div>
				<ng-container
					*ngTemplateOutlet="
						expEntries;
						context: { entries: entry.children }
					"></ng-container>
			</div>
			<ng-template #expression>
				<div
					class="compound-field entry"
					[ngClass]="{ 'top-level lm-bg': isTopLevel }"
					[class.first]="first">
					<div class="field">
						<select
							[attr.data-lm-a-sp-edit-entity]="i"
							[name]="'lm-a-sp-edit-entry-entity-selector-' + i"
							soho-dropdown
							[attributes]="{
								name: 'id',
								value: 'lm-a-sp-edit-entry-entity-selector-' + i
							}"
							[disabled]="isViewMode"
							#entityDropdown
							class="dropdown-mm"
							[(ngModel)]="entry.entity"
							(change)="onEntityChanged(entry, entityDropdown)">
							<option [ngValue]="0">User property</option>
							<option [ngValue]="1">Role</option>
							<option [ngValue]="2">Distribution group</option>
						</select>
					</div>
					<div class="field" *ngIf="entry.entity === 0">
						<select
							[attr.data-lm-a-sp-edit-attr]="i"
							[name]="'lm-a-sp-edit-entry-attribute-selector-' + i"
							soho-dropdown
							[attributes]="{
								name: 'id',
								value: 'lm-a-sp-edit-entry-attribute-selector-' + i
							}"
							[disabled]="isViewMode"
							#attributeDropdown
							class="dropdown-sm"
							[(ngModel)]="entry.attr"
							(change)="onAttributeChanged(entry, attributeDropdown)">
							<option *ngFor="let attr of attributes" [ngValue]="attr">
								{{ attr.name }}
							</option>
						</select>
					</div>
					<div class="field">
						<select
							[attr.data-lm-a-sp-edit-op]="i"
							[name]="'lm-a-sp-edit-entry-operator-selector-' + i"
							soho-dropdown
							[attributes]="{
								name: 'id',
								value: 'lm-a-sp-edit-entry-operator-selector-' + i
							}"
							[disabled]="isViewMode"
							class="dropdown-sm"
							[(ngModel)]="entry.operator"
							(change)="onOperatorChanged(entry)">
							<option
								*ngFor="
									let operator of operators
										| operatorPipe
											: entry.entity
											: entry.attr?.type
											: entry.attr?.hasValues
											: entry.attr?.isMultiValue
								"
								[value]="operator.value">
								{{ operator.label }}
							</option>
						</select>
					</div>
					<div class="field">
						<ng-container *ngIf="entry.entity !== 0; else attribute">
							<input
								[attr.data-lm-a-sp-edit-role-auto]="i"
								[name]="'lm-a-sp-edit-entry-role-autocomplete-' + i"
								soho-autocomplete
								[autoSelectFirstItem]="true"
								[attributes]="{
									name: 'name',
									value: 'lm-a-sp-edit-entry-role-search-' + i
								}"
								style="margin-top: 2px"
								[disabled]="isViewMode"
								placeholder="Type to search..."
								[(ngModel)]="entry.value"
								(selected)="onAutoSelect($event, entry)"
								[source]="roleSource"
								[template]="autocompleteTemplate"
								maxlength="256"
								*ngIf="entry.entity === 1" />
							<input
								[attr.data-lm-a-sp-edit-grp-auto]="i"
								[name]="'lm-a-sp-edit-entry-group-autocomplete-' + i"
								soho-autocomplete
								[autoSelectFirstItem]="true"
								[attributes]="{
									name: 'name',
									value: 'lm-a-sp-edit-entry-group-search-' + i
								}"
								style="margin-top: 2px"
								[disabled]="isViewMode"
								placeholder="Type to search..."
								[(ngModel)]="entry.value"
								(selected)="onAutoSelect($event, entry)"
								[source]="groupSource"
								[template]="autocompleteTemplate"
								maxlength="256"
								*ngIf="entry.entity === 2" />
						</ng-container>
						<ng-template #attribute>
							<input
								[(ngModel)]="entry.value"
								[disabled]="isViewMode"
								class="input-mm"
								style="margin-top: 2px"
								maxlength="256"
								*ngIf="
									!entry.attr ||
									(entry.attr.type === 's' && !entry.attr.hasValues)
								" />
							<input
								[attr.data-lm-a-sp-edit-val-inp]="i"
								[name]="'lm-a-sp-edit-entry-value-input-' + i"
								[(ngModel)]="entry.value"
								[disabled]="isViewMode"
								class="input-mm"
								style="margin-top: 2px"
								soho-input
								maxlength="256"
								soho-mask
								process="number"
								[allowThousandsSeparator]="false"
								[allowDecimal]="true"
								*ngIf="entry.attr?.type === 'n' && !entry.attr?.hasValues" />
							<select
								[attr.data-lm-a-sp-edit-val-sel]="i"
								[name]="'lm-a-sp-edit-entry-value-selector-' + i"
								soho-dropdown
								[attributes]="{
									name: 'id',
									value: 'lm-a-sp-edit-entry-value-selector-' + i
								}"
								[disabled]="isViewMode"
								class="dropdown-mm"
								[(ngModel)]="entry.value"
								(change)="setAttributeValid(entry)"
								*ngIf="
									entry.attr?.type !== 'b' &&
									entry.attr?.type !== 'd' &&
									entry.attr?.hasValues
								">
								<option
									*ngFor="let attribute of entry.attr.values"
									[value]="attribute.val">
									{{ attribute.val }}
								</option>
							</select>
							<input
								[attr.data-lm-a-sp-edit-val-date]="i"
								[name]="'lm-a-sp-edit-entry-datepicker-' + i"
								soho-datepicker
								[attributes]="{
									name: 'name',
									value: 'lm-a-sp-edit-entry-datepicker-' + i
								}"
								[disabled]="isViewMode"
								class="input-mm"
								style="margin-top: 2px"
								*ngIf="entry.attr?.type === 'd'"
								[(ngModel)]="entry.value" />
							<select
								[attr.data-lm-a-sp-edit-val-attr]="i"
								[name]="'lm-a-sp-edit-entry-attribute-selector-value-' + i"
								soho-dropdown
								[attributes]="{
									name: 'id',
									value: 'lm-a-sp-edit-entry-attribute-selector-value-' + i
								}"
								[disabled]="isViewMode"
								class="dropdown-mm"
								[(ngModel)]="entry.value"
								(change)="setAttributeValid(entry)"
								*ngIf="entry.attr?.type === 'b'">
								<ng-container *ngIf="entry.attr.hasValues; else defaultvalues">
									<option [value]="entry.attr.values[0].val">
										{{ entry.attr.values[0].des }}
									</option>
									<option [value]="entry.attr.values[1].val">
										{{ entry.attr.values[1].des }}
									</option>
								</ng-container>
								<ng-template #defaultvalues>
									<option value="1">True</option>
									<option value="0">False</option>
								</ng-template>
							</select>
						</ng-template>
					</div>
					<button
						[attr.data-lm-a-sp-edit-rulemore]="i"
						[name]="'lm-a-sp-edit-entry-menu-button-' + i"
						soho-context-menu
						[disabled]="isViewMode"
						[removeOnDestroy]="true"
						trigger="click"
						[menu]="'expression-menu-' + entry.id"
						class="btn-actions">
						<svg soho-icon icon="more"></svg>
					</button>
					<ul soho-popupmenu [id]="'expression-menu-' + entry.id">
						<li soho-popupmenu-item>
							<a
								soho-popupmenu-label
								[attr.data-lm-a-sp-edit-addbelow]="i"
								[name]="'lm-a-sp-edit-entry-addbelow-' + i"
								(click)="addEntry(entries, entry, i)">
								Add below
							</a>
						</li>
						<li soho-popupmenu-item *ngIf="isTopLevel">
							<a
								soho-popupmenu-label
								[attr.data-lm-a-sp-edit-movegrp]="i"
								[name]="'lm-a-sp-edit-entry-movetogroup-' + i"
								(click)="addGroup(entry, i)">
								Move to group
							</a>
						</li>
						<li soho-popupmenu-item *ngIf="!isTopLevel">
							<a
								soho-popupmenu-label
								[attr.data-lm-a-sp-edit-movetop]="i"
								[name]="'lm-a-sp-edit-entry-movetotop-' + i"
								(click)="moveToTop(entries, entry)">
								Move to top level
							</a>
						</li>
						<ng-container>
							<li soho-popupmenu-separator></li>
							<li soho-popupmenu-item>
								<a
									soho-popupmenu-label
									[attr.data-lm-a-sp-edit-del]="i"
									[name]="'lm-a-sp-edit-entry-delete-' + i"
									(click)="deleteEntry(entries, entry, !isTopLevel)">
									Delete
								</a>
							</li>
						</ng-container>
					</ul>
					<lm-invalid-policy-attribute
						*ngIf="entry.invalidAttribute || entry.invalidAttributeValue"
						[entry]="entry"
						[operators]="operators"></lm-invalid-policy-attribute>
				</div>
			</ng-template>
		</ng-container>
	</ng-template>

	<div class="modal-buttonset">
		<button
			id="lm-sp-edit-close"
			*ngIf="isViewMode; else saveCancel"
			class="btn-modal-primary"
			style="width: 100%"
			(click)="close()"
			[disabled]="isBusy">
			Close
		</button>
		<ng-template #saveCancel>
			<button
				id="lm-sp-edit-cncl"
				class="btn-modal"
				as
				style="width: 50%"
				(click)="close()"
				[disabled]="isBusy">
				Cancel
			</button>
			<button
				id="lm-sp-edit-save"
				class="btn-modal-primary"
				style="width: 50%"
				(click)="onOk()"
				[disabled]="isBusy">
				Save
			</button>
		</ng-template>
	</div>
</div>

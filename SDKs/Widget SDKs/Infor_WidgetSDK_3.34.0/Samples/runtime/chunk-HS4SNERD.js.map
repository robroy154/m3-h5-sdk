<div class="message-banner lm-item-bg lm-brd">
	<div class="banner-icon-area {{ options.backgroundClass }}">
		<svg
			soho-icon
			[icon]="options.icon"
			[extraIconClass]="options.iconClass"></svg>
	</div>
	<div class="banner-content">
		<span class="banner-title" *ngIf="options.title">{{ options.title }}</span>
		<span>{{ options.message }}</span>
		<div class="banner-content-actions">
			<button
				soho-button="tertiary"
				*ngFor="let action of options.actions"
				[icon]="action.icon || null"
				(click)="executeAction(action)">
				{{ action.text }}
			</button>
		</div>
	</div>
	<button
		soho-button="icon"
		id="lm-a-mb-dismiss"
		*ngIf="options.dismissable"
		icon="close"
		lm-click-stop-propagation
		(click)="onDismiss()"></button>
</div>

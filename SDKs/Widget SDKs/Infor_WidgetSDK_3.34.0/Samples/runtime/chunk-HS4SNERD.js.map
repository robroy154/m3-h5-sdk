<div class="basic">
	<div class="field">
		<label id="lm-a-mm-bsc-t-lbl" for="lm-a-mm-bsc-t" class="required"
			>Title</label
		>
		<input
			id="lm-a-mm-bsc-t"
			type="text"
			maxlength="{{ titleMaxLength }}"
			[(ngModel)]="memo.title"
			data-validate="required" />
	</div>

	<div class="field markdown-editor-field">
		<label id="lm-a-mm-bsc-tx-lbl" for="lm-a-mm-bsc-tx"
			>Content
			<svg
				id="lm-a-mm-bsc-tx-svg"
				soho-icon
				icon="alert"
				[alert]="true"
				*ngIf="isImageOnly()"
				soho-tooltip
				title="Content will not be visible since Image only layout is used"></svg>
		</label>
		<lm-markdown-editor
			[(model)]="memo.text"
			[help]="true"
			[preview]="true"
			[toolbar]="true"
			[maxLength]="textMaxLength"
			[support]="{
				bold: true,
				emphasis: true,
				strikethrough: true,
				links: true
			}"
			[showCharacterCount]="true"
			style="width: 500px"
			id="lm-a-mm-bsc-tx">
		</lm-markdown-editor>
	</div>

	<div class="field">
		<label for="lm-a-mm-dr-from" id="lm-a-mm-dr-from-lbl" class="label required"
			>Available from</label
		>
		<input
			soho-datepicker
			id="lm-a-mm-dr-from"
			[attributes]="{ name: 'id', value: 'lm-a-mm-dr-from' }"
			style="width: 500px"
			name="start"
			showTime="true"
			minuteInterval="1"
			mode="standard"
			[(ngModel)]="start"
			data-validate="date availableDate required" />
	</div>

	<div class="field">
		<label for="lm-a-mm-dr-to" id="lm-a-mm-dr-to-lbl" class="label required"
			>Available to</label
		>
		<input
			soho-datepicker
			id="lm-a-mm-dr-to"
			[attributes]="{ name: 'id', value: 'lm-a-mm-dr-to' }"
			style="width: 500px"
			name="end"
			showTime="true"
			minuteInterval="1"
			mode="standard"
			[(ngModel)]="end"
			data-validate="date availableDate required" />
	</div>

	<div class="field">
		<label for="lm-a-mm-dr-tz" id="lm-a-mm-dr-tz-lbl" class="label"
			>Time zone</label
		>
		<select
			soho-dropdown
			name="lm-a-mm-dr-tz"
			[attributes]="{ name: 'id', value: 'lm-a-mm-dr-timezone' }"
			style="width: 500px"
			[(ngModel)]="timeZone">
			<option *ngFor="let zone of timeZones" [ngValue]="zone.id">
				{{ zone.name }}
			</option>
		</select>
	</div>

	<div class="field">
		<label id="lm-a-mm-bsc-iu-lbl" for="lm-a-mm-bsc-iu">Image URL</label>
		<input
			id="lm-a-mm-bsc-iu"
			type="text"
			maxlength="{{ UrlMaxLength }}"
			[(ngModel)]="imageUrl" />
	</div>

	<div class="field">
		<label id="lm-a-mm-bsc-ia-lbl" for="lm-a-mm-bsc-ia">Image Alignment</label>
		<select
			soho-dropdown
			name="lm-a-mm-bsc-ia"
			[attributes]="{ name: 'id', value: 'lm-a-mm-bsc-imagealignment' }"
			[(ngModel)]="memo.imageAlignment">
			<option [ngValue]="alignment.Center">Center</option>
			<option [ngValue]="alignment.Cover">Cover</option>
			<option [ngValue]="alignment.Fill">Fill</option>
			<option [ngValue]="alignment.Fit">Fit</option>
		</select>
	</div>

	<div class="field">
		<label id="lm-a-mm-bsc-l-lbl" for="lm-a-mm-bsc-l">Layout</label>
		<select
			soho-dropdown
			name="lm-a-mm-bsc-l"
			[attributes]="{ name: 'id', value: 'lm-a-mm-bsc-layout' }"
			[(ngModel)]="layout">
			<option [ngValue]="layoutOption.BackgroundImage">Background Image</option>
			<option [ngValue]="layoutOption.TextFirst">Text First</option>
			<option [ngValue]="layoutOption.ImageFirst">Image First</option>
			<option [ngValue]="layoutOption.ImageOnly">Image Only</option>
		</select>
	</div>

	<div class="field">
		<label id="lm-a-mm-bsc-tc-lbl">Foreground color</label>
		<input
			soho-radiobutton
			type="radio"
			id="lm-a-mm-bsc-tc-dark"
			value="dark"
			[(ngModel)]="memo.textColor"
			[attr.disabled]="textColorDisabledAttr" />
		<label soho-label for="lm-a-mm-bsc-tc-dark" [forRadioButton]="true"
			>Dark</label
		>
		<br />
		<input
			soho-radiobutton
			type="radio"
			id="lm-a-mm-bsc-tc-light"
			value="light"
			[(ngModel)]="memo.textColor"
			[attr.disabled]="textColorDisabledAttr" />
		<label soho-label for="lm-a-mm-bsc-tc-light" [forRadioButton]="true"
			>Light</label
		>
		<br />
		<input
			soho-radiobutton
			type="radio"
			id="lm-a-mm-bsc-tc-default"
			value="default"
			[(ngModel)]="memo.textColor"
			[attr.disabled]="textColorDisabledAttr" />
		<label soho-label for="lm-a-mm-bsc-tc-default" [forRadioButton]="true"
			>Default</label
		>
	</div>

	<div class="field">
		<label id="lm-a-mm-bsc-pr-lbl" for="lm-a-mm-bsc-pr">Priority</label>
		<select
			soho-dropdown
			name="lm-a-mm-bsc-pr"
			[attributes]="{ name: 'id', value: 'lm-a-mm-bsc-priority' }"
			[(ngModel)]="memo.priority">
			<option [ngValue]="prio.Default">Default</option>
			<option [ngValue]="prio.Important">Important</option>
			<option [ngValue]="prio.Critical">Critical</option>
		</select>
	</div>

	<div class="field">
		<div class="switch">
			<input
				class="switch"
				id="lm-a-mm-bsc-ab"
				type="checkbox"
				[(ngModel)]="showActionButton" />
			<label id="lm-a-mm-bsc-ab-lbl" for="lm-a-mm-bsc-ab"
				>Show action button</label
			>
		</div>
	</div>

	<div class="field" *ngIf="showActionButton">
		<label id="lm-a-mm-bsc-at-lbl" for="lm-a-mm-bsc-at" class="required"
			>Button title</label
		>
		<input
			type="text"
			id="lm-a-mm-bsc-at"
			maxlength="{{ actionTextMaxLength }}"
			[(ngModel)]="memo.actionText"
			[disabled]="!showActionButton"
			data-validate="required" />
	</div>

	<div class="field" *ngIf="showActionButton">
		<label id="lm-a-mm-bsc-au-lbl" for="lm-a-mm-bsc-au" class="required"
			>Button URL</label
		>
		<input
			type="text"
			id="lm-a-mm-bsc-au"
			maxlength="{{ UrlMaxLength }}"
			[(ngModel)]="memo.actionUrl"
			data-validate="required" />
	</div>
</div>

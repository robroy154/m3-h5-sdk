﻿<div>
	<div class="row">
		<div class="field">
			<label for="adm-us-acf" class="e2e-ra-add-lbl">Search for a user</label>
			<div class="searchfield-wrapper">
				<input
					soho-autocomplete
					maxlength="254"
					id="adm-us-acf"
					[autoSelectFirstItem]="true"
					[attributes]="{ name: 'name', value: 'lm-a-selectuser-search' }"
					class="lm-autocomplete-searchfield e2e-ra-add-input"
					[(ngModel)]="searchStringGroup"
					[source]="autocompleteSource"
					[template]="autocompleteTemplate"
					(selected)="
						!$event[1].hasClass('no-results') ? selectUser($event[2]) : null
					" />
				<svg class="icon" focusable="false" role="presentation">
					<use xlink:href="#icon-search"></use>
				</svg>
			</div>
		</div>
	</div>

	<div class="modal-buttonset">
		<button
			type="button"
			class="btn-modal"
			(click)="dialog?.close()"
			id="lm-a-selectuser-dialog-cancel">
			Cancel
		</button>
		<button
			type="button"
			class="btn-modal-primary"
			[disabled]="!selectedUser"
			(click)="save()"
			id="lm-a-selectuser-dialog-ok">
			OK
		</button>
	</div>
</div>

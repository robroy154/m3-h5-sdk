﻿<div>
	<div class="field" *ngIf="isUser">
		<label for="autocomplete-add-connection" class="label required"
			>User Search</label
		>
		<div class="searchfield-wrapper">
			<input
				soho-autocomplete
				placeholder="Search for users..."
				id="autocomplete-add-connection"
				[autoSelectFirstItem]="true"
				[attributes]="{ name: 'name', value: 'lm-a-set-rule-adduser-search' }"
				maxlength="64"
				class="lm-autocomplete-searchfield"
				(selected)="
					!$event[1].hasClass('no-results')
						? onSelectAutocomplete($event[2])
						: null
				"
				[source]="autocompleteUserSource"
				[template]="autocompleteUserTemplate" />
			<svg
				class="icon"
				focusable="false"
				aria-hidden="true"
				role="presentation">
				<use xlink:href="#icon-search"></use>
			</svg>
		</div>
		<span *ngIf="existsMessage.length > 0" class="label error lm-margin-md-b">{{
			existsMessage
		}}</span>
	</div>

	<div class="field" *ngIf="!isUser">
		<label for="add-connection-role" class="label required">Role</label>
		<div class="searchfield-wrapper">
			<input
				soho-autocomplete
				placeholder="Search for roles..."
				id="add-connection-role"
				[autoSelectFirstItem]="true"
				[attributes]="{ name: 'name', value: 'lm-a-set-rule-addrole-search' }"
				maxlength="64"
				class="lm-autocomplete-searchfield"
				[(ngModel)]="roleInput"
				(selected)="
					!$event[1].hasClass('no-results')
						? onSelectAutocomplete($event[2])
						: null
				"
				[source]="autocompleteRoleSource"
				[template]="autocompleteRoleTemplate"
				[filterMode]="autocompleteRoleFilterMode" />
			<svg
				class="icon"
				focusable="false"
				aria-hidden="true"
				role="presentation">
				<use xlink:href="#icon-search"></use>
			</svg>
		</div>
		<span *ngIf="existsMessage.length > 0" class="label error lm-margin-md-b">{{
			existsMessage
		}}</span>
	</div>

	<button
		*ngIf="!isUser"
		class="btn-secondary lm-margin-xl-b"
		(click)="addRole()"
		[disabled]="!roleInput"
		name="lm-add-connection-addrole">
		Add Role
	</button>

	<div class="field" *ngIf="ruleConnections.length > 0">
		<label class="label">To be added</label>
		<div class="listview lm-compact-list lm-max-height-l">
			<ul>
				<li
					*ngFor="let connection of ruleConnections"
					class="lm-cursor-default"
					soho-tooltip
					[title]="connection.info">
					<!-- orderBy:'connection.displayName' -->
					<p
						class="listview-heading lm-pull-left"
						[class.is-group]="!connection.isUser"
						name="lm-a-set-userrole-added-name">
						{{ connection.displayName }}
					</p>
					<div class="lm-pull-right">
						<button
							class="btn-icon"
							(click)="remove(connection)"
							soho-tooltip
							title="Remove"
							name="lm-a-set-userrole-added-remove">
							<svg class="icon icon-close" aria-hidden="true" focusable="false">
								<use xlink:href="#icon-close" />
							</svg>
							<span>Remove</span>
						</button>
					</div>
				</li>
			</ul>
		</div>
	</div>

	<div class="modal-buttonset">
		<button
			class="btn-modal"
			(click)="dialog?.close()"
			id="lm-a-set-userrole-dialog-cancel">
			Cancel
		</button>
		<button
			class="btn-modal-primary"
			[disabled]="ruleConnections.length === 0"
			(click)="onOk()"
			id="lm-a-set-userrole-dialog-Add">
			Add
		</button>
	</div>
</div>

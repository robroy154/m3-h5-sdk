<p *ngIf="isExperimental" class="lm-padding-md-b">
	<svg soho-icon icon="formula-constituents" class="lm-height-lg"></svg>
	<small class="text-descriptive">{{ experimentalTooltip }}</small>
</p>
<div class="info-header" *ngIf="infoHeader && !isEmpty">
	<h2>{{ infoHeader.title }}</h2>
	<label>{{ infoHeader.text }}</label>
</div>

<div class="dynamic-list-row list-header" *ngIf="!isEmpty">
	<div class="h1" [class.content-type]="isContent">
		<p>{{ h1 }}</p>
	</div>
	<div class="h2" [class.content]="isContent" *ngIf="h2">
		<p>{{ h2 }}</p>
	</div>
	<div class="h3" *ngIf="h3">
		<p>{{ h3 }}</p>
	</div>
	<div class="h4" *ngIf="h4">
		<p>{{ h4 }}</p>
	</div>
	<div class="policy">
		<p>Applies to</p>
	</div>
</div>

<ng-container
	*ngIf="!(isHeader || isContent) && container.its && container.its.length">
	<lm-dynamic-list-item
		*ngFor="
			let link of container.its
				| refineBy: filter : container
				| searchFilter: query : accessTitles;
			let i = index
		"
		[h1]="link.t"
		[icon]="link.i"
		[iconColor]="link.cl"
		[isNormal]="link.sz === linkSizes.Normal && !isShortcut"
		[h2]="link.u"
		[h3]="link.clt || colorTypes.Custom | lmGetColorTypeName"
		[clt]="link.clt || colorTypes.Custom"
		[ais]="link.ais"
		[eid]="link.eid"
		[canDuplicate]="true"
		[parentId]="container.eid"
		[accessErrors]="accessErrors"
		(updateSelection)="updateSelection($event, i)"
		(editItem)="editItem($event, link)"
		(deleteItem)="deleteItem(link)"
		(duplicateItem)="duplicateItem(link)"
		[isEditable]="isEditable"
		[automationIdentifier]="automationIdentifier">
	</lm-dynamic-list-item>
</ng-container>

<ng-container *ngIf="container.ims && container.ims.length">
	<lm-dynamic-list-item
		*ngFor="
			let image of container.ims
				| refineBy: filter : container
				| searchFilter: query : accessTitles;
			let i = index
		"
		[h2]="alignment[image.al] || 'Fill'"
		[imgUrl]="image.u"
		[ais]="image.ais"
		[eid]="image.eid"
		[parentId]="container.eid"
		[accessErrors]="accessErrors"
		(updateSelection)="updateSelection($event, i)"
		(editItem)="editItem($event, image)"
		(deleteItem)="deleteItem(image)"
		[isEditable]="isEditable"
		[automationIdentifier]="automationIdentifier">
	</lm-dynamic-list-item>
</ng-container>

<ng-container *ngIf="container.ws && container.ws.length">
	<lm-dynamic-list-item
		*ngFor="
			let item of container.ws
				| refineBy: filter : container
				| searchFilter: query : accessTitles;
			let i = index
		"
		[h1]="item.t"
		[ais]="item.ais"
		[eid]="item.eid"
		[parentId]="container.eid"
		[accessErrors]="accessErrors"
		(updateSelection)="updateSelection($event, i)"
		(editItem)="editItem($event, item)"
		(deleteItem)="deleteItem(item)"
		[isEditable]="isEditable"
		[automationIdentifier]="automationIdentifier">
	</lm-dynamic-list-item>
</ng-container>

<ng-container *ngIf="container.wbs && container.wbs.length">
	<lm-dynamic-list-item
		*ngFor="
			let web of container.wbs
				| refineBy: filter : container
				| searchFilter: query : accessTitles;
			let i = index
		"
		[h1]="web.u"
		[h2]="(web.er && 'Refresh') || (web.lu && 'Launch') || 'None'"
		[ais]="web.ais"
		[eid]="web.eid"
		[parentId]="container.eid"
		[accessErrors]="accessErrors"
		(updateSelection)="updateSelection($event, i)"
		(editItem)="editItem($event, web)"
		(deleteItem)="deleteItem(web)"
		[isEditable]="isEditable"
		[automationIdentifier]="automationIdentifier">
	</lm-dynamic-list-item>
</ng-container>

<ng-container *ngIf="container.txts && container.txts.length">
	<lm-dynamic-list-item
		*ngFor="
			let text of container.txts
				| refineBy: filter : container
				| searchFilter: query : accessTitles;
			let i = index
		"
		[h1]="text.tx"
		[ais]="text.ais"
		[eid]="text.eid"
		[parentId]="container.eid"
		[accessErrors]="accessErrors"
		(updateSelection)="updateSelection($event, i)"
		(editItem)="editItem($event, text)"
		(deleteItem)="deleteItem(text)"
		[isEditable]="isEditable"
		[automationIdentifier]="automationIdentifier">
	</lm-dynamic-list-item>
</ng-container>

<ng-container *ngIf="isHeader || isContent">
	<ng-container *ngIf="isHeader && container.hds && container.hds.length">
		<lm-dynamic-list-item
			*ngFor="
				let header of container.hds
					| refineBy: filter : container
					| searchFilter: query : accessTitles
			"
			[isHeader]="true"
			[clt]="header.clt"
			[customColor]="header.cl"
			[imgUrl]="header.im?.u || null"
			[h3]="header.h1"
			[h4]="header.h2"
			[ais]="header.ais"
			[eid]="header.eid"
			[parentId]="container.eid"
			[accessErrors]="accessErrors"
			[canDuplicate]="true"
			(editItem)="editItem($event, header)"
			(deleteItem)="deleteItem(header)"
			(duplicateItem)="duplicateItem(header, true)"
			[isEditable]="isEditable"
			[automationIdentifier]="automationIdentifier">
		</lm-dynamic-list-item>
	</ng-container>
	<ng-container *ngIf="isContent && container.its && container.its.length">
		<lm-dynamic-list-item
			*ngFor="
				let content of container.its
					| refineBy: filter : container
					| searchFilter: query : accessTitles
			"
			[isContent]="true"
			[it]="content.it"
			[h2]="content.t"
			[h3]="content.l"
			[icon]="content.i"
			[iconColor]="content.cl"
			[clt]="content.clt || colorTypes.Custom"
			[ais]="content.ais"
			[eid]="content.eid"
			[parentId]="container.eid"
			[accessErrors]="accessErrors"
			[canDuplicate]="true"
			(editItem)="editItem($event, content)"
			(deleteItem)="deleteItem(content)"
			(duplicateItem)="duplicateItem(content)"
			[isEditable]="isEditable"
			[automationIdentifier]="automationIdentifier">
		</lm-dynamic-list-item>
	</ng-container>
</ng-container>

<ng-container *ngIf="container.ct !== 4 && isEmpty">
	<div class="add-button-container empty" [class.lm-margin-md-t]="!isEmpty">
		<p *ngIf="addItemMessage">{{ addItemMessage }}</p>
		<div *ngIf="addItemText">
			<button
				soho-button="primary"
				[name]="automationIdentifier + '-addempty-button'"
				[attr.data-lm-a-dp-addempty-btn]="container.eid"
				icon="add"
				[disabled]="!isEditable"
				(click)="addItem()">
				{{ addItemText }}
			</button>
			<button
				*ngIf="showPaste$ | async"
				[name]="automationIdentifier + '-pasteempty-button'"
				[attr.data-lm-a-dp-pasteempty-btn]="container.eid"
				soho-button="secondary"
				[disabled]="!isEditable"
				icon="paste"
				(click)="pasteEntities()">
				Paste
			</button>
		</div>
	</div>
</ng-container>

<ng-container
	*ngIf="!isEmpty || ((isContent || isHeader) && !itemContainerEmpty)">
	<div class="add-button-container lm-margin-md-t">
		<button
			soho-button="tertiary"
			[name]="automationIdentifier + '-add-button'"
			[attr.data-lm-a-dp-add-btn]="container.eid"
			icon="add"
			[disabled]="!isEditable"
			*ngIf="!isContent"
			(click)="isHeader ? addHeader() : addItem()">
			{{ addItemText }}
		</button>
		<lm-dyn-info-menu-btn
			*ngIf="isContent"
			[attr.name]="automationIdentifier + '-addempty-button'"
			[menuId]="'lm-a-d-in-m-' + container.eid"
			[entity]="container.eid"
			[isEditable]="isEditable"
			(selected)="addContent($event)"></lm-dyn-info-menu-btn>
		<button
			soho-button="tertiary"
			[name]="automationIdentifier + 'add-linebreak-button'"
			[attr.data-lm-a-dp-break-btn]="container.eid"
			*ngIf="isContent && isEditable"
			icon="add"
			(click)="addLineBreak()">
			Add Line Break
		</button>
		<button
			soho-button="tertiary"
			[name]="automationIdentifier + '-paste-button'"
			[attr.data-lm-a-dp-paste-btn]="container.eid"
			*ngIf="isEditable && (showPaste$ | async)"
			icon="paste"
			(click)="pasteEntities()">
			Paste
		</button>
		<button
			soho-menu-button
			[name]="automationIdentifier + '-actions-button'"
			[class.lm-display-none]="!selectionCount"
			class="btn-primary selection-actions"
			[menu]="'lm-a-dp-item-actions' + container.eid"
			type="button"
			[id]="'lm-a-dp-item-actions-btn' + container.eid">
			<span>Actions</span>
		</button>
		<ul
			soho-popupmenu
			[attr.name]="automationIdentifier + '-actions-menu'"
			[id]="'lm-a-dp-item-actions' + container.eid">
			<li soho-popupmenu-item>
				<a
					soho-popupmenu-label
					[name]="automationIdentifier + '-item-action-copy'"
					(click)="onCopy()"
					>Copy ({{ selectionCount }})</a
				>
			</li>
			<li soho-popupmenu-item>
				<a
					soho-popupmenu-label
					[name]="automationIdentifier + '-action-cut'"
					(click)="onCut()"
					>Cut ({{ selectionCount }})</a
				>
			</li>
			<li soho-popupmenu-separator></li>
			<li soho-popupmenu-item>
				<a
					soho-popupmenu-label
					[name]="automationIdentifier + '-action-delete'"
					(click)="onDeleteSelected()"
					>Delete ({{ selectionCount }})</a
				>
			</li>
		</ul>
	</div>
</ng-container>

﻿<div
	#adminSettingsView
	class="lm-admin-base-font-size"
	soho-busyindicator
	[activated]="isBusy"
	[blockUI]="true"
	[displayDelay]="0">
	<div *ngIf="hasTool">
		<div class="row">
			<soho-toolbar-flex (selected)="onSelectedToolbar($event)">
				<soho-toolbar-flex-section [isTitle]="true">
					<nav *ngIf="!isFeatureMode" class="breadcrumb" role="navigation">
						<ol aria-label="breadcrumb">
							<li [class.current]="navState === 'settings'">
								<a
									(click)="listSettings()"
									id="lm-a-set-bc-set"
									class="hyperlink"
									>Settings</a
								>
							</li>
							<li
								*ngIf="navState !== 'settings'"
								id="lm-a-set-bc-l"
								[class.current]="navState === 'rules'">
								<a
									id="lm-a-set-bc-ruleslist"
									(click)="listRules()"
									class="hyperlink"
									>{{ selectedSetting?.setting.label }}</a
								>
							</li>
							<li
								*ngIf="navState === 'connections'"
								id="lm-a-set-bc-c"
								[class.current]="navState === 'connections'">
								<a id="lm-a-set-bc-connections" class="hyperlink">{{
									selectedRule?.name
								}}</a>
							</li>
						</ol>
					</nav>
				</soho-toolbar-flex-section>
				<soho-toolbar-flex-section [isButtonSet]="true">
					<ng-container *ngIf="!isFeatureMode">
						<button
							soho-menu-button
							[class.lm-display-none]="navState !== 'settings'"
							icon="filter"
							id="lm-a-set-tb-a"
							menu="settings-area-popupmenu">
							{{ selectedArea?.name }}
						</button>
						<ul soho-popupmenu id="settings-area-popupmenu">
							<li *ngFor="let area of settingAreas">
								<a
									href=""
									[attr.data-lm-a-set-tb-a-li]="area.value"
									[name]="area.name | lmAutoId: 'lm-a-set-area-option'"
									(click)="selectArea(area, true)"
									lm-enter-to-click
									>{{ area.name }}</a
								>
							</li>
						</ul>
						<div class="separator" *ngIf="navState === 'settings'"></div>
					</ng-container>
					<button
						soho-button="tertiary"
						[id]="isFeatureMode ? 'lm-a-fe-tb-d' : 'lm-a-set-tb-d'"
						icon="close-cancel"
						[disabled]="areActionButtonsDisabled()"
						data-action="discard">
						Discard
					</button>
					<button
						soho-button="tertiary"
						[id]="isFeatureMode ? 'lm-a-fe-tb-s' : 'lm-a-set-tb-s'"
						icon="save"
						[disabled]="areActionButtonsDisabled()"
						data-action="save">
						Save
					</button>
					<ng-container *ngIf="!isFeatureMode">
						<div class="separator" *ngIf="navState !== 'settings'"></div>
						<button
							soho-button="tertiary"
							id="lm-a-set-tb-aru"
							icon="add"
							*ngIf="navState === 'rules'"
							(click)="openAddOrEditRule()">
							Add Rule
						</button>
						<button
							soho-button="tertiary"
							id="lm-a-set-tb-au"
							icon="add"
							*ngIf="navState === 'connections'"
							(click)="addUser()">
							Add User
						</button>
						<button
							soho-button="tertiary"
							id="lm-a-set-tb-aro"
							icon="add"
							*ngIf="navState === 'connections'"
							(click)="addRole()">
							Add Role
						</button>
					</ng-container>
					<div class="separator"></div>
					<button
						soho-button="icon"
						[id]="isFeatureMode ? 'lm-a-fe-tb-r' : 'lm-a-set-tb-r'"
						icon="refresh"
						data-action="reload"
						style="border: 0; margin-bottom: 0"
						soho-tooltip
						title="Refresh">
						<span class="audible">Refresh</span>
					</button>
				</soho-toolbar-flex-section>

				<soho-toolbar-flex-more-button> </soho-toolbar-flex-more-button>
			</soho-toolbar-flex>
		</div>

		<!-- Datagrids -->
		<div
			#featuresDatagrid
			*ngIf="isFeatureMode"
			id="adminFeaturesGrid"
			soho-datagrid
			[gridOptions]="featuresGridOptions"
			[data]="featuresGridOptions.dataset"></div>
		<ng-container *ngIf="!isFeatureMode">
			<div
				#settingsDatagrid
				*ngIf="settingsGridOptions?.dataset?.length && navState === 'settings'"
				id="adminSettingsGrid"
				soho-datagrid
				[gridOptions]="settingsGridOptions"
				[data]="settingsGridOptions.dataset"
				(filtered)="onFiltered($event)"></div>
			<div
				*ngIf="navState === 'rules'"
				class="contextual-toolbar toolbar is-hidden">
				<div class="title" id="lm-a-set-grd-tb-rul-h">Actions</div>
				<div class="buttonset">
					<button
						soho-button="tertiary"
						id="lm-a-set-grd-tb-rul-e"
						icon="edit"
						[disabled]="selectionCount !== 1"
						(click)="openAddOrEditRule(selected)">
						Edit
					</button>
					<button
						soho-button="tertiary"
						id="lm-a-set-grd-tb-rul-d"
						icon="delete"
						(click)="deleteRules()">
						Delete ({{ selectionCount }})
					</button>
				</div>
			</div>
			<div
				#rulesDatagrid
				*ngIf="navState === 'rules'"
				id="adminRulesGrid"
				soho-datagrid
				(selected)="updateGridSelection($event.rows)"
				[gridOptions]="rulesGridOptions"
				[data]="rulesGridOptions.dataset"
				[rowReorder]="true"
				(rowReordered)="onRowReordered($event)"></div>

			<div
				*ngIf="navState === 'connections'"
				class="contextual-toolbar toolbar is-hidden">
				<div class="title" id="lm-a-set-grd-tb-con-h">Actions</div>
				<div class="buttonset">
					<button
						soho-button="tertiary"
						id="lm-a-set-grd-tb-con-d"
						icon="delete"
						(click)="deleteConnections()">
						Delete ({{ selectionCount }})
					</button>
				</div>
			</div>
			<div
				#connectionsDatagrid
				*ngIf="navState === 'connections'"
				id="adminConnectionsGrid"
				soho-datagrid
				(selected)="updateGridSelection($event.rows)"
				[gridOptions]="connectionsGridOptions"
				[data]="connectionsGridOptions.dataset"></div>

			<div class="row" style="padding-right: 0px">
				<div class="six columns" style="margin-left: 0px">
					<div class="lm-admin-quota-message">
						<p
							*ngIf="isFiltered && navState === 'settings'"
							id="lm-a-set-showcounttext">
							{{ getItemCountText() }}
							<span
								>There are active filters.
								<a
									soho-hyperlink
									id="lm-a-settings-clearfilters"
									(click)="clearFilters()"
									>Clear all</a
								>
							</span>
						</p>
					</div>
				</div>
				<div class="six columns">
					<div class="toolbar lm-text-align-r" role="toolbar">
						<div class="buttonset">
							<button
								soho-button="tertiary"
								id="lm-a-set-d"
								icon="close-cancel"
								[disabled]="areActionButtonsDisabled()"
								(click)="discard()">
								Discard
							</button>
							<button
								soho-button="tertiary"
								id="lm-a-set-s"
								icon="save"
								[disabled]="areActionButtonsDisabled()"
								(click)="save()">
								Save
							</button>
						</div>
					</div>
				</div>
			</div>
		</ng-container>
	</div>
	<ul soho-popupmenu id="settingsgrid-actions-menu">
		<li soho-popupmenu-item>
			<a
				soho-popupmenu-label
				id="lm-a-set-grd-act-e"
				(click)="setSettingValue()"
				>Edit</a
			>
		</li>
		<li *ngIf="!selectedSetting?.setting.isTenant" soho-popupmenu-item>
			<a
				soho-popupmenu-label
				id="lm-a-set-grd-act-ar"
				(click)="openAddOrEditRule()"
				>Add Rule</a
			>
		</li>
	</ul>
</div>

<div
	#restoreTemplateRef
	class="lm-margin-md-b"
	soho-busyindicator
	[activated]="isBusy"
	[blockUI]="true"
	[displayDelay]="300">
	<p class="lm-margin-lg-b">Choose how you want to restore the archive.</p>
	<ng-container>
		<fieldset class="radio-group lm-margin-zero-b">
			<ng-container *ngIf="originalEntity">
				<input
					soho-radiobutton
					type="radio"
					id="lm-a-arc-res-org"
					name="arc-restore"
					[(ngModel)]="restoreStrategy"
					[value]="0"
					[attr.disabled]="isRestoreToDisabled ? '' : null" />
				<label soho-label for="lm-a-arc-res-org" [forRadioButton]="true"
					>Restore to '{{ originalTitle }}'</label
				>
				<br />
			</ng-container>
			<input
				soho-radiobutton
				type="radio"
				id="lm-a-arc-res-new"
				name="arc-restore"
				[(ngModel)]="restoreStrategy"
				[value]="1" />
			<label soho-label for="lm-a-arc-res-new" [forRadioButton]="true"
				>Restore as new page</label
			>
			<br />
			<input
				soho-radiobutton
				type="radio"
				id="lm-a-arc-res-other"
				name="arc-restore"
				[(ngModel)]="restoreStrategy"
				[value]="2" />
			<label soho-label for="lm-a-arc-res-other" [forRadioButton]="true"
				>Restore to another page</label
			>
			<button
				id="lm-a-arc-res-sel"
				soho-button="tertiary"
				icon="search"
				[disabled]="restoreStrategy !== 2"
				(click)="openArchiveSelect()">
				Select page
			</button>
		</fieldset>
	</ng-container>
	<div class="modal-buttonset">
		<button id="lm-a-arc-res-cncl" class="btn-modal" (click)="close()">
			Cancel
		</button>
		<button
			id="lm-a-arc-res-rest"
			class="btn-modal-primary"
			[disabled]="restoreStrategy === 2 && !lookupEntity"
			(click)="showConfirmRestore()">
			Restore
		</button>
	</div>
</div>

<div class="field">
	<input
		type="radio"
		soho-radiobutton
		[(ngModel)]="iteration.frequencyType"
		id="lm-a-mm-dr-rec-yearly-abs"
		name="lm-a-mm-dr-rec-yearly-abs"
		[value]="FrequencyTypes.Absolute" />
	<label soho-label for="lm-a-mm-dr-rec-yearly-abs" [forRadioButton]="true">
		<div class="vertical-adjust">
			On
			<input
				type="number"
				lm-number-mask
				[onlyIntegers]="true"
				max="31"
				min="1"
				maxlength="2"
				class="lm-input-xxs"
				[(ngModel)]="iteration.dayOfMonth"
				[ngModelOptions]="{ updateOn: 'blur' }"
				(focus)="onFocus($event)" />
			<select
				soho-dropdown
				class="lm-dropdown-mds"
				name="lm-a-mm-dr-rec-yearly-abs-nth"
				[attributes]="{ name: 'id', value: 'lm-a-mm-dr-rec-yearly-abs-nth' }"
				noSearch
				[(ngModel)]="iteration.month">
				<option [value]="Months.January">January</option>
				<option [value]="Months.February">February</option>
				<option [value]="Months.March">March</option>
				<option [value]="Months.April">April</option>
				<option [value]="Months.May">May</option>
				<option [value]="Months.June">June</option>
				<option [value]="Months.July">July</option>
				<option [value]="Months.August">August</option>
				<option [value]="Months.September">September</option>
				<option [value]="Months.October">October</option>
				<option [value]="Months.November">November</option>
				<option [value]="Months.December">December</option>
			</select>
		</div>
	</label>
	<br />
	<input
		type="radio"
		soho-radiobutton
		[(ngModel)]="iteration.frequencyType"
		id="lm-a-mm-dr-rec-yearly-rel"
		name="lm-a-mm-dr-rec-yearly-rel"
		[value]="FrequencyTypes.Relative" />
	<label soho-label for="lm-a-mm-dr-rec-yearly-rel" [forRadioButton]="true">
		<div class="vertical-adjust">
			On the
			<select
				soho-dropdown
				class="lm-dropdown-mds"
				name="lm-a-mm-dr-rec-yearly-rel-nth"
				[attributes]="{ name: 'id', value: 'lm-a-mm-dr-rec-yearly-rel-nth' }"
				noSearch
				[(ngModel)]="iteration.weekOrdinal">
				<option [value]="WeekOrdinals.First">First</option>
				<option [value]="WeekOrdinals.Second">Second</option>
				<option [value]="WeekOrdinals.Third">Third</option>
				<option [value]="WeekOrdinals.Fourth">Fourth</option>
				<option [value]="WeekOrdinals.Last">Last</option>
			</select>
			<lm-admin-memo-weekday-select
				[(model)]="iteration.weekDay"></lm-admin-memo-weekday-select>
			of
			<select
				soho-dropdown
				class="lm-dropdown-mds"
				noSearch
				name="lm-a-mm-dr-rec-yearly-rel-month"
				[attributes]="{ name: 'id', value: 'lm-a-mm-dr-rec-yearly-rel-month' }"
				[(ngModel)]="iteration.month">
				<option [value]="Months.January">January</option>
				<option [value]="Months.February">February</option>
				<option [value]="Months.March">March</option>
				<option [value]="Months.April">April</option>
				<option [value]="Months.May">May</option>
				<option [value]="Months.June">June</option>
				<option [value]="Months.July">July</option>
				<option [value]="Months.August">August</option>
				<option [value]="Months.September">September</option>
				<option [value]="Months.October">October</option>
				<option [value]="Months.November">November</option>
				<option [value]="Months.December">December</option>
			</select>
		</div>
	</label>
</div>
<div class="field">
	<label soho-label>Duration</label>
	<p>
		Announcement is displayed
		<input
			type="number"
			lm-number-mask
			[onlyIntegers]="true"
			min="0"
			max="99"
			maxlength="2"
			class="lm-input-xxs"
			[(ngModel)]="iteration.daysBefore"
			[ngModelOptions]="{ updateOn: 'blur' }"
			(focus)="onFocus($event)" />
		day(s) before and
		<input
			type="number"
			lm-number-mask
			[onlyIntegers]="true"
			min="0"
			max="99"
			maxlength="2"
			class="lm-input-xxs"
			[(ngModel)]="iteration.daysAfter"
			[ngModelOptions]="{ updateOn: 'blur' }"
			(focus)="onFocus($event)" />
		day(s) after
	</p>
</div>

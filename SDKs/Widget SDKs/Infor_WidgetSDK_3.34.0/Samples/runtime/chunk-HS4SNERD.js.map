﻿<div
	#setValueView
	id="e2e-set-value"
	soho-busyindicator
	[activated]="isBusy"
	[blockUI]="true"
	[displayDelay]="0">
	<div *ngIf="item" [ngSwitch]="item.type">
		<div *ngSwitchCase="'selector'" class="field">
			<label
				[attr.name]="'lm-a-set-edit-' + item.setting.settingName + '-label'"
				class="label"
				[attr.for]="'select-' + item.setting.settingName"
				>{{ item.setting.label }}</label
			>
			<select
				soho-dropdown
				noSearch
				[attr.id]="'select-' + item.setting.settingName"
				[attr.name]="'lm-a-set-edit-' + item.setting.settingName"
				[(ngModel)]="item.value"
				[attributes]="{
					name: 'id',
					value: 'lm-a-set-edit-' + item.setting.settingName
				}">
				<option
					*ngFor="let value of item.setting.values"
					[value]="value.value"
					[attr.name]="
						value.label
							| lmAutoId: 'lm-a-set-edit-' + item.setting.settingName : 'value'
					">
					{{ value.label }}
				</option>
			</select>
		</div>

		<div *ngSwitchCase="'boolean'" class="field switch lm-padding-sm-t">
			<input
				[attr.id]="item.settingName"
				type="checkbox"
				class="switch"
				[(ngModel)]="item.value" />
			<label class="label" [attr.for]="item.settingName">{{
				item.setting.label
			}}</label>
		</div>

		<div *ngSwitchCase="'defaultPages'">
			<lm-admin-default-pages
				[settingItem]="item"
				[dialog]="dialog"></lm-admin-default-pages>
		</div>

		<div *ngSwitchCase="'mandatoryPages'">
			<lm-admin-mandatory-pages
				[settingItem]="item"
				[dialog]="dialog"></lm-admin-mandatory-pages>
		</div>

		<div *ngSwitchCase="'intSelector'" class="field">
			<label class="label" [attr.for]="item.settingName">{{
				item.setting.label
			}}</label>

			<select
				soho-dropdown
				[attributes]="{
					name: 'id',
					value: 'lm-a-set-edit-' + item.setting.settingName
				}"
				[name]="'lm-a-set-edit-' + item.setting.settingName"
				[(ngModel)]="item.value"
				*ngIf="maxCountNumbers && maxCountNumbers.length > 0"
				data-validate="required"
				required>
				<option *ngFor="let value of maxCountNumbers" [value]="value">
					{{ value }}
				</option>
			</select>
		</div>

		<div *ngSwitchCase="'int'" class="field">
			<label class="label" [attr.for]="item.settingName">{{
				item.setting.label
			}}</label>
			<input
				class="lm-left-text"
				[attr.id]="item.settingName"
				soho-input
				soho-mask
				process="number"
				sohoPattern="####"
				[(ngModel)]="item.value" />
		</div>

		<div *ngSwitchCase="'AdminContactInfo'" class="field">
			<label class="label" [attr.for]="item.settingName">{{
				item.setting.label
			}}</label>
			<textarea
				soho-textarea
				maxlength="512"
				[attr.id]="item.settingName"
				[(ngModel)]="item.value"
				data-validate="required"
				required></textarea>
		</div>

		<div *ngSwitchDefault class="field">
			<label class="label" [attr.for]="item.settingName">{{
				item.setting.label
			}}</label>
			<input
				[attr.id]="item.settingName"
				type="text"
				[(ngModel)]="item.value"
				data-validate="required"
				required />
		</div>
	</div>

	<div class="modal-buttonset">
		<button
			class="btn-modal"
			(click)="dialog?.close()"
			id="lm-a-set-edit-dialog-cancel">
			Cancel
		</button>
		<button
			class="btn-modal-primary"
			(click)="onOk()"
			id="lm-a-set-edit-dialog-ok">
			OK
		</button>
	</div>
</div>
